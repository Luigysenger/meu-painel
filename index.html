<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISTEMA OUVINDO RÁDIO PRO</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <style>
        :root { --primary: #1DB954; --dark: #121212; --panel: #1e1e1e; --offline: #a333ff; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--dark); color: white; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow: hidden; }
        
        .auth-card { background: var(--panel); padding: 30px; border-radius: 16px; text-align: center; width: 350px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .input-group { text-align: left; margin-bottom: 12px; }
        label { font-size: 11px; color: #b3b3b3; text-transform: uppercase; font-weight: bold; }
        input { width: 100%; padding: 12px; margin-top: 5px; border-radius: 6px; border: 1px solid #333; background: #2a2a2a; color: white; box-sizing: border-box; outline: none; }
        .btn-main { width: 100%; padding: 14px; border: none; border-radius: 25px; background: var(--primary); color: white; font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        .link-auth { font-size: 12px; color: var(--primary); cursor: pointer; display: block; margin-top: 10px; text-decoration: underline; }
        
        #main-panel { display: none; flex-direction: column; align-items: center; width: 100%; }
        .radio-container { position: relative; width: 850px; height: 620px; background: #333; border: 10px solid #444; border-radius: 20px; }
        .tablet-screen { position: absolute; top: 10%; left: 25%; width: 50%; height: 75%; background: #000; border-radius: 10px; display: flex; flex-direction: column; overflow: hidden; border: 4px solid #111; }
        .tablet-header { background: var(--primary); padding: 8px 15px; font-size: 11px; color: #000; font-weight: bold; display: flex; justify-content: space-between; align-items: center; }
        
        .stations-grid { flex: 1; overflow-y: auto; padding: 15px; background: #0a0a0a; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; align-content: start; }
        .radio-card { padding: 15px 5px; border-radius: 8px; text-align: center; color: #000; font-weight: bold; cursor: grab; font-size: 12px; position: relative; border: 2px solid transparent; transition: 0.3s; display: flex; align-items: center; justify-content: center; min-height: 50px; user-select: none; }
        .radio-card.active { background-color: #000 !important; color: var(--primary) !important; border: 2px solid var(--primary); box-shadow: inset 0 0 10px rgba(29, 185, 84, 0.5); }
        .antena-icon { margin-right: 5px; animation: blink 1.5s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }

        .btn-edit-small { position: absolute; top: 2px; left: 2px; font-size: 9px; background: rgba(0,0,0,0.4); border: none; cursor: pointer; padding: 2px 5px; border-radius: 3px; color: white; }
        .btn-del-small { position: absolute; top: 2px; right: 2px; font-size: 9px; background: rgba(255,0,0,0.4); border: none; cursor: pointer; padding: 2px 5px; border-radius: 3px; color: white; }

        .admin-only { background: #151515; padding: 10px; border-bottom: 1px solid #333; }
        .player-controls { background: #181818; padding: 10px; display: flex; justify-content: center; gap: 20px; border-top: 1px solid #333; }
        .ctrl-btn { background: none; border: 1px solid #444; color: white; border-radius: 50%; width: 35px; height: 35px; cursor: pointer; font-weight: bold; }
        .stop-btn { border-color: #ff4444; color: #ff4444; }

        .info-bar { background: #111; padding: 8px; border-top: 1px solid #333; }
        .info-row { display: grid; grid-template-columns: 1fr 1fr 1fr; width: 100%; align-items: center; text-align: center; }
        
        #user-monitor { background: #000; padding: 8px; border-top: 1px solid #222; max-height: 140px; overflow-y: auto; }
        .monitor-row { background: #1a1a1a; margin: 5px 0; border-radius: 6px; cursor: pointer; border-left: 4px solid #333; overflow: hidden; transition: 0.3s; }
        .row-main { display: flex; justify-content: space-between; align-items: center; padding: 8px 12px; font-size: 10px; font-weight: bold; }
        .row-details { background: #050505; padding: 10px; text-align: left; display: none; border-top: 1px solid #222; font-size: 10px; color: #ccc; }
        .row-details.show { display: block; }
        
        .hidden { display: none; }
        .selection-item { background: #1a1a1a; padding: 10px; margin-bottom: 5px; border-radius: 5px; display: flex; justify-content: space-between; grid-column: span 2; font-size: 12px; align-items: center; }
    </style>
</head>
<body>

    <div id="login-screen" class="auth-card">
        <h1 style="color:var(--primary)">📻 OUVINDO RÁDIO</h1>
        <div class="input-group"><label>Usuário</label><input type="text" id="login-user" onkeydown="if(event.key==='Enter') handleLogin()"></div>
        <div class="input-group"><label>Senha</label><input type="password" id="login-pass" onkeydown="if(event.key==='Enter') handleLogin()"></div>
        <button class="btn-main" onclick="handleLogin()">ENTRAR</button>
        <span class="link-auth" onclick="showScreen('register-screen')">Cadastrar Novo Usuário</span>
        <span class="link-auth" onclick="showScreen('forgot-screen')">Esqueci minha Senha</span>
    </div>

    <div id="register-screen" class="auth-card hidden">
        <h1>NOVO ACESSO</h1>
        <div class="input-group"><label>Nome</label><input type="text" id="reg-name"></div>
        <div class="input-group"><label>Email</label><input type="email" id="reg-email"></div>
        <div class="input-group"><label>Senha</label><input type="password" id="reg-pass"></div>
        <button class="btn-main" onclick="handleRegister()">CRIAR CONTA</button>
        <span class="link-auth" onclick="showScreen('login-screen')">Voltar</span>
    </div>

    <div id="forgot-screen" class="auth-card hidden">
        <h1>RECUPERAR</h1>
        <div id="forgot-step1">
            <div class="input-group"><label>Usuário</label><input type="text" id="forgot-name"></div>
            <div class="input-group"><label>Email</label><input type="email" id="forgot-email"></div>
            <button class="btn-main" onclick="verifyRecovery()">VERIFICAR</button>
        </div>
        <div id="forgot-step2" class="hidden">
            <input type="password" id="forgot-new-pass" placeholder="Nova Senha">
            <button class="btn-main" onclick="updatePassword()">SALVAR</button>
        </div>
        <span class="link-auth" onclick="showScreen('login-screen')">Voltar</span>
    </div>

    <div id="main-panel">
        <div class="radio-container">
            <div class="tablet-screen">
                <div class="tablet-header"><span id="user-display">PAINEL</span> <button onclick="location.reload()">SAIR</button></div>
                
                <div id="adm-zone" class="admin-only hidden">
                    <input type="text" id="new-name" placeholder="Nome da Rádio" style="width:60%; padding:5px">
                    <button onclick="nextStep()" style="padding:5px">Próximo</button>
                    <div id="step-2" class="hidden" style="margin-top:5px">
                        <input type="text" id="new-url" placeholder="Link Stream" style="width:60%; padding:5px">
                        <button onclick="saveRadio()" style="background:orange; color:black;">SALVAR</button>
                    </div>
                </div>

                <div id="selection-zone" class="stations-grid hidden">
                    <div id="list-to-select" style="grid-column:span 2"></div>
                    <button class="btn-main" onclick="saveUserList()">SALVAR MINHA LISTA</button>
                </div>

                <div id="player-zone" class="stations-grid">
                    <div id="my-final-list" style="display:contents"></div>
                </div>

                <div id="player-bar" class="player-controls">
                    <button class="ctrl-btn" onclick="changeRadio(-1)">◀◀</button>
                    <button class="ctrl-btn stop-btn" onclick="stopRadio()">■</button>
                    <button class="ctrl-btn" onclick="changeRadio(1)">▶▶</button>
                </div>

                <div class="info-bar">
                    <div class="info-row">
                        <div class="info-item-side" style="font-size:10px">
                            <span id="display-city">...</span><br>
                            <span id="btn-edit-list" class="hidden" onclick="renderSelection()" style="color:var(--primary); cursor:pointer; text-decoration:underline; font-size:9px">EDITAR LISTA</span>
                        </div>
                        <div class="info-item-center" style="text-align:center"><span id="weather-img">☀️</span><br><span id="display-temp">--°C</span></div>
                        <div class="info-item-side" style="font-size:10px"><span id="display-time">00:00</span></div>
                    </div>
                    <div id="user-monitor" class="hidden"></div>
                </div>
            </div>
        </div>
    </div>

    <audio id="audio-player"></audio>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBGGdz8gJSrXWqq3hSQIoe3pop5MGYt20Q",
            authDomain: "meu-painel-f2efe.firebaseapp.com",
            databaseURL: "https://meu-painel-f2efe-default-rtdb.firebaseio.com/",
            projectId: "meu-painel-f2efe",
            storageBucket: "meu-painel-f2efe.firebasestorage.app",
            messagingSenderId: "785606199615",
            appId: "1:785606199615:web:75042853c86726f3942b8a"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const player = document.getElementById('audio-player');
        
        let allRadios = []; let currentList = []; let currentIndex = -1;
        let currentUser = ""; let isAdmin = false; let editingKey = null;
        let timerRealtime = null; let openUserId = null;

        function showScreen(id) {
            document.querySelectorAll('.auth-card').forEach(s => s.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        }

        function handleRegister() {
            const n = document.getElementById('reg-name').value.toUpperCase();
            const e = document.getElementById('reg-email').value;
            const p = document.getElementById('reg-pass').value;
            db.ref('usuarios/' + n).set({ nome: n, email: e, senha: p, lista: "", ouvindo: "Nada", totalTempo: 0 }).then(() => showScreen('login-screen'));
        }

        function handleLogin() {
            const u = document.getElementById('login-user').value.toUpperCase();
            const p = document.getElementById('login-pass').value;
            if(u === "LUIGY" && p === "1045") { isAdmin = true; enterDashboard("LUIGY ADM", ""); monitorUsers(); return; }
            db.ref('usuarios/' + u).once('value', (snap) => {
                const data = snap.val();
                if(data && data.senha === p) { currentUser = u; enterDashboard(data.nome, data.lista); 
                setInterval(() => db.ref('usuarios/'+currentUser).update({lastSeen: Date.now()}), 10000);
                } else alert("Erro!");
            });
        }

        function enterDashboard(name, savedList) {
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('main-panel').style.display = 'flex';
            document.getElementById('user-display').innerText = name.toUpperCase();
            startWeather();
            
            new Sortable(document.getElementById('my-final-list'), {
                animation: 200,
                onEnd: () => {
                    const ids = Array.from(document.querySelectorAll('.radio-card')).map(c => c.getAttribute('data-id'));
                    currentList = ids;
                    if(!isAdmin && currentUser) db.ref('usuarios/'+currentUser).update({ lista: ids.join(',') });
                }
            });

            db.ref('radios').on('value', snap => {
                const data = snap.val(); allRadios = data ? Object.keys(data).map(k => ({id:k, ...data[k]})) : [];
                if(isAdmin) { currentList = allRadios.map(r=>r.id); renderPlayer(currentList); document.getElementById('adm-zone').classList.remove('hidden'); document.getElementById('user-monitor').classList.remove('hidden'); }
                else { if(savedList) { currentList = savedList.split(','); renderPlayer(currentList); document.getElementById('btn-edit-list').classList.remove('hidden'); } else { renderSelection(); } }
            });
        }

        function renderSelection() {
            document.getElementById('player-zone').classList.add('hidden');
            document.getElementById('selection-zone').classList.remove('hidden');
            const container = document.getElementById('list-to-select'); container.innerHTML = "";
            allRadios.forEach(r => {
                const isChecked = currentList.includes(r.id) ? 'checked' : '';
                container.innerHTML += `<div class="selection-item"><span>${r.name}</span> <input type="checkbox" class="radio-sel" value="${r.id}" ${isChecked}></div>`;
            });
        }

        function saveUserList() {
            const selected = Array.from(document.querySelectorAll('.radio-sel:checked')).map(cb => cb.value);
            currentList = selected;
            db.ref('usuarios/' + currentUser).update({ lista: selected.join(',') }).then(() => {
                document.getElementById('selection-zone').classList.add('hidden');
                document.getElementById('btn-edit-list').classList.remove('hidden');
                renderPlayer(currentList);
            });
        }

        function renderPlayer(ids) {
            const container = document.getElementById('my-final-list'); container.innerHTML = "";
            document.getElementById('player-zone').classList.remove('hidden');
            ids.forEach(id => {
                const r = allRadios.find(rad => rad.id === id);
                if(r) {
                    const card = document.createElement('div'); card.className = "radio-card"; card.id = "card-"+r.id; 
                    card.setAttribute('data-id', r.id);
                    card.style.backgroundColor = r.color;
                    const isPlaying = (currentIndex !== -1 && currentList[currentIndex] === r.id);
                    if(isPlaying) card.classList.add('active');
                    card.innerHTML = `${isAdmin ? `<button class="btn-edit-small" onclick="editR('${r.id}')">✎</button><button class="btn-del-small" onclick="deleteR('${r.id}')">X</button>` : ''}${isPlaying ? '<span class="antena-icon">📡</span>' : ''}<b>${r.name}</b>`;
                    card.onclick = (e) => { if(e.target.tagName !== 'BUTTON') playRadio(r.id); }; container.appendChild(card);
                }
            });
        }

        function playRadio(id) {
            const radio = allRadios.find(r => r.id === id); if(!radio) return;
            if(timerRealtime) clearInterval(timerRealtime);
            player.src = radio.url; player.play(); currentIndex = currentList.indexOf(id);
            renderPlayer(currentList);
            if(currentUser) {
                db.ref('usuarios/'+currentUser).update({ ouvindo: radio.name, inicio: Date.now(), ultimaRadio: radio.name });
                timerRealtime = setInterval(() => {
                    db.ref('usuarios/'+currentUser).once('value', s => {
                        const d = s.val(); db.ref('usuarios/'+currentUser).update({ totalTempo: (d.totalTempo || 0) + 1000, ultimoTempo: (Date.now() - d.inicio) });
                    });
                }, 1000);
            }
        }

        function stopRadio() { player.pause(); currentIndex = -1; if(timerRealtime) clearInterval(timerRealtime); if(currentUser) db.ref('usuarios/'+currentUser).update({ ouvindo: "Nada", inicio: 0 }); renderPlayer(currentList); }
        function changeRadio(dir) { if(currentList.length === 0) return; let n = currentIndex + dir; if(n >= currentList.length) n = 0; if(n < 0) n = currentList.length - 1; playRadio(currentList[n]); }

        function monitorUsers() {
            db.ref('usuarios').on('value', snap => {
                const users = snap.val(); const display = document.getElementById('user-monitor');
                if(!users) return;
                display.innerHTML = `<p style='font-size:9px; color:#555; margin-bottom:5px'>MONITOR DE ACESSOS</p>`;
                Object.keys(users).forEach(u => {
                    const info = users[u];
                    const isOnline = (info.ouvindo !== "Nada") && (Date.now() - (info.lastSeen || 0) < 30000);
                    const color = isOnline ? "var(--primary)" : "var(--offline)";
                    display.innerHTML += `
                    <div class="monitor-row" style="border-left-color: ${color}" onclick="openUserId = (openUserId === '${u}' ? null : '${u}')">
                        <div class="row-main"><span style="color:${color}">${info.nome}</span><span style="color:${color}">${isOnline ? 'ONLINE' : 'OFF'}</span></div>
                        <div class="row-details ${openUserId === u ? 'show' : ''}">
                            Rádio: ${isOnline ? '📡 ' + info.ouvindo : (info.ultimaRadio || '---')}<br>Sessão: ${formatDuration(info.ultimoTempo)}<br>Total: ${formatDuration(info.totalTempo)}
                        </div>
                    </div>`;
                });
            });
        }

        function formatDuration(ms) { if(!ms) return "0s"; const s = Math.floor(ms/1000); const m = Math.floor(s/60); return (m>0?m+"m ":"")+s%60+"s"; }
        function nextStep() { document.getElementById('step-2').classList.remove('hidden'); }
        function saveRadio() {
            const n = document.getElementById('new-name').value; const u = document.getElementById('new-url').value;
            if(editingKey) db.ref('radios/'+editingKey).update({name:n, url:u});
            else db.ref('radios').push({name:n, url:u, color:`rgb(${Math.random()*50+200},${Math.random()*50+200},${Math.random()*50+200})`});
            document.getElementById('step-2').classList.add('hidden');
        }
        function editR(id) { const r = allRadios.find(x => x.id === id); document.getElementById('new-name').value = r.name; document.getElementById('new-url').value = r.url; editingKey = id; document.getElementById('step-2').classList.remove('hidden'); }
        function deleteR(id) { if(confirm("Excluir?")) db.ref('radios/'+id).remove(); }
        
        function startWeather() {
            setInterval(() => { document.getElementById('display-time').innerText = new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}); }, 1000);
            fetch('https://ipapi.co/json/').then(r=>r.json()).then(l => {
                document.getElementById('display-city').innerText = l.city.toUpperCase();
                fetch(`https://api.open-meteo.com/v1/forecast?latitude=${l.latitude}&longitude=${l.longitude}&current_weather=true&hourly=precipitation_probability`).then(r=>r.json()).then(w => { 
                    const temp = Math.round(w.current_weather.temperature);
                    document.getElementById('display-temp').innerText = temp + "°C";
                    const rainProb = w.hourly.precipitation_probability[new Date().getHours()];
                    const hour = new Date().getHours();
                    const isNight = hour >= 18 || hour < 6;
                    let icon = isNight ? "🌙" : "☀️";
                    if(rainProb > 30) icon = isNight ? "🌧️🌙" : "🌧️";
                    document.getElementById('weather-img').innerText = icon;
                });
            });
        }
    </script>
</body>
</html>
