<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOGIN - MEU PAINEL</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #BF40BF; --bg: #0b0b0b; --card: #181818; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .login-container { background: var(--card); padding: 30px; border-radius: 20px; border: 1px solid #333; width: 90%; max-width: 350px; text-align: center; }
        h2 { color: var(--primary); margin-bottom: 25px; text-transform: uppercase; letter-spacing: 2px; }
        .input-group { margin-bottom: 15px; text-align: left; }
        label { display: block; font-size: 12px; color: #888; margin-bottom: 5px; margin-left: 5px; }
        input { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #333; background: #0b0b0b; color: white; outline: none; box-sizing: border-box; }
        input:focus { border-color: var(--primary); }
        .btn-acao { width: 100%; padding: 12px; border-radius: 10px; border: none; background: var(--primary); color: white; font-weight: bold; cursor: pointer; margin-top: 10px; transition: 0.3s; }
        .btn-acao:hover { opacity: 0.8; }
        #msg-erro { color: #ff4444; font-size: 12px; margin-top: 10px; min-height: 15px; }
    </style>
</head>
<body>

    <div class="login-container" id="box-login">
        <h2>ACESSO</h2>
        <div class="input-group">
            <label>E-mail</label>
            <input type="text" id="login-email" placeholder="seuemail@gmail.com">
        </div>
        <div class="input-group">
            <label>Senha</label>
            <input type="password" id="login-senha" placeholder="****">
        </div>
        <button class="btn-acao" onclick="fazerLogin()">ENTRAR</button>
        <div id="msg-erro"></div>
    </div>

    <script>
        // CONFIGURAÇÃO DO SEU FIREBASE
        const firebaseConfig = {
            apiKey: "AIzaSyBGGdz8gJSrXWqq3hSQIoe3pop5MGYt20Q",
            authDomain: "meu-painel-f2efe.firebaseapp.com",
            databaseURL: "https://meu-painel-f2efe-default-rtdb.firebaseio.com/",
            projectId: "meu-painel-f2efe"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // ATALHO PARA ENTER
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') fazerLogin();
        });

        function fazerLogin() {
            const emailDigitado = document.getElementById('login-email').value.trim().toLowerCase();
            const senhaInput = document.getElementById('login-senha').value;
            const erro = document.getElementById('msg-erro');

            if (!emailDigitado || !senhaInput) {
                erro.innerText = "Preencha todos os campos!";
                return;
            }

            // O Firebase não aceita pontos nas chaves, então seu banco usa vírgulas
            const emailFormatado = emailDigitado.replace(/\./g, ',');

            // Busca na pasta 'contas' conforme sua imagem do Firebase
            db.ref('contas/' + emailFormatado).once('value', snap => {
                const u = snap.val();
                
                // Verifica se o usuário existe e se a senha bate
                // Usamos '==' para aceitar tanto número quanto texto do banco
                if(u && u.senha == senhaInput) {
                    
                    // Salva o nome para exibir no painel (em maiúsculo)
                    const nomeParaSalvar = u.nome ? u.nome.toUpperCase() : "OUVINTE";
                    localStorage.setItem('usuarioNome', nomeParaSalvar);
                    
                    // Atualiza o status no banco para o ADM ver
                    db.ref('contas/' + emailFormatado).update({
                        status: "online",
                        lastSeen: Date.now(),
                        sessionStart: Date.now()
                    });

                    // Verifica o perfil para saber qual página abrir
                    // Se o campo 'perfil' ou 'tipo' for adm/admin, abre o ADM
                    if(u.perfil === "adm" || u.tipo === "admin") {
                        window.location.href = 'adm.html';
                    } else {
                        window.location.href = 'ouvinte.html';
                    }
                } else {
                    erro.innerText = "E-mail ou Senha incorretos!";
                }
            }).catch(e => {
                erro.innerText = "Erro ao conectar com o banco.";
                console.error(e);
            });
        }
    </script>
</body>
</html>
