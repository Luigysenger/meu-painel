<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OUVINDO RÁDIO - CLOUD PRO</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <style>
        :root { --primary: #1DB954; --dark: #121212; --panel: #1e1e1e; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--dark); color: white; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow: hidden; }
        
        /* LOGIN */
        #login-screen { background: var(--panel); padding: 40px; border-radius: 16px; text-align: center; width: 350px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); z-index: 100; }
        .logo-area h1 { color: var(--primary); margin-bottom: 20px; font-size: 28px; }
        .input-group { text-align: left; margin-bottom: 15px; }
        label { font-size: 12px; color: #b3b3b3; text-transform: uppercase; }
        input { width: 100%; padding: 12px; margin-top: 5px; border-radius: 6px; border: 1px solid #333; background: #2a2a2a; color: white; box-sizing: border-box; outline: none; }
        .btn-main { width: 100%; padding: 14px; border: none; border-radius: 25px; background: var(--primary); color: white; font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        .login-footer { margin-top: 20px; display: flex; justify-content: space-between; font-size: 12px; }
        .login-footer a { color: #b3b3b3; text-decoration: none; cursor: pointer; }

        /* PAINEL */
        #main-panel { display: none; flex-direction: column; align-items: center; width: 100%; }
        .radio-container { position: relative; width: 850px; height: 580px; background: #333; border: 10px solid #444; border-radius: 20px; box-shadow: 0 20px 50px rgba(0,0,0,0.8); }
        .tablet-screen { position: absolute; top: 10%; left: 25%; width: 50%; height: 75%; background: #000; border-radius: 10px; display: flex; flex-direction: column; overflow: hidden; border: 4px solid #111; }
        .tablet-header { background: var(--primary); padding: 8px 15px; font-size: 11px; color: #000; font-weight: bold; display: flex; justify-content: space-between; align-items: center; }
        
        .creation-zone { background: #151515; padding: 10px; border-bottom: 1px solid #333; }
        .stations-grid { flex: 1; overflow-y: auto; padding: 15px; display: grid; grid-template-columns: 1fr 1fr; gap: 12px; background: #0a0a0a; align-content: start; }
        
        /* CARD DA RÁDIO */
        .radio-card { padding: 15px 5px; border-radius: 8px; position: relative; text-align: center; cursor: grab; color: #111; font-weight: bold; font-size: 13px; transition: all 0.3s ease; border: 2px solid transparent; }
        .radio-card.active { transform: scale(1.08); border: 2px solid var(--primary); box-shadow: 0 0 15px rgba(29, 185, 84, 0.4); z-index: 5; }
        
        .card-tools { position: absolute; top: 2px; right: 4px; display: flex; gap: 5px; }
        .btn-tool { background: none; border: none; cursor: pointer; font-size: 14px; color: rgba(0,0,0,0.4); font-weight: bold; padding: 2px; }
        .btn-tool:hover { color: #000; }

        .info-bar { background: #111; padding: 10px; display: flex; justify-content: space-around; font-size: 11px; border-top: 1px solid #333; }
        .info-item { display: flex; flex-direction: column; align-items: center; }
        .info-val { color: var(--primary); font-weight: bold; }

        .controls-bar { background: #181818; padding: 12px; display: flex; justify-content: center; gap: 20px; }
        .ctrl-btn { background: none; border: none; color: white; font-size: 20px; cursor: pointer; }
        .hidden { display: none; }
        #status-display { font-size: 10px; color: var(--primary); text-align: center; background: #000; padding: 3px; }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="logo-area"><h1>📻 OUVINDO RÁDIO</h1></div>
        <div class="input-group"><label>Usuário</label><input type="text" id="user-input" value="LUIGY"></div>
        <div class="input-group"><label>Senha</label><input type="password" id="pass-input" value="1045"></div>
        <button class="btn-main" onclick="handleLogin()">ENTRAR NO SISTEMA</button>
        <div class="login-footer">
            <a onclick="alert('Recuperação via ADM Luigy.')">Esqueci a senha</a>
            <a onclick="alert('Novos usuários bloqueados.')">Cadastrar</a>
        </div>
    </div>

    <div id="main-panel">
        <div class="radio-container">
            <div class="tablet-screen">
                <div class="tablet-header"><span>ADM: LUIGY</span><button onclick="location.reload()" style="background:#000;color:#fff;border:none;font-size:10px;cursor:pointer;padding:2px 5px">SAIR</button></div>
                
                <div class="creation-zone">
                    <div id="step-1">
                        <input type="text" id="new-name" placeholder="Nome da Rádio">
                        <button onclick="nextStep()" style="width:100%;margin-top:5px;background:var(--primary);border:none;padding:8px;font-weight:bold;cursor:pointer">PRÓXIMO ➔</button>
                    </div>
                    <div id="step-2" class="hidden">
                        <input type="text" id="new-url" placeholder="Link de Áudio">
                        <button id="btn-save-cloud" onclick="saveToFirebase()" style="width:100%;margin-top:5px;background:orange;border:none;padding:8px;font-weight:bold;cursor:pointer">SALVAR NA NUVEM ☁️</button>
                    </div>
                </div>

                <div class="stations-grid" id="stations-grid"></div>
                <div id="status-display">Sistema Online</div>

                <div class="info-bar">
                    <div class="info-item"><span id="display-date">--/--/--</span><span class="info-val" id="display-time">00:00</span></div>
                    <div class="info-item"><span id="display-city">Buscando...</span><span class="info-val"><span id="display-temp">--</span>°C</span></div>
                    <div class="info-item"><span>Previsão</span><span style="font-size:16px">☀️</span></div>
                </div>

                <div class="controls-bar">
                    <button class="ctrl-btn" onclick="prevRadio()">⏮️</button>
                    <button class="ctrl-btn" onclick="stopRadio()">⏹️</button>
                    <button class="ctrl-btn" onclick="nextRadio()">⏭️</button>
                </div>
            </div>
        </div>
    </div>

    <audio id="audio-player"></audio>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBGGdz8gJSrXWqq3hSQIoe3pop5MGYt20Q",
            authDomain: "meu-painel-f2efe.firebaseapp.com",
            databaseURL: "https://meu-painel-f2efe-default-rtdb.firebaseio.com/",
            projectId: "meu-painel-f2efe",
            storageBucket: "meu-painel-f2efe.firebasestorage.app",
            messagingSenderId: "785606199615",
            appId: "1:785606199615:web:75042853c86726f3942b8a"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const player = document.getElementById('audio-player');
        let radioList = [];
        let currentIndex = -1;
        let editingKey = null; // Controla se estamos editando ou criando nova

        function handleLogin() {
            if(document.getElementById('user-input').value.toUpperCase()==="LUIGY" && document.getElementById('pass-input').value==="1045") {
                document.getElementById('login-screen').style.display='none';
                document.getElementById('main-panel').style.display='flex';
                initApp();
            } else { alert("Acesso Negado!"); }
        }

        function initApp() {
            loadRadios();
            getWeather();
            setInterval(() => {
                const now = new Date();
                document.getElementById('display-time').innerText = now.toLocaleTimeString('pt-BR');
                document.getElementById('display-date').innerText = now.toLocaleDateString('pt-BR');
            }, 1000);
            new Sortable(document.getElementById('stations-grid'), { animation: 150, onEnd: saveOrder });
        }

        async function getWeather() {
            try {
                const loc = await fetch('https://ipapi.co/json/').then(r => r.json());
                document.getElementById('display-city').innerText = loc.city.toUpperCase();
                const w = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${loc.latitude}&longitude=${loc.longitude}&current_weather=true`).then(r => r.json());
                document.getElementById('display-temp').innerText = Math.round(w.current_weather.temperature);
            } catch (e) {}
        }

        function loadRadios() {
            db.ref('radios').on('value', (snap) => {
                const data = snap.val();
                radioList = data ? Object.keys(data).map(k => ({key: k, ...data[k]})).sort((a,b) => (a.order||0)-(b.order||0)) : [];
                renderGrid();
            });
        }

        function saveToFirebase() {
            const name = document.getElementById('new-name').value;
            const url = document.getElementById('new-url').value;
            if(!name || !url) return;

            if(editingKey) {
                // ATUALIZAR EXISTENTE
                db.ref('radios/' + editingKey).update({ name: name, url: url });
                editingKey = null;
                document.getElementById('btn-save-cloud').innerText = "SALVAR NA NUVEM ☁️";
                document.getElementById('btn-save-cloud').style.background = "orange";
            } else {
                // CRIAR NOVA
                const r = Math.floor(Math.random()*40+210), g = Math.floor(Math.random()*40+210), b = Math.floor(Math.random()*40+210);
                db.ref('radios').push({ name: name, url: url, color: `rgb(${r},${g},${b})`, order: radioList.length });
            }

            document.getElementById('new-name').value=""; document.getElementById('new-url').value="";
            document.getElementById('step-2').classList.add('hidden'); document.getElementById('step-1').classList.remove('hidden');
        }

        function editRadio(index) {
            const r = radioList[index];
            editingKey = r.key;
            document.getElementById('new-name').value = r.name;
            document.getElementById('new-url').value = r.url;
            document.getElementById('btn-save-cloud').innerText = "ATUALIZAR RÁDIO ✅";
            document.getElementById('btn-save-cloud').style.background = "#1DB954";
            document.getElementById('step-1').classList.remove('hidden');
            document.getElementById('step-2').classList.add('hidden');
            alert("Altere o nome e clique em Próximo para salvar as mudanças.");
        }

        function renderGrid() {
            const grid = document.getElementById('stations-grid');
            grid.innerHTML = "";
            radioList.forEach((r, i) => {
                const card = document.createElement('div');
                card.className = `radio-card ${currentIndex === i ? 'active' : ''}`;
                card.style.backgroundColor = r.color;
                card.setAttribute('data-key', r.key);
                card.innerHTML = `
                    <div class="card-tools">
                        <button class="btn-tool" onclick="event.stopPropagation(); editRadio(${i})">✎</button>
                        <button class="btn-tool" onclick="event.stopPropagation(); deleteRadio('${r.key}')">×</button>
                    </div>
                    <div onclick="playRadio(${i})">
                        <div style="font-size:18px">${currentIndex === i ? '🔊' : '📻'}</div>
                        <div>${r.name}</div>
                    </div>`;
                grid.appendChild(card);
            });
        }

        function saveOrder() {
            document.querySelectorAll('.radio-card').forEach((card, idx) => {
                db.ref('radios/' + card.getAttribute('data-key')).update({ order: idx });
            });
        }

        function deleteRadio(key) { if(confirm("Excluir definitivamente?")) db.ref('radios/'+key).remove(); }
        function playRadio(i) {
            currentIndex = i; player.src = radioList[i].url; player.play();
            document.getElementById('status-display').innerText = "🔊 " + radioList[i].name;
            renderGrid();
        }
        function stopRadio() { player.pause(); currentIndex = -1; renderGrid(); }
        function nextRadio() { if(radioList.length) playRadio((currentIndex+1)%radioList.length); }
        function prevRadio() { if(radioList.length) playRadio((currentIndex-1+radioList.length)%radioList.length); }
        function nextStep() { document.getElementById('step-1').classList.add('hidden'); document.getElementById('step-2').classList.remove('hidden'); }
    </script>
</body>
</html>
