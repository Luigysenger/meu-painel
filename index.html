<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PAINEL ADM SUPREMO - LUIGY</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #1DB954; --bg: #000; --card: #121212; --text-muted: #b3b3b3; --purple: #a333ff; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; margin: 0; padding: 20px; }
        
        /* Estilos do Login Restaurados */
        .login-container { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background: #000; }
        .login-card { background: #121212; padding: 40px; border-radius: 20px; width: 350px; text-align: center; border: 1px solid #333; }
        .login-card h2 { color: var(--purple); margin-bottom: 30px; letter-spacing: 2px; }
        .login-card input { width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 8px; border: none; background: #e8f0fe; color: #000; box-sizing: border-box; }
        .btn-entrar { width: 100%; padding: 12px; border-radius: 8px; border: none; background: var(--purple); color: white; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .login-footer { margin-top: 20px; font-size: 13px; }
        .login-footer a { color: var(--text-muted); text-decoration: none; display: block; margin: 8px 0; }
        .login-footer a:hover { color: white; }

        /* Estilos do Painel Intactos */
        .header { display: flex; justify-content: space-between; align-items: center; background: #121212; padding: 20px 30px; border-radius: 15px; border: 1px solid #333; margin-bottom: 25px; }
        .main-grid { display: grid; grid-template-columns: 1.2fr 0.8fr; gap: 20px; max-width: 1400px; margin: 0 auto; }
        .card { background: var(--card); border-radius: 20px; padding: 20px; border: 1px solid #282828; margin-bottom: 20px; }
        h3 { color: var(--primary); font-size: 12px; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 15px; }
        
        .radio-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 12px; }
        .radio-item { aspect-ratio: 1/1; border-radius: 15px; display: flex; flex-direction: column; justify-content: center; align-items: center; color: #000; font-weight: bold; font-size: 12px; text-align: center; padding: 10px; cursor: grab; position: relative; }
        
        .user-item { background: #1a1a1a; margin-bottom: 8px; border-radius: 10px; padding: 15px; border-left: 4px solid #333; }
        .status-on { color: #00ff00; font-size: 11px; float: right; font-weight: bold; }
        .status-off { color: #d1a3ff; font-size: 11px; float: right; font-weight: bold; }
    </style>
</head>
<body>

    <div id="login-screen" class="login-container">
        <div class="login-card">
            <h2>ACESSO</h2>
            <input type="email" id="login-email" placeholder="E-mail">
            <input type="password" id="login-senha" placeholder="Senha">
            <button class="btn-entrar" onclick="fazerLogin()">ENTRAR</button>
            <div class="login-footer">
                <a href="#" onclick="alert('Funcionalidade em desenvolvimento')">Esqueci a senha</a>
                <a href="#" onclick="alert('Contate o administrador para novos cadastros')">Não tenho cadastro</a>
            </div>
        </div>
    </div>

    <div id="painel-adm" style="display: none;">
        <div class="header">
            <h2><i class="fab fa-spotify"></i> LUIGY ADM</h2>
            <div id="hora">00:00:00</div>
            <button class="btn-entrar" style="width: auto; padding: 8px 20px;" onclick="location.reload()">SAIR</button>
        </div>

        <div class="main-grid">
            <div class="col-left">
                <div class="card">
                    <h3>GERENCIAR EMISSORA</h3>
                    <div class="radio-grid" id="radio-list">
                        </div>
                </div>
                <div class="card">
                    <h3>GERENCIAR PUBLICIDADE</h3>
                    <div id="pub-list-admin">
                        </div>
                </div>
            </div>

            <div class="col-right">
                <div class="card">
                    <h3><i class="fas fa-users"></i> MONITOR DE OUVINTES</h3>
                    <div id="user-list">
                        </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBGGdz8gJSrXWqq3hSQIoe3pop5MGYt20Q",
            authDomain: "meu-painel-f2efe.firebaseapp.com",
            databaseURL: "https://meu-painel-f2efe-default-rtdb.firebaseio.com/",
            projectId: "meu-painel-f2efe"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // Relógio
        setInterval(() => {
            const h = document.getElementById('hora');
            if(h) h.innerText = new Date().toLocaleTimeString('pt-BR');
        }, 1000);

        function fazerLogin() {
            const email = document.getElementById('login-email').value;
            const senha = document.getElementById('login-senha').value;
            
            // Busca na nó 'contas' conforme seu banco
            db.ref('contas').orderByChild('email').equalTo(email).once('value', snap => {
                let user = null;
                snap.forEach(c => { if(c.val().senha == senha) user = c.val(); });
                
                if(user && user.tipo === 'admin') {
                    document.getElementById('login-screen').style.display = 'none';
                    document.getElementById('painel-adm').style.display = 'block';
                    carregarDados();
                } else {
                    alert("Acesso negado ou senha incorreta!");
                }
            });
        }

        function carregarDados() {
            // Carregar Rádios Existentes
            db.ref('radios').on('value', snap => {
                const list = document.getElementById('radio-list');
                list.innerHTML = "";
                snap.forEach(c => {
                    const r = c.val();
                    list.innerHTML += `<div class="radio-item" style="background:${r.color || '#fff'}">
                        <span>${r.name}</span>
                    </div>`;
                });
            });

            // Carregar Monitor de Ouvintes (Nomes em 'contas')
            db.ref('contas').on('value', snap => {
                const list = document.getElementById('user-list');
                list.innerHTML = "";
                snap.forEach(c => {
                    const u = c.val();
                    if(u.tipo !== 'admin') {
                        const isOnline = u.status === 'online';
                        list.innerHTML += `
                            <div class="user-item">
                                <strong>${u.nome ? u.nome.toUpperCase() : 'OUVINTE'}</strong>
                                <span class="${isOnline ? 'status-on' : 'status-off'}">${isOnline ? 'ONLINE' : 'OFFLINE'}</span>
                            </div>`;
                    }
                });
            });
        }
    </script>
</body>
</html>
