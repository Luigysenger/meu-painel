<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOGIN - SISTEMA</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #A020F0; --bg: #000; }
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: var(--bg); 
            color: white; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
        }
        .login-card { 
            background: #121212; 
            padding: 40px; 
            border-radius: 20px; 
            border: 1px solid #333; 
            text-align: center; 
            width: 100%; 
            max-width: 350px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        h2 { color: var(--primary); margin-bottom: 30px; text-transform: uppercase; letter-spacing: 2px; }
        input { 
            width: 100%; 
            padding: 15px; 
            margin-bottom: 20px; 
            background: #1a1a1a; 
            border: 1px solid #333; 
            border-radius: 10px; 
            color: white; 
            font-size: 16px; 
            box-sizing: border-box;
            outline: none;
            transition: 0.3s;
        }
        input:focus { border-color: var(--primary); }
        button { 
            width: 100%; 
            padding: 15px; 
            background: var(--primary); 
            color: white; 
            border: none; 
            border-radius: 10px; 
            font-weight: bold; 
            cursor: pointer; 
            font-size: 16px; 
            transition: 0.3s;
        }
        button:hover { filter: brightness(1.2); transform: scale(1.02); }
    </style>
</head>
<body>

    <div class="login-card">
        <h2>IDENTIFIQUE-SE</h2>
        <input type="text" id="nome-usuario" placeholder="DIGITE SEU NOME..." autocomplete="off">
        <button onclick="fazerLogin()">ENTRAR NO SISTEMA</button>
    </div>

    <script>
        function fazerLogin() {
            const nomeInput = document.getElementById('nome-usuario').value.trim();
            
            if (!nomeInput) {
                alert("Por favor, digite seu nome para entrar.");
                return;
            }

            // Salva o nome para usar nos painéis
            localStorage.setItem('usuarioNome', nomeInput);

            // Lógica de Redirecionamento
            if (nomeInput.toUpperCase() === "LUIGY") {
                window.location.href = 'adm.html';
            } else {
                window.location.href = 'ouvinte.html';
            }
        }

        // --- AJUSTE QUE VOCÊ PEDIU: FUNÇÃO PARA TECLA ENTER ---
        document.getElementById('nome-usuario').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                fazerLogin();
            }
        });
    </script>

</body>
</html>
