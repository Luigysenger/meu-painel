<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOGIN - MEU PAINEL</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #BF40BF; --bg: #0b0b0b; --card: #181818; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .login-container { background: var(--card); padding: 30px; border-radius: 20px; border: 1px solid #333; width: 90%; max-width: 350px; text-align: center; }
        h2 { color: var(--primary); margin-bottom: 25px; text-transform: uppercase; letter-spacing: 2px; }
        input { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #333; background: #0b0b0b; color: white; outline: none; box-sizing: border-box; margin-bottom: 10px; }
        input:focus { border-color: var(--primary); }
        .btn-acao { width: 100%; padding: 12px; border-radius: 10px; border: none; background: var(--primary); color: white; font-weight: bold; cursor: pointer; margin-top: 10px; transition: 0.3s; text-transform: uppercase; }
        .btn-acao:hover { opacity: 0.8; }
        .links { margin-top: 20px; font-size: 13px; }
        .links a { color: var(--primary); text-decoration: none; cursor: pointer; display: block; margin-bottom: 8px; }
        .hidden { display: none; }
        #msg-erro { color: #ff4444; font-size: 12px; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="login-container" id="box-login">
        <h2>Painel Login</h2>
        <input type="text" id="login-email" placeholder="Seu E-mail">
        <input type="password" id="login-senha" placeholder="Sua Senha">
        <button class="btn-acao" onclick="fazerLogin()">Entrar no Painel</button>
        <div id="msg-erro"></div>
        <div class="links">
            <a onclick="mostrarTela('cadastro')">Não tenho cadastro (Cadastrar)</a>
        </div>
    </div>

    <div class="login-container hidden" id="box-cadastro">
        <h2>Novo Cadastro</h2>
        <input type="text" id="cad-nome" placeholder="Nome Completo">
        <input type="text" id="cad-email" placeholder="E-mail">
        <input type="text" id="cad-cidade" placeholder="Cidade">
        <input type="text" id="cad-estado" placeholder="Estado (Ex: PR)">
        <input type="password" id="cad-senha" placeholder="Senha">
        <button class="btn-acao" id="btn-cadastrar" onclick="salvarCadastro()">Criar Minha Conta</button>
        <div class="links"><a onclick="mostrarTela('login')">Voltar para Login</a></div>
    </div>

    <script>
        // CONFIGURAÇÃO DO SEU FIREBASE
        const firebaseConfig = {
            apiKey: "AIzaSyBGGdz8gJSrXWqq3hSQIoe3pop5MGYt20Q",
            authDomain: "meu-painel-f2efe.firebaseapp.com",
            databaseURL: "https://meu-painel-f2efe-default-rtdb.firebaseio.com/",
            projectId: "meu-painel-f2efe"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function mostrarTela(tela) {
            document.getElementById('box-login').classList.add('hidden');
            document.getElementById('box-cadastro').classList.add('hidden');
            if(tela === 'login') document.getElementById('box-login').classList.remove('hidden');
            if(tela === 'cadastro') document.getElementById('box-cadastro').classList.remove('hidden');
        }

        // FUNÇÃO DE CADASTRO CORRIGIDA
        function salvarCadastro() {
            const btn = document.getElementById('btn-cadastrar');
            const nome = document.getElementById('cad-nome').value.trim();
            const email = document.getElementById('cad-email').value.trim().toLowerCase();
            const cidade = document.getElementById('cad-cidade').value.trim();
            const estado = document.getElementById('cad-estado').value.trim();
            const senha = document.getElementById('cad-senha').value.trim();

            if(!nome || !email || !cidade || !estado || !senha) {
                alert("Por favor, preencha todos os campos!");
                return;
            }

            btn.innerText = "CRIANDO...";
            btn.disabled = true;

            const pathEmail = email.replace(/\./g, ',');

            // Salvando no nó 'contas' como o seu Firebase exige
            db.ref('contas/' + pathEmail).set({
                nome: nome,
                email: email,
                cidade: cidade,
                estado: estado,
                senha: senha,
                perfil: "ouvinte",
                status: "Offline"
            }).then(() => {
                alert("Cadastro realizado com sucesso!");
                mostrarTela('login');
            }).catch((error) => {
                console.error(error);
                alert("Erro ao salvar: " + error.message);
            }).finally(() => {
                btn.innerText = "CRIAR MINHA CONTA";
                btn.disabled = false;
            });
        }

        function fazerLogin() {
            const email = document.getElementById('login-email').value.trim().toLowerCase();
            const senha = document.getElementById('login-senha').value.trim();
            const erro = document.getElementById('msg-erro');
            const pathEmail = email.replace(/\./g, ',');

            db.ref('contas/' + pathEmail).once('value', snap => {
                const u = snap.val();
                if(u && String(u.senha) === String(senha)) {
                    localStorage.setItem('usuarioNome', u.nome.toUpperCase());
                    // Redireciona para o painel em HTML
                    window.location.href = (u.perfil === 'adm') ? 'adm.html' : 'painel.html';
                } else {
                    erro.innerText = "E-mail ou Senha incorretos!";
                }
            });
        }
    </script>
</body>
</html>
