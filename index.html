<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ACESSO - LUIGY</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-card { background: #121212; padding: 40px; border-radius: 25px; width: 350px; text-align: center; }
        h2 { color: #A020F0; margin-bottom: 30px; text-transform: uppercase; letter-spacing: 2px; font-weight: 900; }
        
        /* ESTILO DOS SEUS INPUTS (IGUAL AO PRINT) */
        input { 
            width: 100%; 
            padding: 18px; 
            margin-bottom: 15px; 
            border-radius: 12px; 
            border: none; 
            background: #e8f0fe; 
            color: #000; 
            box-sizing: border-box; 
            font-size: 16px;
            outline: none;
        }
        
        /* ESTILO DO SEU BOTÃO (IGUAL AO PRINT) */
        button { 
            width: 100%; 
            padding: 18px; 
            border-radius: 12px; 
            border: none; 
            background: #A020F0; 
            color: white; 
            font-weight: 900; 
            cursor: pointer; 
            transition: 0.3s; 
            text-transform: uppercase; 
            font-size: 16px;
        }
        button:hover { filter: brightness(1.2); }
        .error-msg { color: #ff4444; font-size: 13px; margin-top: 15px; display: none; }
    </style>
</head>
<body>

    <div class="login-card">
        <h2>ACESSO</h2>
        <input type="text" id="login-user" placeholder="E-mail ou Usuário">
        <input type="password" id="login-pass" placeholder="Senha">
        <button onclick="fazerLogin()">ENTRAR</button>
        <div id="msg-erro" class="error-msg">DADOS INCORRETOS!</div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBGGdz8gJSrXWqq3hSQIoe3pop5MGYt20Q",
            authDomain: "meu-painel-f2efe.firebaseapp.com",
            databaseURL: "https://meu-painel-f2efe-default-rtdb.firebaseio.com/",
            projectId: "meu-painel-f2efe"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function fazerLogin() {
            const userRaw = document.getElementById('login-user').value.trim();
            const pass = document.getElementById('login-pass').value.trim();
            const erro = document.getElementById('msg-erro');

            if(!userRaw || !pass) return;

            // Mantendo sua lógica de login por nó de usuário
            const user = userRaw.split('@')[0];

            db.ref('usuarios/' + user).once('value', snap => {
                const dados = snap.val();
                if(dados && dados.senha === pass) {
                    localStorage.setItem('usuarioNome', user);
                    window.location.href = 'ouvinte.html';
                } else {
                    erro.style.display = 'block';
                    setTimeout(() => { erro.style.display = 'none'; }, 3000);
                }
            });
        }

        // --- AS ÚNICAS LINHAS QUE ADICIONEI PARA O ENTER ---
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                fazerLogin();
            }
        });
    </script>
</body>
</html>
