<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OUVINDO RÁDIO - Painel Pro Luigy</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <style>
        :root { --primary: #1DB954; --dark: #121212; --panel: #1e1e1e; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--dark); color: white; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        #login-screen { background: var(--panel); padding: 40px; border-radius: 16px; text-align: center; width: 320px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .logo-area h1 { color: var(--primary); margin-bottom: 20px; }
        .input-group { text-align: left; margin-bottom: 15px; }
        input { width: 100%; padding: 12px; margin-top: 5px; border-radius: 6px; border: 1px solid #333; background: #2a2a2a; color: white; box-sizing: border-box; }
        .btn-main { width: 100%; padding: 14px; border: none; border-radius: 25px; background: var(--primary); color: white; font-weight: bold; cursor: pointer; }
        #main-panel { display: none; flex-direction: column; align-items: center; width: 100%; }
        .radio-container { position: relative; width: 850px; height: 550px; background: #333; border: 10px solid #444; border-radius: 20px; }
        .tablet-screen { position: absolute; top: 10%; left: 25%; width: 50%; height: 75%; background: #000; border-radius: 10px; display: flex; flex-direction: column; overflow: hidden; border: 4px solid #111; }
        .tablet-header { background: var(--primary); padding: 8px; font-size: 11px; color: #000; font-weight: bold; display: flex; justify-content: space-between; align-items: center; }
        .creation-zone { background: #151515; padding: 10px; border-bottom: 1px solid #333; }
        .stations-grid { flex: 1; overflow-y: auto; padding: 15px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; background: #0a0a0a; }
        .radio-card { padding: 12px; border-radius: 8px; position: relative; text-align: center; cursor: pointer; color: #000; font-weight: bold; }
        .card-actions { position: absolute; top: 2px; right: 2px; }
        .info-bar { background: #111; padding: 8px; display: flex; justify-content: space-around; font-size: 11px; }
        .controls-bar { background: #181818; padding: 10px; display: flex; justify-content: center; gap: 15px; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="logo-area"><h1>📻 LUIGY PRO</h1></div>
        <div class="input-group"><label>Usuário</label><input type="text" id="user-input"></div>
        <div class="input-group"><label>Senha</label><input type="password" id="pass-input"></div>
        <button class="btn-main" onclick="handleLogin()">ENTRAR</button>
    </div>

    <div id="main-panel">
        <div class="radio-container">
            <div class="tablet-screen">
                <div class="tablet-header"><span>ADM: LUIGY</span><button onclick="location.reload()">SAIR</button></div>
                <div class="creation-zone">
                    <div id="step-1">
                        <input type="text" id="new-name" placeholder="Nome">
                        <button onclick="nextStep()" style="width:100%; margin-top:5px">PRÓXIMO ➔</button>
                    </div>
                    <div id="step-2" class="hidden">
                        <input type="text" id="new-url" placeholder="URL Streaming">
                        <button id="btn-save" onclick="saveToFirebase()" style="width:100%; margin-top:5px; background: orange">SALVAR NA NUVEM ☁️</button>
                    </div>
                </div>
                <div class="stations-grid" id="stations-grid"></div>
                <div class="info-bar">
                    <div><span id="display-time">00:00</span></div>
                    <div>Sincronizado via Google Cloud</div>
                </div>
                <div id="status-display" style="font-size:10px; text-align:center; color:var(--primary)">Pronto.</div>
                <div class="controls-bar">
                    <button onclick="prevRadio()">⏮️</button>
                    <button onclick="stopRadio()">⏹️</button>
                    <button onclick="nextRadio()">⏭️</button>
                </div>
            </div>
        </div>
    </div>

    <audio id="audio-player"></audio>

    <script>
        // Configuração Firebase vinculada ao projeto meu-painel-f2efe 
        const firebaseConfig = {
            apiKey: "AIzaSyBGGdz8gJSrXWqq3hSQIoe3pop5MGYt20Q",
            authDomain: "meu-painel-f2efe.firebaseapp.com",
            databaseURL: "https://meu-painel-f2efe-default-rtdb.firebaseio.com/",
            projectId: "meu-painel-f2efe",
            storageBucket: "meu-painel-f2efe.firebasestorage.app",
            messagingSenderId: "785606199615",
            appId: "1:785606199615:web:75042853c86726f3942b8a"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const player = document.getElementById('audio-player');
        let radioList = [];
        let currentIndex = -1;
        let editingKey = null;

        function handleLogin() {
            if(document.getElementById('user-input').value.toUpperCase() === "LUIGY" && document.getElementById('pass-input').value === "1045") {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('main-panel').style.display = 'flex';
                loadRadios();
                setInterval(() => { document.getElementById('display-time').innerText = new Date().toLocaleTimeString(); }, 1000);
            } else { alert("Erro!"); }
        }

        // Função que lê da nuvem em tempo real
        function loadRadios() {
            db.ref('radios').on('value', (snapshot) => {
                const data = snapshot.val();
                radioList = data ? Object.keys(data).map(key => ({key, ...data[key]})) : [];
                renderGrid();
            });
        }

        // Função que salva na nuvem para todos os PCs verem
        function saveToFirebase() {
            const name = document.getElementById('new-name').value;
            const url = document.getElementById('new-url').value;
            if(!name || !url) return;

            if(editingKey) {
                db.ref('radios/' + editingKey).update({ name, url });
                editingKey = null;
            } else {
                db.ref('radios').push({ 
                    name, 
                    url, 
                    color: `rgb(${Math.floor(Math.random()*56+200)},${Math.floor(Math.random()*56+200)},${Math.floor(Math.random()*56+200)})` 
                });
            }
            resetForm();
        }

        function renderGrid() {
            const grid = document.getElementById('stations-grid');
            grid.innerHTML = "";
            radioList.forEach((radio, index) => {
                const card = document.createElement('div');
                card.className = 'radio-card';
                card.style.backgroundColor = radio.color;
                card.innerHTML = `
                    <div class="card-actions">
                        <button onclick="event.stopPropagation(); deleteRadio('${radio.key}')">×</button>
                    </div>
                    <div onclick="playRadio(${index})">${radio.name}</div>
                `;
                grid.appendChild(card);
            });
        }

        function deleteRadio(key) { if(confirm("Apagar?")) db.ref('radios/' + key).remove(); }
        function playRadio(index) {
            currentIndex = index;
            player.src = radioList[index].url;
            player.play();
            document.getElementById('status-display').innerText = "Ouvindo: " + radioList[index].name;
        }
        function stopRadio() { player.pause(); document.getElementById('status-display').innerText = "Parado"; }
        function nextRadio() { if(radioList.length) playRadio((currentIndex+1)%radioList.length); }
        function prevRadio() { if(radioList.length) playRadio((currentIndex-1+radioList.length)%radioList.length); }
        function nextStep() { document.getElementById('step-1').classList.add('hidden'); document.getElementById('step-2').classList.remove('hidden'); }
        function resetForm() { document.getElementById('new-name').value = ""; document.getElementById('new-url').value = ""; document.getElementById('step-2').classList.add('hidden'); document.getElementById('step-1').classList.remove('hidden'); }
    </script>
</body>
</html>
