<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LOGIN - LUIGY PAINEL</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #BF40BF; --bg: #0b0b0b; --card: #181818; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; padding: 20px; box-sizing: border-box; }
        .login-container { background: var(--card); padding: 30px; border-radius: 20px; border: 1px solid #333; width: 100%; max-width: 350px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); box-sizing: border-box; }
        h2 { color: var(--primary); margin-bottom: 25px; text-transform: uppercase; letter-spacing: 2px; font-size: 20px; }
        .input-group { margin-bottom: 15px; text-align: left; }
        label { display: block; font-size: 11px; color: #888; margin-bottom: 5px; margin-left: 5px; text-transform: uppercase; }
        input { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #333; background: #0b0b0b; color: white; outline: none; box-sizing: border-box; transition: 0.3s; font-size: 16px; }
        input:focus { border-color: var(--primary); box-shadow: 0 0 8px rgba(191, 64, 191, 0.3); }
        .btn-acao { width: 100%; padding: 14px; border-radius: 10px; border: none; background: var(--primary); color: white; font-weight: bold; cursor: pointer; margin-top: 10px; transition: 0.3s; text-transform: uppercase; font-size: 14px; }
        .btn-acao:hover { background: #a332a3; transform: translateY(-2px); }
        #msg-erro { color: #ff4444; font-size: 12px; margin-top: 15px; font-weight: bold; min-height: 15px; }
        .links { margin-top: 20px; font-size: 12px; }
        .links a { color: var(--primary); text-decoration: none; cursor: pointer; display: block; margin-bottom: 8px; opacity: 0.8; }
        .links a:hover { opacity: 1; text-decoration: underline; }
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); align-items: center; justify-content: center; padding: 20px; }
        .modal-content { background: var(--card); border: 1px solid var(--primary); padding: 30px; border-radius: 20px; width: 100%; max-width: 350px; box-sizing: border-box; }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .btn-fechar { background: none; border: none; color: white; font-size: 20px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="login-container">
        <h2>Acesso ao Painel</h2>
        <div class="input-group">
            <label>E-mail ou Login</label>
            <input type="text" id="login-input" placeholder="exemplo@gmail.com" onkeypress="handleEnter(event, fazerLogin)">
        </div>
        <div class="input-group">
            <label>Senha</label>
            <input type="password" id="senha-input" placeholder="****" onkeypress="handleEnter(event, fazerLogin)">
        </div>
        <button class="btn-acao" onclick="fazerLogin()">Entrar no Painel</button>
        <div id="msg-erro"></div>
        <div class="links">
            <a onclick="abrirModal('modal-cadastro')">Não tenho cadastro</a>
            <a onclick="abrirModal('modal-esqueci')">Esqueci minha senha</a>
        </div>
    </div>

    <div id="modal-cadastro" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 style="margin:0; color:var(--primary)">CRIAR CONTA</h3>
                <button class="btn-fechar" onclick="fecharModal('modal-cadastro')">&times;</button>
            </div>
            <div class="input-group">
                <label>Seu Nome e Sobrenome</label>
                <input type="text" id="cad-nome" placeholder="Ex: João Silva" onkeypress="handleEnter(event, registrarUsuario)">
            </div>
            <div class="input-group">
                <label>E-mail</label>
                <input type="email" id="cad-email" placeholder="email@exemplo.com" onkeypress="handleEnter(event, registrarUsuario)">
            </div>
            <div class="input-group">
                <label>Senha</label>
                <input type="password" id="cad-senha" placeholder="Sua senha" onkeypress="handleEnter(event, registrarUsuario)">
            </div>
            <button class="btn-acao" onclick="registrarUsuario()">Cadastrar Agora</button>
        </div>
    </div>

    <div id="modal-esqueci" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 style="margin:0; color:var(--primary)">RECUPERAR</h3>
                <button class="btn-fechar" onclick="fecharModal('modal-esqueci')">&times;</button>
            </div>
            
            <div id="etapa-validar">
                <p style="font-size:12px; color:#888; text-align:center">Confirme seus dados para alterar a senha.</p>
                <div class="input-group">
                    <label>E-mail Cadastrado</label>
                    <input type="email" id="rec-email" placeholder="email@exemplo.com">
                </div>
                <div class="input-group">
                    <label>Primeiro Nome</label>
                    <input type="text" id="rec-nome" placeholder="Seu nome">
                </div>
                <button class="btn-acao" onclick="validarParaNovaSenha()">Validar Dados</button>
            </div>

            <div id="etapa-nova-senha" style="display:none">
                <p style="font-size:12px; color:#00ff00; text-align:center">Dados validados! Digite a nova senha.</p>
                <div class="input-group">
                    <label>Nova Senha</label>
                    <input type="password" id="nova-senha" placeholder="****">
                </div>
                <div class="input-group">
                    <label>Confirmar Nova Senha</label>
                    <input type="password" id="conf-nova-senha" placeholder="****">
                </div>
                <button class="btn-acao" onclick="salvarNovaSenha()">Salvar Nova Senha</button>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBGGdz8gJSrXWqq3hSQIoe3pop5MGYt20Q",
            authDomain: "meu-painel-f2efe.firebaseapp.com",
            databaseURL: "https://meu-painel-f2efe-default-rtdb.firebaseio.com/",
            projectId: "meu-painel-f2efe"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let usuarioChaveParaRecuperar = null;

        function abrirModal(id) { 
            document.getElementById(id).style.display = 'flex'; 
            if(id === 'modal-esqueci') {
                document.getElementById('etapa-validar').style.display = 'block';
                document.getElementById('etapa-nova-senha').style.display = 'none';
            }
        }
        function fecharModal(id) { document.getElementById(id).style.display = 'none'; }

        // FUNÇÃO PARA O TECLA ENTER
        function handleEnter(e, func) { if (e.key === 'Enter') { func(); } }

        function registrarUsuario() {
            const nomeInput = document.getElementById('cad-nome').value.trim();
            const email = document.getElementById('cad-email').value.trim().toLowerCase();
            const senha = document.getElementById('cad-senha').value.trim();
            if(!nomeInput || !email || !senha) return alert("Preencha todos os campos!");
            const idFirebase = email.replace(/\./g, ','); 
            db.ref('contas/' + idFirebase).once('value').then(snap => {
                if(snap.exists()) alert("Este e-mail já possui uma conta!");
                else {
                    db.ref('contas/' + idFirebase).set({
                        nome: nomeInput, email: email, senha: String(senha),
                        perfil: "ouvinte", status: "offline", lastSeen: Date.now()
                    }).then(() => {
                        alert("Cadastro realizado!");
                        fecharModal('modal-cadastro');
                    });
                }
            });
        }

        // VALIDAÇÃO EM 2 ETAPAS PARA NOVA SENHA
        function validarParaNovaSenha() {
            const email = document.getElementById('rec-email').value.trim().toLowerCase();
            const primeiroNome = document.getElementById('rec-nome').value.trim().toLowerCase();
            if(!email || !primeiroNome) return alert("Preencha os campos!");

            db.ref('contas').once('value').then(snap => {
                let achou = false;
                snap.forEach(child => {
                    const u = child.val();
                    const nomeNoBanco = u.nome.split(' ')[0].toLowerCase(); // Pega só o primeiro nome
                    if(u.email === email && nomeNoBanco === primeiroNome) {
                        achou = true;
                        usuarioChaveParaRecuperar = child.key;
                        document.getElementById('etapa-validar').style.display = 'none';
                        document.getElementById('etapa-nova-senha').style.display = 'block';
                    }
                });
                if(!achou) alert("E-mail ou nome não conferem!");
            });
        }

        function salvarNovaSenha() {
            const n1 = document.getElementById('nova-senha').value.trim();
            const n2 = document.getElementById('conf-nova-senha').value.trim();
            if(n1.length < 4) return alert("A senha deve ter pelo menos 4 caracteres.");
            if(n1 !== n2) return alert("As senhas não coincidem!");

            db.ref('contas/' + usuarioChaveParaRecuperar).update({
                senha: String(n1)
            }).then(() => {
                alert("Senha alterada com sucesso! Agora faça login.");
                fecharModal('modal-esqueci');
            });
        }

        function fazerLogin() {
            const loginInformado = document.getElementById('login-input').value.trim().toLowerCase();
            const senhaInformada = document.getElementById('senha-input').value.trim();
            const erroDiv = document.getElementById('msg-erro');
            if(!loginInformado || !senhaInformada) { erroDiv.innerText = "Preencha os campos!"; return; }
            erroDiv.innerText = "Verificando...";
            db.ref('contas').once('value').then(snap => {
                let usuarioEncontrado = null, chaveUsuario = null;
                snap.forEach(child => {
                    const u = child.val();
                    if ((u.email.toLowerCase() === loginInformado || u.nome.toLowerCase() === loginInformado) && String(u.senha) === String(senhaInformada)) {
                        usuarioEncontrado = u; chaveUsuario = child.key;
                    }
                });
                if (usuarioEncontrado) {
                    localStorage.setItem('usuarioNome', usuarioEncontrado.nome);
                    localStorage.setItem('usuarioKey', chaveUsuario);
                    db.ref('contas/' + chaveUsuario).update({ status: "online", lastSeen: Date.now() })
                    .then(() => { window.location.href = (usuarioEncontrado.perfil === "adm") ? 'adm.html' : 'ouvinte.html'; });
                } else { erroDiv.innerText = "E-mail ou Senha incorretos!"; }
            });
        }
    </script>
</body>
</html>
