<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISTEMA OUVINDO RÁDIO PRO</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <style>
        :root { --primary: #1DB954; --dark: #121212; --panel: #1e1e1e; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--dark); color: white; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow: hidden; }
        
        /* LOGIN E CADASTRO */
        .auth-card { background: var(--panel); padding: 30px; border-radius: 16px; text-align: center; width: 350px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .input-group { text-align: left; margin-bottom: 12px; }
        label { font-size: 11px; color: #b3b3b3; text-transform: uppercase; font-weight: bold; }
        input { width: 100%; padding: 12px; margin-top: 5px; border-radius: 6px; border: 1px solid #333; background: #2a2a2a; color: white; box-sizing: border-box; outline: none; }
        .btn-main { width: 100%; padding: 14px; border: none; border-radius: 25px; background: var(--primary); color: white; font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        
        /* PAINEL TABLET */
        #main-panel { display: none; flex-direction: column; align-items: center; width: 100%; }
        .radio-container { position: relative; width: 850px; height: 600px; background: #333; border: 10px solid #444; border-radius: 20px; }
        .tablet-screen { position: absolute; top: 10%; left: 25%; width: 50%; height: 75%; background: #000; border-radius: 10px; display: flex; flex-direction: column; overflow: hidden; border: 4px solid #111; }
        .tablet-header { background: var(--primary); padding: 8px 15px; font-size: 11px; color: #000; font-weight: bold; display: flex; justify-content: space-between; align-items: center; }
        
        .stations-grid { flex: 1; overflow-y: auto; padding: 15px; background: #0a0a0a; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; align-content: start; }
        .radio-card { padding: 15px 5px; border-radius: 8px; text-align: center; color: #000; font-weight: bold; cursor: pointer; font-size: 12px; position: relative; }
        .radio-card.active { border: 2px solid white; transform: scale(1.05); }

        /* ADM TOOLS */
        .admin-only { background: #151515; padding: 10px; border-bottom: 1px solid #333; }
        .btn-tool { position: absolute; top: 2px; right: 2px; font-size: 10px; background: rgba(0,0,0,0.2); border: none; cursor: pointer; }

        .info-bar { background: #111; padding: 8px; display: flex; flex-direction: column; font-size: 10px; border-top: 1px solid #333; }
        .info-row { display: flex; justify-content: space-around; width: 100%; padding-bottom: 5px; }
        .info-val { color: var(--primary); font-weight: bold; }
        
        /* MONITOR DE USUARIOS */
        #user-monitor { background: #000; padding: 8px; border-top: 1px solid #222; max-height: 60px; overflow-y: auto; text-align: center; }
        .user-tag { display: inline-block; background: #222; padding: 2px 8px; border-radius: 10px; margin: 2px; color: var(--primary); font-size: 9px; border: 1px solid #333; }

        .hidden { display: none; }
        .selection-item { background: #1a1a1a; padding: 10px; margin-bottom: 5px; border-radius: 5px; display: flex; justify-content: space-between; grid-column: span 2; font-size: 12px; }
    </style>
</head>
<body>

    <div id="login-screen" class="auth-card">
        <h1 style="color:var(--primary)">📻 OUVINDO RÁDIO</h1>
        <div class="input-group"><label>Usuário</label><input type="text" id="login-user"></div>
        <div class="input-group"><label>Senha</label><input type="password" id="login-pass"></div>
        <button class="btn-main" onclick="handleLogin()">ENTRAR</button>
        <p style="font-size:12px">Não tem conta? <span style="color:var(--primary);cursor:pointer" onclick="showScreen('register-screen')">Cadastre-se</span></p>
    </div>

    <div id="register-screen" class="auth-card hidden">
        <h1>CRIAR CONTA</h1>
        <div class="input-group"><label>Nome</label><input type="text" id="reg-name"></div>
        <div class="input-group"><label>Senha (4 números)</label><input type="password" id="reg-pass" maxlength="4"></div>
        <div class="input-group"><label>Confirmar Senha</label><input type="password" id="reg-confirm" maxlength="4"></div>
        <button class="btn-main" onclick="handleRegister()">FINALIZAR</button>
        <button class="btn-main" style="background:#444" onclick="showScreen('login-screen')">VOLTAR</button>
    </div>

    <div id="main-panel">
        <div class="radio-container">
            <div class="tablet-screen">
                <div class="tablet-header"><span id="user-display">PAINEL</span> <button onclick="location.reload()">SAIR</button></div>
                
                <div id="adm-zone" class="admin-only hidden">
                    <input type="text" id="new-name" placeholder="Nome da Rádio" style="width:70%; padding:5px">
                    <button onclick="nextStep()" style="padding:5px">Próximo</button>
                    <div id="step-2" class="hidden" style="margin-top:5px">
                        <input type="text" id="new-url" placeholder="Link da Rádio" style="width:70%; padding:5px">
                        <button id="btn-save" onclick="saveRadio()" style="background:orange">Salvar</button>
                    </div>
                </div>

                <div id="selection-zone" class="stations-grid hidden">
                    <p style="grid-column:span 2; font-size:10px">Selecione suas rádios:</p>
                    <div id="list-to-select" style="grid-column:span 2"></div>
                    <button class="btn-main" onclick="saveUserList()">CRIAR MINHA LISTA ONLINE</button>
                </div>

                <div id="player-zone" class="stations-grid hidden">
                    <div id="my-final-list" style="display:contents"></div>
                </div>

                <div class="info-bar">
                    <div class="info-row">
                        <div class="info-item"><span id="display-city">Buscando...</span> <span class="info-val" id="display-temp">--°C</span></div>
                        <div class="info-item"><span>Horário</span> <span class="info-val" id="display-time">00:00</span></div>
                        <div id="edit-list-btn" class="hidden" onclick="toggleEdit()" style="cursor:pointer;text-decoration:underline">Editar Lista</div>
                    </div>
                    
                    <div id="user-monitor" class="hidden">
                        <div style="font-size: 8px; color: #888; margin-bottom: 4px;">USUÁRIOS NO SISTEMA: <span id="user-count" style="color:var(--primary)">0</span></div>
                        <div id="user-list-display"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <audio id="audio-player"></audio>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBGGdz8gJSrXWqq3hSQIoe3pop5MGYt20Q",
            authDomain: "meu-painel-f2efe.firebaseapp.com",
            databaseURL: "https://meu-painel-f2efe-default-rtdb.firebaseio.com/",
            projectId: "meu-painel-f2efe",
            storageBucket: "meu-painel-f2efe.firebasestorage.app",
            messagingSenderId: "785606199615",
            appId: "1:785606199615:web:75042853c86726f3942b8a"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const player = document.getElementById('audio-player');
        
        let allRadios = [];
        let currentUser = "";
        let isAdmin = false;

        function showScreen(id) {
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('register-screen').classList.add('hidden');
            document.getElementById(id).classList.remove('hidden');
        }

        function handleRegister() {
            const n = document.getElementById('reg-name').value;
            const p = document.getElementById('reg-pass').value;
            if(p !== document.getElementById('reg-confirm').value) return alert("Senhas não batem!");
            db.ref('usuarios/' + n.toUpperCase()).set({ nome: n, senha: p, lista: "" });
            alert("Cadastrado! Faça login.");
            showScreen('login-screen');
        }

        function handleLogin() {
            const u = document.getElementById('login-user').value.toUpperCase();
            const p = document.getElementById('login-pass').value;
            
            if(u === "LUIGY" && p === "1045") {
                isAdmin = true;
                enterDashboard("LUIGY ADM", "");
                monitorUsers(); // Inicia monitoramento
                return;
            }

            db.ref('usuarios/' + u).once('value', (snap) => {
                const data = snap.val();
                if(data && data.senha === p) {
                    currentUser = u;
                    enterDashboard(data.nome, data.lista);
                } else { alert("Acesso negado!"); }
            });
        }

        async function enterDashboard(name, savedList) {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('main-panel').style.display = 'flex';
            document.getElementById('user-display').innerText = name.toUpperCase();
            
            startWeather();
            loadGlobalRadios(savedList);
            
            if(isAdmin) {
                document.getElementById('adm-zone').classList.remove('hidden');
                document.getElementById('player-zone').classList.remove('hidden');
                document.getElementById('user-monitor').classList.remove('hidden');
            }
        }

        // FUNÇÃO PARA MONITORAR USUÁRIOS (SÓ PRO ADM)
        function monitorUsers() {
            db.ref('usuarios').on('value', (snap) => {
                const users = snap.val();
                const display = document.getElementById('user-list-display');
                const count = document.getElementById('user-count');
                display.innerHTML = "";
                
                if(users) {
                    const list = Object.keys(users);
                    count.innerText = list.length;
                    list.forEach(u => {
                        display.innerHTML += `<span class="user-tag">${u}</span>`;
                    });
                }
            });
        }

        function loadGlobalRadios(savedList) {
            db.ref('radios').on('value', (snap) => {
                const data = snap.val();
                allRadios = data ? Object.keys(data).map(k => ({id: k, ...data[k]})) : [];
                
                if(isAdmin) {
                    renderPlayer(allRadios.map(r => r.id));
                } else if(savedList) {
                    renderPlayer(savedList.split(','));
                    document.getElementById('edit-list-btn').classList.remove('hidden');
                } else {
                    renderSelection();
                }
            });
        }

        function renderSelection() {
            document.getElementById('player-zone').classList.add('hidden');
            document.getElementById('selection-zone').classList.remove('hidden');
            const container = document.getElementById('list-to-select');
            container.innerHTML = "";
            allRadios.forEach(r => {
                container.innerHTML += `<div class="selection-item">${r.name} <input type="checkbox" class="r-check" value="${r.id}"></div>`;
            });
        }

        function saveUserList() {
            const selected = Array.from(document.querySelectorAll('.r-check:checked')).map(c => c.value);
            if(selected.length === 0) return alert("Escolha uma!");
            db.ref('usuarios/' + currentUser).update({ lista: selected.join(',') });
            location.reload(); 
        }

        function renderPlayer(ids) {
            document.getElementById('selection-zone').classList.add('hidden');
            document.getElementById('player-zone').classList.remove('hidden');
            const container = document.getElementById('my-final-list');
            container.innerHTML = "";
            
            allRadios.forEach(r => {
                if(ids.includes(r.id)) {
                    const card = document.createElement('div');
                    card.className = "radio-card";
                    card.style.backgroundColor = r.color;
                    card.innerHTML = `
                        ${isAdmin ? `<button class="btn-tool" onclick="deleteR('${r.id}')">X</button>` : ''}
                        <div>📻 ${r.name}</div>`;
                    card.onclick = () => { player.src = r.url; player.play(); };
                    container.appendChild(card);
                }
            });
        }

        function nextStep() { document.getElementById('step-2').classList.remove('hidden'); }
        function saveRadio() {
            const n = document.getElementById('new-name').value;
            const u = document.getElementById('new-url').value;
            const c = `rgb(${Math.random()*50+200},${Math.random()*50+200},${Math.random()*50+200})`;
            db.ref('radios').push({ name: n, url: u, color: c });
            document.getElementById('new-name').value=""; document.getElementById('new-url').value="";
            document.getElementById('step-2').classList.add('hidden');
        }
        function deleteR(id) { if(confirm("Excluir?")) db.ref('radios/'+id).remove(); }
        function toggleEdit() { renderSelection(); }

        function startWeather() {
            setInterval(() => { document.getElementById('display-time').innerText = new Date().toLocaleTimeString(); }, 1000);
            fetch('https://ipapi.co/json/').then(r=>r.json()).then(l => {
                document.getElementById('display-city').innerText = l.city;
                fetch(`https://api.open-meteo.com/v1/forecast?latitude=${l.latitude}&longitude=${l.longitude}&current_weather=true`)
                .then(r=>r.json()).then(w => { document.getElementById('display-temp').innerText = Math.round(w.current_weather.temperature)+"°C"; });
            });
        }
    </script>
</body>
</html>
