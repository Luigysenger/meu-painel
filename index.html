<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OUVINDO RÁDIO - Painel Pro Luigy</title>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <style>
        :root { --primary: #1DB954; --dark: #121212; --panel: #1e1e1e; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--dark); color: white; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        
        /* LOGIN */
        #login-screen { background: var(--panel); padding: 40px; border-radius: 16px; text-align: center; width: 350px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .logo-area h1 { color: var(--primary); margin-bottom: 20px; font-size: 28px; }
        .input-group { text-align: left; margin-bottom: 15px; }
        label { font-size: 12px; color: #b3b3b3; text-transform: uppercase; }
        input { width: 100%; padding: 12px; margin-top: 5px; border-radius: 6px; border: 1px solid #333; background: #2a2a2a; color: white; box-sizing: border-box; outline: none; transition: 0.3s; }
        input:focus { border-color: var(--primary); }
        .btn-main { width: 100%; padding: 14px; border: none; border-radius: 25px; background: var(--primary); color: white; font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        
        .login-footer { margin-top: 20px; display: flex; justify-content: space-between; font-size: 12px; }
        .login-footer a { color: #b3b3b3; text-decoration: none; cursor: pointer; }
        .login-footer a:hover { color: var(--primary); }

        /* PAINEL PRINCIPAL */
        #main-panel { display: none; flex-direction: column; align-items: center; width: 100%; }
        .radio-container { position: relative; width: 850px; height: 550px; background: #333; border: 10px solid #444; border-radius: 20px; box-shadow: 0 20px 50px rgba(0,0,0,0.8); }
        
        .tablet-screen { position: absolute; top: 10%; left: 25%; width: 50%; height: 75%; background: #000; border-radius: 10px; display: flex; flex-direction: column; overflow: hidden; border: 4px solid #111; }
        .tablet-header { background: var(--primary); padding: 8px; font-size: 11px; color: #000; font-weight: bold; display: flex; justify-content: space-between; align-items: center; padding: 5px 15px; }
        .btn-exit { background: #000; color: white; border: none; padding: 2px 8px; border-radius: 4px; cursor: pointer; font-size: 10px; }

        .creation-zone { background: #151515; padding: 10px; border-bottom: 1px solid #333; }
        .btn-step { width: 100%; padding: 8px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        
        .stations-grid { flex: 1; overflow-y: auto; padding: 20px 15px; display: grid; grid-template-columns: 1fr 1fr; gap: 15px; background: #0a0a0a; align-content: start; }
        
        .radio-card { padding: 15px 10px; border-radius: 8px; position: relative; text-align: center; border: 2px solid transparent; cursor: grab; transition: 0.3s; color: #000; }
        .radio-card.active { transform: scale(1.05); border: 2px solid var(--primary); z-index: 5; }
        
        .card-actions { position: absolute; top: 5px; right: 5px; display: flex; gap: 5px; }
        .btn-card { background: rgba(255,255,255,0.7); border: none; border-radius: 4px; cursor: pointer; font-size: 12px; padding: 2px 5px; }

        .info-bar { background: #111; border-top: 1px solid #333; padding: 10px; display: flex; justify-content: space-around; align-items: center; font-size: 12px; color: #eee; }
        .info-item { display: flex; flex-direction: column; align-items: center; }
        .info-val { font-weight: bold; color: var(--primary); }

        .controls-bar { background: #181818; padding: 12px; display: flex; justify-content: center; gap: 20px; border-top: 1px solid #333; }
        .ctrl-btn { background: none; border: none; color: white; font-size: 20px; cursor: pointer; }

        .hidden { display: none; }
        #status-display { font-size: 10px; color: var(--primary); text-align: center; background: #000; padding: 2px; min-height: 14px; }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="logo-area"><h1>📻 OUVINDO RÁDIO</h1></div>
        <div class="input-group">
            <label>Usuário</label>
            <input type="text" id="user-input" placeholder="Digite seu usuário">
        </div>
        <div class="input-group">
            <label>Senha</label>
            <input type="password" id="pass-input" placeholder="••••••••">
        </div>
        <button class="btn-main" onclick="handleLogin()">ENTRAR NO SISTEMA</button>
        
        <div class="login-footer">
            <a onclick="alert('Sistema de recuperação em manutenção. Contate o ADM.')">Esqueci a senha</a>
            <a onclick="alert('Novos cadastros estão suspensos temporariamente.')">Cadastrar</a>
        </div>
    </div>

    <div id="main-panel">
        <div class="radio-container">
            <div class="tablet-screen">
                <div class="tablet-header"><span>ADM: LUIGY</span><button class="btn-exit" onclick="logout()">SAIR 🚪</button></div>
                
                <div class="creation-zone">
                    <div id="step-1">
                        <input type="text" id="new-name" placeholder="Nome da Rádio">
                        <button class="btn-step" style="background:var(--primary); color:white" onclick="nextStep()">PRÓXIMO ➔</button>
                    </div>
                    <div id="step-2" class="hidden">
                        <input type="text" id="new-url" placeholder="Link da rádio (streaming)">
                        <button id="btn-save" class="btn-step" style="background:#ff9800; color:white" onclick="addNewRadio()">SALVAR RÁDIO 📻</button>
                    </div>
                </div>

                <div class="stations-grid" id="stations-grid"></div>

                <div class="info-bar">
                    <div class="info-item">
                        <span id="display-date">--/--/--</span>
                        <span class="info-val" id="display-time">00:00:00</span>
                    </div>
                    <div class="info-item">
                        <span id="display-city">Buscando...</span>
                        <span class="info-val"><span id="display-temp">--</span>°C</span>
                    </div>
                    <div class="info-item">
                        <span>Previsão</span>
                        <span style="font-size:18px" id="display-icon">☀️</span>
                    </div>
                </div>

                <div id="status-display">Sistema pronto.</div>

                <div class="controls-bar">
                    <button class="ctrl-btn" onclick="prevRadio()">⏮️</button>
                    <button class="ctrl-btn" onclick="stopRadio()">⏹️</button>
                    <button class="ctrl-btn" onclick="nextRadio()">⏭️</button>
                </div>
            </div>
        </div>
    </div>

    <audio id="audio-player"></audio>

    <script>
        const player = document.getElementById('audio-player');
        const grid = document.getElementById('stations-grid');
        const status = document.getElementById('status-display');
        
        function generateLightColor() {
            const r = Math.floor(Math.random() * 56) + 200;
            const g = Math.floor(Math.random() * 56) + 200;
            const b = Math.floor(Math.random() * 56) + 200;
            return `rgb(${r}, ${g}, ${b})`;
        }

        // --- RÁDIOS PADRÃO (Aparecem em qualquer lugar) ---
        let defaultRadios = [
            { id: 1, name: "Antena 1", url: "https://stream.antena1.com.br/stream/1;", color: "#d1ffd6" },
            { id: 2, name: "Ouro Verde FM", url: "https://25533.live.streamtheworld.com/OUROVERDEFM_SC", color: "#ffd1d1" }
        ];

        let radioList = JSON.parse(localStorage.getItem('luigy_radios_v2')) || defaultRadios;
        let currentIndex = -1;
        let editingIndex = -1;

        function updateDateTime() {
            const now = new Date();
            document.getElementById('display-time').innerText = now.toLocaleTimeString('pt-BR');
            document.getElementById('display-date').innerText = now.toLocaleDateString('pt-BR');
        }
        setInterval(updateDateTime, 1000);

        async function getClima() {
            try {
                const locRes = await fetch('https://ipapi.co/json/');
                const locData = await locRes.json();
                document.getElementById('display-city').innerText = locData.city.toUpperCase();
                const weatherRes = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${locData.latitude}&longitude=${locData.longitude}&current_weather=true`);
                const weatherData = await weatherRes.json();
                document.getElementById('display-temp').innerText = Math.round(weatherData.current_weather.temperature);
            } catch (e) { console.log("Erro clima"); }
        }

        new Sortable(grid, {
            animation: 150,
            onEnd: function() {
                const cards = grid.querySelectorAll('.radio-card');
                const newList = [];
                cards.forEach(card => {
                    const id = card.getAttribute('data-id');
                    newList.push(radioList.find(r => r.id == id));
                });
                radioList = newList;
                localStorage.setItem('luigy_radios_v2', JSON.stringify(radioList));
            }
        });

        function handleLogin() {
            const user = document.getElementById('user-input').value.toUpperCase();
            const pass = document.getElementById('pass-input').value;
            if (user === "LUIGY" && pass === "1045") {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('main-panel').style.display = 'flex';
                getClima();
                renderGrid();
            } else { alert("Senha Incorreta!"); }
        }

        function logout() { location.reload(); }

        function nextStep() {
            if(!document.getElementById('new-name').value) return alert("Digite o nome!");
            document.getElementById('step-1').classList.add('hidden');
            document.getElementById('step-2').classList.remove('hidden');
        }

        function addNewRadio() {
            let name = document.getElementById('new-name').value;
            let url = document.getElementById('new-url').value;
            
            if(editingIndex > -1) {
                radioList[editingIndex].name = name;
                radioList[editingIndex].url = url;
                editingIndex = -1;
                document.getElementById('btn-save').innerText = "SALVAR RÁDIO 📻";
            } else {
                radioList.push({ id: Date.now(), name, url, color: generateLightColor() });
            }
            
            localStorage.setItem('luigy_radios_v2', JSON.stringify(radioList));
            renderGrid();
            resetForm();
        }

        // --- FUNÇÃO DO LÁPIS CONSERTADA ---
        function editRadio(index) {
            editingIndex = index;
            const radio = radioList[index];
            
            // Preenche os campos
            document.getElementById('new-name').value = radio.name;
            document.getElementById('new-url').value = radio.url;
            
            // Muda o texto do botão
            document.getElementById('btn-save').innerText = "ATUALIZAR RÁDIO 🔄";
            
            // Volta para o primeiro passo para o usuário ver
            document.getElementById('step-1').classList.remove('hidden');
            document.getElementById('step-2').classList.add('hidden');
            
            status.innerText = "Editando: " + radio.name;
            window.scrollTo(0,0); // Sobe a tela no celular
        }

        function resetForm() {
            document.getElementById('new-name').value = "";
            document.getElementById('new-url').value = "";
            document.getElementById('step-2').classList.add('hidden');
            document.getElementById('step-1').classList.remove('hidden');
        }

        function renderGrid() {
            grid.innerHTML = "";
            radioList.forEach((radio, index) => {
                const card = document.createElement('div');
                card.className = `radio-card ${currentIndex === index ? 'active' : ''}`;
                card.setAttribute('data-id', radio.id);
                card.style.backgroundColor = radio.color;
                card.innerHTML = `
                    <div class="card-actions">
                        <button class="btn-card" onclick="event.stopPropagation(); editRadio(${index})">✏️</button>
                        <button class="btn-card" style="color:red" onclick="event.stopPropagation(); removeRadio(${index})">×</button>
                    </div>
                    <div onclick="playByIndex(${index})">
                        <div style="font-size:22px; margin-bottom:5px">${currentIndex === index ? '🔊' : '▶️'}</div>
                        <div style="font-size:13px; font-weight:bold;">${radio.name}</div>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        function playByIndex(index) {
            currentIndex = index;
            renderGrid();
            const radio = radioList[currentIndex];
            status.innerText = "Tocando: " + radio.name;
            player.src = radio.url;
            player.play().catch(() => status.innerText = "Erro no sinal!");
        }

        function stopRadio() {
            player.pause();
            currentIndex = -1;
            renderGrid();
            status.innerText = "Parado.";
        }

        function nextRadio() {
            if (radioList.length === 0) return;
            let next = (currentIndex + 1) >= radioList.length ? 0 : currentIndex + 1;
            playByIndex(next);
        }

        function prevRadio() {
            if (radioList.length === 0) return;
            let prev = (currentIndex - 1) < 0 ? radioList.length - 1 : currentIndex - 1;
            playByIndex(prev);
        }

        function removeRadio(index) {
            if(confirm("Remover rádio?")) {
                radioList.splice(index, 1);
                localStorage.setItem('luigy_radios_v2', JSON.stringify(radioList));
                renderGrid();
            }
        }
    </script>
</body>
</html>
