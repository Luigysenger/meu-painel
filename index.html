<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOGIN - MEU PAINEL</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #BF40BF; --bg: #0b0b0b; --card: #181818; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .login-container { background: var(--card); padding: 30px; border-radius: 20px; border: 1px solid #333; width: 90%; max-width: 350px; text-align: center; }
        h2 { color: var(--primary); margin-bottom: 25px; text-transform: uppercase; letter-spacing: 2px; }
        .input-group { margin-bottom: 15px; text-align: left; }
        label { display: block; font-size: 12px; color: #888; margin-bottom: 5px; margin-left: 5px; }
        input { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #333; background: #0b0b0b; color: white; outline: none; box-sizing: border-box; }
        input:focus { border-color: var(--primary); }
        .btn-acao { width: 100%; padding: 12px; border-radius: 10px; border: none; background: var(--primary); color: white; font-weight: bold; cursor: pointer; margin-top: 10px; transition: 0.3s; }
        .btn-acao:hover { opacity: 0.8; }
        .links { margin-top: 20px; font-size: 13px; }
        .links a { color: var(--primary); text-decoration: none; cursor: pointer; display: block; margin-bottom: 8px; }
        .hidden { display: none; }
        #msg-erro { color: #ff4444; font-size: 12px; margin-top: 10px; min-height: 15px; }
    </style>
</head>
<body>

    <div class="login-container" id="box-login">
        <h2>Painel Login</h2>
        <div class="input-group">
            <label>E-mail</label>
            <input type="text" id="login-email" placeholder="seu@email.com">
        </div>
        <div class="input-group">
            <label>Senha</label>
            <input type="password" id="login-senha" placeholder="****">
        </div>
        <button class="btn-acao" onclick="fazerLogin()">ENTRAR NO PAINEL</button>
        <div id="msg-erro"></div>
        <div class="links">
            <a onclick="mostrarTela('cadastro')">Não tenho cadastro (Cadastrar)</a>
            <a onclick="mostrarTela('esqueci')">Esqueci minha senha</a>
        </div>
    </div>

    <div class="login-container hidden" id="box-cadastro">
        <h2>Novo Cadastro</h2>
        <input type="text" id="cad-nome" placeholder="Nome Completo" style="margin-bottom:10px">
        <input type="text" id="cad-email" placeholder="E-mail" style="margin-bottom:10px">
        <input type="text" id="cad-cidade" placeholder="Cidade" style="margin-bottom:10px">
        <input type="text" id="cad-estado" placeholder="Estado (Ex: PR)" style="margin-bottom:10px">
        <input type="password" id="cad-senha" placeholder="Senha" style="margin-bottom:10px">
        <input type="password" id="cad-senha2" placeholder="Confirme a Senha" style="margin-bottom:15px">
        <button class="btn-acao" onclick="salvarCadastro()">CRIAR MINHA CONTA</button>
        <div class="links"><a onclick="mostrarTela('login')">Voltar para Login</a></div>
    </div>

    <div class="login-container hidden" id="box-esqueci">
        <h2>Recuperar Acesso</h2>
        <input type="text" id="rec-email" placeholder="E-mail cadastrado" style="margin-bottom:10px">
        <input type="text" id="rec-cidade" placeholder="Cidade cadastrada" style="margin-bottom:10px">
        <input type="text" id="rec-estado" placeholder="Estado cadastrado" style="margin-bottom:15px">
        <button class="btn-acao" onclick="validarDadosRecuperacao()">VALIDAR DADOS</button>
        <div class="links"><a onclick="mostrarTela('login')">Voltar para Login</a></div>
    </div>

    <div class="login-container hidden" id="box-nova-senha">
        <h2>Nova Senha</h2>
        <input type="password" id="nova-senha-1" placeholder="Nova Senha" style="margin-bottom:10px">
        <input type="password" id="nova-senha-2" placeholder="Confirme a Nova Senha" style="margin-bottom:15px">
        <button class="btn-acao" onclick="atualizarSenhaNoBanco()">SALVAR NOVA SENHA</button>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBGGdz8gJSrXWqq3hSQIoe3pop5MGYt20Q",
            authDomain: "meu-painel-f2efe.firebaseapp.com",
            databaseURL: "https://meu-painel-f2efe-default-rtdb.firebaseio.com/",
            projectId: "meu-painel-f2efe"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function mostrarTela(tela) {
            document.querySelectorAll('.login-container').forEach(c => c.classList.add('hidden'));
            if(tela === 'login') document.getElementById('box-login').classList.remove('hidden');
            if(tela === 'cadastro') document.getElementById('box-cadastro').classList.remove('hidden');
            if(tela === 'esqueci') document.getElementById('box-esqueci').classList.remove('hidden');
            if(tela === 'nova-senha') document.getElementById('box-nova-senha').classList.remove('hidden');
        }

        function salvarCadastro() {
            const nome = document.getElementById('cad-nome').value.trim();
            const email = document.getElementById('cad-email').value.trim().toLowerCase();
            const cidade = document.getElementById('cad-cidade').value.trim();
            const estado = document.getElementById('cad-estado').value.trim();
            const s1 = document.getElementById('cad-senha').value.trim();
            const s2 = document.getElementById('cad-senha2').value.trim();

            if(!nome || !email || !cidade || !estado || !s1) { alert("Preencha todos os campos!"); return; }
            if(s1 !== s2) { alert("As senhas não conferem!"); return; }

            const pathEmail = email.replace(/\./g, ',');
            
            // Gravação direta no nó 'contas' conforme seu banco
            db.ref('contas/' + pathEmail).set({
                nome: nome,
                email: email,
                cidade: cidade,
                estado: estado,
                senha: s1,
                perfil: "ouvinte",
                status: "Offline"
            }).then(() => { 
                alert("Cadastrado com sucesso!"); 
                mostrarTela('login'); 
            }).catch(e => alert("Erro ao cadastrar: " + e.message));
        }

        function fazerLogin() {
            const email = document.getElementById('login-email').value.trim().toLowerCase();
            const senha = document.getElementById('login-senha').value.trim();
            const erro = document.getElementById('msg-erro');
            const pathEmail = email.replace(/\./g, ',');

            db.ref('contas/' + pathEmail).once('value', snap => {
                const u = snap.val();
                if(u && String(u.senha) === String(senha)) {
                    localStorage.setItem('usuarioNome', u.nome.toUpperCase());
                    // Redirecionamento para arquivos .html conforme solicitado
                    window.location.href = (u.perfil === 'adm') ? 'adm.html' : 'painel.html';
                } else {
                    erro.innerText = "E-mail ou Senha incorretos!";
                }
            });
        }

        // Funções de recuperação mantidas iguais às suas
        let emailParaRecuperar = "";
        function validarDadosRecuperacao() {
            const email = document.getElementById('rec-email').value.trim().toLowerCase();
            const cidade = document.getElementById('rec-cidade').value.trim();
            const estado = document.getElementById('rec-estado').value.trim();
            const pathEmail = email.replace(/\./g, ',');
            db.ref('contas/' + pathEmail).once('value', snap => {
                const u = snap.val();
                if(u && u.cidade === cidade && u.estado === estado) {
                    emailParaRecuperar = pathEmail;
                    mostrarTela('nova-senha');
                } else { alert("Dados não conferem!"); }
            });
        }

        function atualizarSenhaNoBanco() {
            const s1 = document.getElementById('nova-senha-1').value.trim();
            db.ref('contas/' + emailParaRecuperar).update({ senha: s1 }).then(() => {
                alert("Senha atualizada!");
                mostrarTela('login');
            });
        }
    </script>
</body>
</html>
