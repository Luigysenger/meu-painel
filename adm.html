<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PAINEL ADM SUPREMO - LUIGY</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #1DB954; --bg: #000; --card: #121212; --text-muted: #b3b3b3; --purple-light: #800080; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; margin: 0; padding: 20px; user-select: none; }
        .header { display: flex; justify-content: space-between; align-items: center; background: #121212; padding: 20px 30px; border-radius: 15px; border: 1px solid #333; margin-bottom: 25px; }
        .header-left { display: flex; align-items: center; gap: 20px; }
        .header h2 { margin: 0; color: var(--primary); font-size: 22px; }
        
        .header-center { display: flex; align-items: center; gap: 10px; }
        .btn-msg-notif { background: #ff4444; color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; font-weight: bold; display: flex; align-items: center; gap: 8px; transition: 0.3s; }
        .btn-msg-notif:hover { transform: scale(1.05); background: #cc0000; }
        .btn-msg-notif span { background: white; color: #ff4444; padding: 2px 6px; border-radius: 50%; font-size: 12px; }

        .btn-header { background: none; border: 1px solid #333; color: white; padding: 5px 12px; border-radius: 8px; cursor: pointer; font-size: 14px; transition: 0.3s; display: flex; align-items: center; gap: 8px; }
        .btn-header:hover { background: #222; border-color: var(--primary); }
        .btn-sair { color: #ff4444; border-color: #442222; }
        .btn-sair:hover { background: #331111; border-color: #ff4444; }
        #hora { font-size: 26px; font-weight: 900; }

        /* Container de Mensagens Expandível */
        #container-mensagens-adm { max-height: 0; overflow: hidden; transition: max-height 0.5s ease-in-out; margin-bottom: 0; }
        #container-mensagens-adm.aberto { max-height: 2000px; margin-bottom: 25px; }
        
        .msg-grid-adm { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 15px; padding: 10px; background: #080808; border-radius: 15px; border: 1px solid #222; }
        .msg-card-individual { background: #181818; border: 1px solid #333; border-radius: 12px; padding: 15px; position: relative; }
        .msg-card-individual h4 { margin: 0 0 5px 0; color: var(--primary); font-size: 14px; display: flex; justify-content: space-between; }
        .msg-card-individual p { font-size: 13px; margin: 10px 0; line-height: 1.4; color: #eee; background: #222; padding: 8px; border-radius: 5px; }
        
        .reply-box { margin-top: 10px; display: flex; gap: 5px; }
        .reply-box input { flex: 1; padding: 8px; font-size: 12px; border-radius: 5px; border: 1px solid #444; background: #111; color: white; }
        .btn-send-reply { background: var(--primary); border: none; border-radius: 5px; padding: 0 10px; cursor: pointer; color: #000; }

        .msg-emoji-reply { display: grid; grid-template-columns: repeat(10, 1fr); gap: 5px; margin-top: 10px; border-top: 1px solid #222; padding-top: 10px; }
        .btn-emoji-small { background: none; border: none; font-size: 18px; cursor: pointer; transition: 0.2s; padding: 2px; }
        .btn-emoji-small:hover { transform: scale(1.3); }

        .main-grid { display: grid; grid-template-columns: 1.2fr 0.8fr; gap: 20px; max-width: 1400px; margin: 0 auto; }
        .card { background: var(--card); border-radius: 20px; padding: 20px; border: 1px solid #282828; margin-bottom: 20px; }
        h3 { color: var(--primary); font-size: 12px; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 15px; }
        
        .input-group { display: flex; gap: 10px; margin-bottom: 25px; }
        input, select { flex: 1; padding: 12px; background: #2a2a2a; border: none; color: white; border-radius: 8px; outline: none; }
        .btn-save { padding: 0 25px; background: var(--primary); border: none; border-radius: 8px; font-weight: bold; cursor: pointer; color: black; transition: 0.3s; }
        
        .radio-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 12px; }
        .radio-item { aspect-ratio: 1/1; border-radius: 15px; display: flex; flex-direction: column; justify-content: center; align-items: center; color: #000; font-weight: bold; font-size: 11px; text-align: center; padding: 10px; cursor: grab; transition: 0.3s; position: relative; }
        .radio-item.active { border: 3px solid white; box-shadow: 0 0 15px rgba(255,255,255,0.3); }

        .pub-list-item { background: #1a1a1a; margin-bottom: 8px; border-radius: 10px; padding: 10px; border-left: 4px solid var(--primary); }
        
        /* Ajuste do Monitor de Ouvintes */
        .user-item { margin-bottom: 8px; border-radius: 10px; overflow: hidden; transition: 0.3s; }
        .user-name-btn { width: 100%; display: flex; justify-content: space-between; align-items: center; padding: 15px; background: none; border: none; color: white; font-weight: bold; cursor: pointer; }
        .user-details-bar { display: none; padding: 15px; background: rgba(0,0,0,0.3); font-size: 13px; border-top: 1px solid rgba(255,255,255,0.1); }
        
        .player-footer { margin-top: 20px; background: #111; padding: 20px; border-radius: 20px; text-align: center; }
        .btn-spotify-play { width: 50px; height: 50px; background: white; border: none; border-radius: 50%; font-size: 20px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="header">
        <div class="header-left">
            <h2><i class="fab fa-spotify"></i> LUIGY ADM</h2>
            <button class="btn-header" onclick="location.reload()"><i class="fas fa-sync-alt"></i> REINICIAR</button>
            <button class="btn-header btn-sair" onclick="logout()"><i class="fas fa-sign-out-alt"></i> SAIR</button>
        </div>
        <div class="header-center">
            <button class="btn-msg-notif" onclick="toggleMensagens()">
                <i class="fas fa-envelope"></i> MENSAGENS <span id="count-msg">0</span>
            </button>
        </div>
        <div id="hora">00:00:00</div>
    </div>

    <div id="container-mensagens-adm">
        <div class="card">
            <h3>MENSAGENS RECEBIDAS</h3>
            <div id="msg-list-adm" class="msg-grid-adm"></div>
        </div>
    </div>

    <div class="main-grid">
        <div class="col-left">
            <div class="card">
                <h3>GERENCIAR EMISSORA</h3>
                <div class="input-group">
                    <input type="text" id="r-name" placeholder="Nome da Rádio">
                    <input type="text" id="r-url" placeholder="URL .mp3">
                    <input type="color" id="r-color" value="#1DB954" style="flex:0.2; padding:5px;">
                    <button class="btn-save" onclick="addRadio()">ADICIONAR</button>
                </div>
                <div id="radio-list" class="radio-grid"></div>
                
                <div class="player-footer">
                    <div id="now-title" style="margin-bottom:10px; font-size:12px; color:var(--text-muted);">PLAYBACK DE TESTE</div>
                    <button class="btn-spotify-play" onclick="togglePlay()"><i class="fas fa-play" id="play-icon"></i></button>
                </div>
            </div>

            <div class="card">
                <h3>GERENCIAR PUBLICIDADE</h3>
                <div class="input-group">
                    <input type="file" id="pub-file" accept="image/*">
                    <input type="datetime-local" id="pub-ini">
                    <input type="datetime-local" id="pub-fim">
                </div>
                <button class="btn-save" style="width:100%" onclick="savePub()">LANÇAR CAMPANHA</button>
                <div id="pub-list-admin" style="margin-top:20px;"></div>
            </div>
        </div>

        <div class="col-right">
            <div class="card">
                <h3><i class="fas fa-users"></i> MONITOR DE OUVINTES</h3>
                <div id="user-list"></div>
            </div>
        </div>
    </div>

    <audio id="audio-player"></audio>

    <script>
        // Configuração Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyBGGdz8gJSrXWqq3hSQIoe3pop5MGYt20Q",
            authDomain: "meu-painel-f2efe.firebaseapp.com",
            databaseURL: "https://meu-painel-f2efe-default-rtdb.firebaseio.com/",
            projectId: "meu-painel-f2efe"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const player = document.getElementById('audio-player');

        // Hora em tempo real
        setInterval(() => { document.getElementById('hora').innerText = new Date().toLocaleTimeString('pt-BR'); }, 1000);

        function logout() { localStorage.removeItem('usuarioNome'); window.location.href = 'index.html'; }
        function toggleMensagens() { document.getElementById('container-mensagens-adm').classList.toggle('aberto'); }

        // --- FUNÇÕES DE RÁDIO ---
        function addRadio() {
            const name = document.getElementById('r-name').value;
            const url = document.getElementById('r-url').value;
            const color = document.getElementById('r-color').value;
            if(name && url) {
                db.ref('radios').push({ name, url, color });
                document.getElementById('r-name').value = '';
                document.getElementById('r-url').value = '';
            }
        }

        db.ref('radios').on('value', snap => {
            const list = document.getElementById('radio-list');
            list.innerHTML = "";
            snap.forEach(c => {
                const r = c.val();
                const div = document.createElement('div');
                div.className = "radio-item";
                div.style.backgroundColor = r.color;
                div.innerHTML = `<span>${r.name}</span><i class="fas fa-times" style="position:absolute; top:5px; right:5px; cursor:pointer" onclick="db.ref('radios/${c.key}').remove()"></i>`;
                div.onclick = (e) => { if(e.target.tagName !== 'I') playRadio(r.url, r.name); };
                list.appendChild(div);
            });
        });

        function playRadio(url, name) {
            player.src = url;
            player.play();
            document.getElementById('now-title').innerText = "OUVINDO: " + name;
            document.getElementById('play-icon').className = "fas fa-pause";
        }

        function togglePlay() {
            if(player.paused) { player.play(); document.getElementById('play-icon').className = "fas fa-pause"; }
            else { player.pause(); document.getElementById('play-icon').className = "fas fa-play"; }
        }

        // --- MONITOR DE OUVINTES (A PARTE QUE VOCÊ GOSTOU) ---
        function toggleUserDetails(id) {
            const bar = document.getElementById('details-' + id);
            bar.style.display = (bar.style.display === 'block' ? 'none' : 'block');
        }

        db.ref('contas').on('value', snap => {
            const container = document.getElementById('user-list');
            container.innerHTML = "";
            snap.forEach(c => {
                const u = c.val(), id = c.key;
                let cardStyle = "";
                let statusText = "";
                let statusColor = "";
                let nomeExibicao = u.nome || u.usuario || id.replace(',', '.');

                if (u.perfil === "adm") {
                    cardStyle = "background-color: #808080; border: 1px solid #555;"; 
                    statusText = "ADM";
                    statusColor = "white";
                } else {
                    const isOnline = u.status && u.status.toLowerCase() === "online";
                    if (isOnline) {
                        cardStyle = "border: 2px solid #00ff00; background: #1a1a1a;"; 
                        statusText = "ON";
                        statusColor = "#00ff00"; 
                    } else {
                        cardStyle = "border: 2px solid #800080; background: #1a1a1a;"; 
                        statusText = "OFF";
                        statusColor = "#800080"; 
                    }
                }

                const div = document.createElement('div');
                div.className = "user-item";
                div.setAttribute("style", cardStyle);
                div.innerHTML = `
                    <div class="user-row">
                        <button class="user-name-btn" onclick="toggleUserDetails('${id}')">
                            <span>${nomeExibicao}</span> 
                            <span style="color: ${statusColor}; font-weight: 900;">${statusText}</span>
                        </button>
                    </div>
                    <div class="user-details-bar" id="details-${id}">
                        <p>Cidade: ${u.cidade || '---'}</p>
                        <p>Email: ${u.email || '---'}</p>
                        <button style="background:#444; color:white; border:none; padding:5px; cursor:pointer" onclick="db.ref('contas/${id}').update({senha:'0000'})">RESET SENHA</button>
                    </div>`;
                container.appendChild(div);
            });
        });

        // --- PUBLICIDADE ---
        function savePub() {
            const file = document.getElementById('pub-file').files[0];
            const ini = document.getElementById('pub-ini').value;
            const fim = document.getElementById('pub-fim').value;
            if(file && ini && fim) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    db.ref('publicidade').push({ img: e.target.result, inicio: ini, fim: fim });
                    alert("Publicidade Lançada!");
                };
                reader.readAsDataURL(file);
            }
        }

        db.ref('publicidade').on('value', snap => {
            const list = document.getElementById('pub-list-admin');
            list.innerHTML = "";
            snap.forEach(c => {
                const p = c.val();
                list.innerHTML += `<div class="pub-list-item">
                    <img src="${p.img}" width="50" style="border-radius:5px">
                    <span>Fim: ${p.fim}</span>
                    <i class="fas fa-trash" style="float:right; cursor:pointer" onclick="db.ref('publicidade/${c.key}').remove()"></i>
                </div>`;
            });
        });

        // --- MENSAGENS ---
        db.ref('mensagens_ouvintes').on('value', snap => {
            const list = document.getElementById('msg-list-adm');
            const count = document.getElementById('count-msg');
            list.innerHTML = "";
            let i = 0;
            snap.forEach(c => {
                i++;
                const m = c.val();
                list.innerHTML += `<div class="msg-card-individual">
                    <h4>${m.usuario} <i class="fas fa-trash" onclick="db.ref('mensagens_ouvintes/${c.key}').remove()"></i></h4>
                    <p>${m.mensagem}</p>
                </div>`;
            });
            count.innerText = i;
        });
    </script>
</body>
</html>
