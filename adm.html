<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PAINEL ADM SUPREMO - LUIGY</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #A020F0; --bg: #0b0b0b; --card: #181818; --danger: #ff4444; --success: #1DB954; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; margin: 0; padding: 20px; }

        .header-adm { background: var(--card); padding: 15px 25px; border-radius: 15px; border: 1px solid #333; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
        
        .section-title { color: var(--primary); font-weight: bold; margin-bottom: 15px; display: flex; align-items: center; gap: 10px; text-transform: uppercase; font-size: 14px; }

        /* FORMULÁRIO */
        .form-add { background: var(--card); padding: 20px; border-radius: 15px; border: 1px solid #333; margin-bottom: 20px; }
        .input-group { margin-bottom: 10px; }
        input { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #333; background: #0b0b0b; color: white; box-sizing: border-box; }
        .btn-save { width: 100%; padding: 10px; border-radius: 8px; border: none; background: var(--primary); color: white; font-weight: bold; cursor: pointer; }

        /* MONITOR DE OUVINTES - ONDE MUDA A BORDA */
        .user-item { 
            background: #181818; 
            margin-bottom: 8px; 
            border-radius: 10px; 
            overflow: hidden;
            transition: 0.3s;
            /* A cor da borda será aplicada via JS */
        }
        .user-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 15px; }
        .user-name-btn { background: none; border: none; color: white; font-weight: bold; cursor: pointer; text-align: left; flex: 1; }
        
        .status-on { color: var(--success); font-weight: bold; font-size: 11px; margin-left: 8px; }
        .status-off { color: var(--primary); font-weight: bold; font-size: 11px; margin-left: 8px; }

        .user-details-bar { display: none; background: #111; padding: 12px; font-size: 12px; border-top: 1px solid #222; }

        /* GRADE DE RADIOS */
        .radio-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 10px; }
        .radio-card { background: var(--card); padding: 15px; border-radius: 12px; border: 1px solid #333; text-align: center; position: relative; }
        .btn-del-radio { position: absolute; top: 5px; right: 5px; color: var(--danger); background: none; border: none; cursor: pointer; }
    </style>
</head>
<body>

    <div class="header-adm">
        <h2 style="margin:0; font-size:18px">PAINEL ADM SUPREMO</h2>
        <div id="relogio" style="color:var(--primary); font-weight:900">00:00:00</div>
    </div>

    <div class="form-add">
        <div class="section-title"><i class="fas fa-plus-circle"></i> Adicionar Nova Emissora</div>
        <div class="input-group"><input type="text" id="radio-nome" placeholder="Nome da Rádio"></div>
        <div class="input-group"><input type="text" id="radio-url" placeholder="Link .mp3 / Stream"></div>
        <button class="btn-save" onclick="addRadio()">SALVAR EMISSORA</button>
    </div>

    <div class="section-title"><i class="fas fa-users"></i> Monitor de Ouvintes</div>
    <div id="user-list" style="margin-bottom: 30px;"></div>

    <div class="section-title"><i class="fas fa-list"></i> Grade de Rádios</div>
    <div id="radio-grid" class="radio-list"></div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBGGdz8gJSrXWqq3hSQIoe3pop5MGYt20Q",
            authDomain: "meu-painel-f2efe.firebaseapp.com",
            databaseURL: "https://meu-painel-f2efe-default-rtdb.firebaseio.com/",
            projectId: "meu-painel-f2efe"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // Relógio
        setInterval(() => {
            document.getElementById('relogio').innerText = new Date().toLocaleTimeString();
        }, 1000);

        // Funções de Rádio
        function addRadio() {
            const nome = document.getElementById('radio-nome').value;
            const url = document.getElementById('radio-url').value;
            if(nome && url) {
                db.ref('radios').push({ name: nome, url: url, color: '#A020F0' });
                document.getElementById('radio-nome').value = '';
                document.getElementById('radio-url').value = '';
            }
        }

        db.ref('radios').on('value', snap => {
            const grid = document.getElementById('radio-grid');
            grid.innerHTML = "";
            snap.forEach(child => {
                const r = child.val();
                grid.innerHTML += `
                    <div class="radio-card">
                        <button class="btn-del-radio" onclick="deleteRadio('${child.key}')"><i class="fas fa-times"></i></button>
                        <div style="font-weight:bold">${r.name}</div>
                    </div>`;
            });
        });

        function deleteRadio(key) { db.ref('radios/' + key).remove(); }

        // MONITOR DE OUVINTES (COM AJUSTE DE BORDA)
        function formatarTempo(ts) {
            if(!ts) return "0 min";
            const diff = Math.floor((Date.now() - ts) / 60000);
            return diff < 1 ? "Agora" : diff + " min";
        }

        function toggleUserBar(id) {
            const bar = document.getElementById('bar-' + id);
            bar.style.display = (bar.style.display === 'block') ? 'none' : 'block';
        }

        db.ref('usuarios').on('value', snap => {
            const list = document.getElementById('user-list');
            list.innerHTML = "";
            snap.forEach(child => {
                const u = child.val();
                const id = child.key;
                
                const isOnline = (Date.now() - (u.lastSeen || 0) < 60000);
                const corBorda = isOnline ? '#1DB954' : '#A020F0';
                const statusTxt = isOnline ? 'ON' : 'OFF';
                const statusClass = isOnline ? 'status-on' : 'status-off';

                list.innerHTML += `
                    <div class="user-item" style="border-left: 5px solid ${corBorda}">
                        <div class="user-row">
                            <button class="user-name-btn" onclick="toggleUserBar('${id}')">
                                ${u.nome || id} <span class="${statusClass}">${statusTxt}</span>
                            </button>
                            <button onclick="db.ref('usuarios/${id}').remove()" style="background:none; border:none; color:#444; cursor:pointer">
                                <i class="fas fa-trash"></i>
                            </button>
                        </div>
                        <div class="user-details-bar" id="bar-${id}">
                            📻 Ouvindo: <b style="color:#1DB954">${u.radioAtual || '---'}</b><br>
                            ⏳ Na Rádio: <b>${formatarTempo(u.radioStart)}</b><br>
                            🚀 Sessão: <b>${formatarTempo(u.sessionStart)}</b>
                        </div>
                    </div>`;
            });
        });
    </script>
</body>
</html>
