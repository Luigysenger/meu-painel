<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PAINEL ADM SUPREMO - LUIGY</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #1DB954; --bg: #0b0b0b; --card: #181818; --danger: #ff4444; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; margin: 0; padding: 20px; user-select: none; }

        /* HEADER CLIMA */
        .info-header { display: flex; justify-content: space-between; align-items: center; background: var(--card); padding: 10px 25px; border-radius: 15px; margin-bottom: 20px; border: 1px solid #333; height: 85px; }
        .clima-container { display: flex; align-items: center; gap: 12px; }
        #cidade-nome { font-size: 11px; color: #888; text-transform: uppercase; font-weight: bold; letter-spacing: 1px; }
        #temp-valor { font-size: 32px; color: var(--primary); font-weight: 900; line-height: 1; }
        .date-display { text-align: right; color: var(--primary); }
        #hora-atual { font-size: 30px; font-weight: 900; display: block; line-height: 1; }

        /* LAYOUT */
        .main-container { display: grid; grid-template-columns: 1.2fr 0.8fr; gap: 20px; max-width: 1300px; margin: 0 auto; }
        .card { background: var(--card); border-radius: 15px; padding: 20px; border: 1px solid #222; }
        h3 { margin-top: 0; color: var(--primary); font-size: 11px; text-transform: uppercase; margin-bottom: 15px; border-bottom: 1px solid #333; padding-bottom: 5px; }

        /* FORMULÁRIO RÁDIO */
        .input-bar { display: flex; align-items: center; gap: 8px; margin-bottom: 20px; }
        input { padding: 10px; border-radius: 6px; border: 1px solid #333; background: #222; color: white; outline: none; flex: 1; }
        .btn-salvar { padding: 10px 20px; background: var(--primary); border: none; border-radius: 6px; font-weight: bold; cursor: pointer; color: #000; }
        
        /* RADIOS */
        .radio-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 12px; min-height: 100px; }
        .radio-square { aspect-ratio: 1/1; border-radius: 12px; padding: 10px; display: flex; flex-direction: column; justify-content: center; align-items: center; cursor: pointer; transition: 0.2s; color: #000; text-align: center; font-weight: bold; font-size: 12px; position: relative; }
        .radio-square.playing { background: #000 !important; color: var(--primary) !important; border: 2px solid var(--primary); box-shadow: 0 0 15px var(--primary); }
        .antena-piscando { position: absolute; top: 10px; font-size: 16px; color: var(--primary); display: none; animation: blink 1s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.1; } 100% { opacity: 1; } }

        /* MONITOR DE OUVINTES COM DELETE */
        .user-card { background: #222; padding: 12px; border-radius: 10px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; border-left: 4px solid #444; }
        .user-card.online { border-left-color: var(--primary); }
        .user-info-text { display: flex; flex-direction: column; }
        .user-name { font-weight: bold; font-size: 14px; }
        .user-city { font-size: 11px; color: #888; }
        
        .btn-delete-user { background: none; border: none; color: var(--danger); cursor: pointer; font-size: 18px; padding: 5px; transition: 0.3s; }
        .btn-delete-user:hover { transform: scale(1.2); filter: drop-shadow(0 0 5px var(--danger)); }

        /* PLAYER BAR */
        .player-footer { margin-top: 20px; background: #111; padding: 15px; border-radius: 12px; text-align: center; border: 1px solid #333; }
        .btn-play-main { width: 50px; height: 50px; border-radius: 50%; border: none; background: var(--primary); color: black; font-size: 20px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="info-header">
        <div class="clima-container">
            <div id="clima-icon-wrapper"><i class="fas fa-sun" style="color:var(--primary); font-size:30px"></i></div>
            <div class="clima-info">
                <span id="cidade-nome">BUSCANDO...</span>
                <span id="temp-valor">--°</span>
            </div>
        </div>
        <div class="date-display">
            <span id="hora-atual">00:00:00</span>
            <span id="data-extenso">...</span>
        </div>
    </div>

    <div class="main-container">
        <div class="side-left">
            <div class="card">
                <h3>Gerenciar Rádios</h3>
                <div class="input-bar">
                    <input type="text" id="r-nome" placeholder="Nome da Rádio">
                    <input type="text" id="r-url" placeholder="URL .mp3">
                    <button class="btn-salvar" onclick="saveRadio()">ADICIONAR</button>
                </div>
                <div class="radio-grid" id="radios-list"></div>
            </div>

            <div class="player-footer">
                <div id="status-play" style="font-size: 12px; color: #888; margin-bottom: 10px;">SELECIONE UMA RÁDIO</div>
                <button class="btn-play-main" onclick="togglePlay()"><i class="fas fa-play" id="icon-p"></i></button>
            </div>
        </div>

        <div class="side-right">
            <div class="card">
                <h3>Monitor de Ouvintes (Remover para recadastro)</h3>
                <div id="user-monitor"></div>
            </div>
        </div>
    </div>

    <audio id="audio-adm"></audio>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBGGdz8gJSrXWqq3hSQIoe3pop5MGYt20Q",
            authDomain: "meu-painel-f2efe.firebaseapp.com",
            databaseURL: "https://meu-painel-f2efe-default-rtdb.firebaseio.com/",
            projectId: "meu-painel-f2efe"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // Relógio e Data
        setInterval(() => {
            const agora = new Date();
            document.getElementById('hora-atual').textContent = agora.toLocaleTimeString('pt-BR');
            document.getElementById('data-extenso').textContent = agora.toLocaleDateString('pt-BR', {weekday:'long', day:'numeric', month:'long'});
        }, 1000);

        // Clima (Cascavel)
        async function getClima() {
            try {
                const res = await fetch(`https://api.weatherapi.com/v1/current.json?key=7662c16260844781a79133649241505&q=Cascavel&lang=pt`);
                const data = await res.json();
                document.getElementById('cidade-nome').textContent = data.location.name;
                document.getElementById('temp-valor').textContent = Math.round(data.current.temp_c) + "°";
            } catch (e) {}
        }
        getClima();

        // Gerenciar Rádios
        function saveRadio() {
            const n = document.getElementById('r-nome').value, u = document.getElementById('r-url').value;
            if(!n || !u) return;
            const color = `hsl(${Math.floor(Math.random() * 360)}, 70%, 80%)`;
            db.ref('radios').push({ name: n, url: u, color: color });
            document.getElementById('r-nome').value = ""; document.getElementById('r-url').value = "";
        }

        let radiosAtuais = [];
        db.ref('radios').on('value', snap => {
            const list = document.getElementById('radios-list'); list.innerHTML = ""; radiosAtuais = [];
            snap.forEach(c => {
                const r = c.val(); r.key = c.key; radiosAtuais.push(r);
                list.innerHTML += `<div class="radio-square" id="sq-${r.key}" style="background:${r.color}" onclick="playRadio('${r.key}', '${r.url}', '${r.name}')">
                    <i class="fas fa-tower-broadcast antena-piscando" id="ant-${r.key}"></i>
                    ${r.name}
                </div>`;
            });
        });

        // Player ADM
        const player = document.getElementById('audio-adm');
        function playRadio(key, url, nome) {
            player.src = url; player.play();
            document.getElementById('status-play').innerText = "OUVINDO: " + nome.toUpperCase();
            document.getElementById('icon-p').className = "fas fa-stop";
            document.querySelectorAll('.antena-piscando').forEach(a => a.style.display = 'none');
            document.getElementById('ant-'+key).style.display = 'block';
            document.querySelectorAll('.radio-square').forEach(s => s.classList.remove('playing'));
            document.getElementById('sq-'+key).classList.add('playing');
        }

        function togglePlay() {
            if(player.paused) { player.play(); document.getElementById('icon-p').className = "fas fa-stop"; }
            else { player.pause(); document.getElementById('icon-p').className = "fas fa-play"; }
        }

        // MONITOR DE OUVINTES COM OPÇÃO DE REMOVER
        db.ref('usuarios').on('value', snap => {
            const mon = document.getElementById('user-monitor'); mon.innerHTML = "";
            snap.forEach(c => {
                const u = c.val();
                const isOnline = (Date.now() - (u.lastSeen || 0) < 10000);
                mon.innerHTML += `
                    <div class="user-card ${isOnline ? 'online' : ''}">
                        <div class="user-info-text">
                            <span class="user-name">${u.nome} ${u.sobrenome || ''}</span>
                            <span class="user-city">${u.cidade || 'S/ Cidade'}</span>
                        </div>
                        <button class="btn-delete-user" onclick="removerOuvinte('${c.key}', '${u.nome}')" title="Excluir para recadastro">
                            <i class="fas fa-trash-alt"></i>
                        </button>
                    </div>`;
            });
        });

        function removerOuvinte(key, nome) {
            if(confirm(`Deseja remover o ouvinte ${nome}? Ele será desconectado e precisará cadastrar novamente com as novas regras.`)) {
                db.ref('usuarios/' + key).remove();
            }
        }

        Sortable.create(document.getElementById('radios-list'), { animation: 150 });
    </script>
</body>
</html>
