<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>PAINEL ADM - ACESSO DIRETO</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #1DB954; --bg: #000; --card: #121212; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; margin: 0; padding: 20px; }

        /* HEADER */
        .header { display: flex; justify-content: space-between; align-items: center; background: var(--card); padding: 15px 25px; border-radius: 15px; border: 1px solid #333; margin-bottom: 20px; }
        
        .main-grid { display: grid; grid-template-columns: 1.2fr 0.8fr; gap: 20px; max-width: 1300px; margin: 0 auto; }
        .card { background: var(--card); border-radius: 15px; padding: 20px; border: 1px solid #222; }

        /* RADIOS */
        .radio-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 12px; }
        .radio-box { aspect-ratio: 1/1; border-radius: 12px; display: flex; flex-direction: column; justify-content: center; align-items: center; color: #000; font-weight: bold; font-size: 13px; text-align: center; position: relative; }
        
        /* ANTENA PISCANDO */
        .antena { font-size: 24px; margin-bottom: 8px; animation: pisca 1s infinite; color: #000; }
        @keyframes pisca { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.2; transform: scale(0.9); } }

        /* MONITOR OUVINTES */
        .user-status { background: #1a1a1a; padding: 12px; border-radius: 10px; margin-bottom: 8px; border-left: 4px solid var(--primary); display: flex; justify-content: space-between; align-items: center; }

        /* PLAYER SPOTIFY STYLE */
        .player-footer { margin-top: 20px; background: #111; padding: 25px; border-radius: 20px; border: 1px solid #333; text-align: center; }
        .play-outer { position: relative; width: 75px; height: 75px; margin: 0 auto; display: flex; align-items: center; justify-content: center; }
        
        /* CÍRCULO VERDE RODANDO LENTO */
        .ring { position: absolute; width: 100%; height: 100%; border: 2px solid rgba(29, 185, 84, 0.1); border-top: 2px solid var(--primary); border-radius: 50%; animation: gira 4s linear infinite; }
        @keyframes gira { 100% { transform: rotate(360deg); } }

        .btn-play { width: 58px; height: 58px; background: white; border: none; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 22px; color: black; cursor: pointer; z-index: 5; }
    </style>
</head>
<body>

    <div class="header">
        <h2 style="color:var(--primary); margin:0;">PAINEL ADM - LUIGY SENGER</h2>
        <div id="hora" style="font-size: 22px; font-weight: 900;">00:00:00</div>
    </div>

    <div class="main-grid">
        <div class="col-left">
            <div class="card" style="margin-bottom:20px; display:flex; gap:10px;">
                <input type="text" id="rn" placeholder="Nome da Rádio" style="flex:1; padding:12px; background:#222; border:1px solid #444; color:white; border-radius:8px;">
                <input type="text" id="ru" placeholder="URL .mp3" style="flex:1; padding:12px; background:#222; border:1px solid #444; color:white; border-radius:8px;">
                <button onclick="addRadio()" style="padding:0 25px; background:var(--primary); border:none; border-radius:8px; font-weight:bold; cursor:pointer; color:black">SALVAR</button>
            </div>

            <div class="card">
                <h3 style="margin-top:0; color:var(--primary); font-size:12px;">📻 EMISSORAS</h3>
                <div class="radio-grid" id="lista-radios"></div>
                
                <div class="player-footer">
                    <div id="ouvindo" style="font-size:11px; color:#888; margin-bottom:15px; letter-spacing:1px;">CLIQUE EM UMA RÁDIO PARA OUVIR</div>
                    <div class="play-outer">
                        <div class="ring"></div>
                        <button class="btn-play" onclick="control()"><i class="fas fa-play" id="icon-play"></i></button>
                    </div>
                </div>
            </div>
        </div>

        <div class="col-right">
            <div class="card">
                <h3 style="margin-top:0; color:var(--primary); font-size:12px;">👥 MONITOR EM TEMPO REAL</h3>
                <div id="lista-usuarios"></div>
            </div>
        </div>
    </div>

    <script>
        // CONFIGURAÇÃO FIREBASE
        const firebaseConfig = {
            apiKey: "AIzaSyBGGdz8gJSrXWqq3hSQIoe3pop5MGYt20Q",
            authDomain: "meu-painel-f2efe.firebaseapp.com",
            databaseURL: "https://meu-painel-f2efe-default-rtdb.firebaseio.com/",
            projectId: "meu-painel-f2efe"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // RELÓGIO
        setInterval(() => {
            document.getElementById('hora').innerText = new Date().toLocaleTimeString('pt-BR');
        }, 1000);

        // CARREGAR RADIOS
        db.ref('radios').on('value', snap => {
            const list = document.getElementById('lista-radios');
            list.innerHTML = "";
            snap.forEach(c => {
                const r = c.val();
                list.innerHTML += `
                    <div class="radio-box" style="background:${r.color || '#1DB954'}">
                        <i class="fas fa-tower-broadcast antena"></i>
                        ${r.name}
                    </div>`;
            });
        });

        // MONITOR DE USUARIOS
        db.ref('usuarios').on('value', snap => {
            const mon = document.getElementById('lista-usuarios');
            mon.innerHTML = "";
            snap.forEach(c => {
                const u = c.val();
                const online = (Date.now() - (u.lastSeen || 0) < 30000);
                if(online) {
                    mon.innerHTML += `
                        <div class="user-status">
                            <div><b>${u.nome}</b><br><small style="color:#777">${u.radioAtual || 'Navegando'}</small></div>
                            <div style="width:10px; height:10px; background:var(--primary); border-radius:50%; box-shadow:0 0 10px var(--primary)"></div>
                        </div>`;
                }
            });
        });

        function addRadio() {
            const n = document.getElementById('rn').value;
            const u = document.getElementById('ru').value;
            if(n && u) {
                db.ref('radios').push({ name: n, url: u, color: '#1DB954' });
                document.getElementById('rn').value = ""; document.getElementById('ru').value = "";
            }
        }

        function control() {
            const icon = document.getElementById('icon-play');
            if(icon.classList.contains('fa-play')) {
                icon.classList.replace('fa-play', 'fa-pause');
            } else {
                icon.classList.replace('fa-pause', 'fa-play');
            }
        }
    </script>
</body>
</html>
