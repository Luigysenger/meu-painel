<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PAINEL ADM SUPREMO - LUIGY</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #1DB954; --bg: #000; --card: #121212; --text-muted: #b3b3b3; --purple-light: #d1a3ff; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; margin: 0; padding: 20px; user-select: none; }
        
        .header { display: flex; justify-content: space-between; align-items: center; background: #121212; padding: 20px 30px; border-radius: 15px; border: 1px solid #333; margin-bottom: 25px; flex-wrap: wrap; gap: 15px; }
        .header-left { display: flex; align-items: center; gap: 20px; flex-wrap: wrap; }
        .header h2 { margin: 0; color: var(--primary); font-size: 22px; }
        
        .header-center { display: flex; align-items: center; gap: 10px; }
        .btn-msg-notif { background: #ff4444; color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; font-weight: bold; display: flex; align-items: center; gap: 8px; transition: 0.3s; }
        .btn-msg-notif:hover { transform: scale(1.05); background: #cc0000; }
        .btn-msg-notif span { background: white; color: #ff4444; padding: 2px 6px; border-radius: 50%; font-size: 12px; }

        .btn-header { background: none; border: 1px solid #333; color: white; padding: 5px 12px; border-radius: 8px; cursor: pointer; font-size: 14px; transition: 0.3s; display: flex; align-items: center; gap: 8px; }
        .btn-header:hover { background: #222; border-color: var(--primary); }
        .btn-sair { color: #ff4444; border-color: #442222; }
        .btn-sair:hover { background: #331111; border-color: #ff4444; }
        #hora { font-size: 26px; font-weight: 900; }

        #container-mensagens-adm { max-height: 0; overflow: hidden; transition: max-height 0.5s ease-in-out; margin-bottom: 0; }
        #container-mensagens-adm.aberto { max-height: 2000px; margin-bottom: 25px; }
        
        .msg-grid-adm { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 15px; padding: 10px; background: #080808; border-radius: 15px; border: 1px solid #222; }
        .msg-card-individual { background: #181818; border: 1px solid #333; border-radius: 12px; padding: 15px; position: relative; }
        .msg-card-individual h4 { margin: 0 0 5px 0; color: var(--primary); font-size: 14px; display: flex; justify-content: space-between; }
        .msg-card-individual p { font-size: 13px; margin: 10px 0; line-height: 1.4; color: #eee; background: #222; padding: 8px; border-radius: 5px; }
        
        .reply-box { margin-top: 10px; display: flex; gap: 5px; }
        .reply-box input { flex: 1; padding: 8px; font-size: 12px; border-radius: 5px; border: 1px solid #444; background: #111; color: white; }
        .btn-send-reply { background: var(--primary); border: none; border-radius: 5px; padding: 0 10px; cursor: pointer; color: #000; }

        .msg-emoji-reply { display: grid; grid-template-columns: repeat(auto-fill, minmax(30px, 1fr)); gap: 5px; margin-top: 10px; border-top: 1px solid #222; padding-top: 10px; }
        .btn-emoji-small { background: none; border: none; font-size: 18px; cursor: pointer; transition: 0.2s; padding: 2px; }
        .btn-emoji-small:hover { transform: scale(1.3); }

        .actions-msg { margin-top: 15px; display: flex; justify-content: space-between; align-items: center; }
        .btn-del-msg { color: #ff4444; background: none; border: none; cursor: pointer; font-size: 12px; }

        .main-grid { display: grid; grid-template-columns: 1.2fr 0.8fr; gap: 20px; max-width: 1400px; margin: 0 auto; }
        
        @media (max-width: 900px) {
            .main-grid { grid-template-columns: 1fr; }
            .header { justify-content: center; text-align: center; }
            #hora { width: 100%; text-align: center; }
        }

        .card { background: var(--card); border-radius: 20px; padding: 20px; border: 1px solid #282828; margin-bottom: 20px; }
        h3 { color: var(--primary); font-size: 12px; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 15px; }
        
        .input-group { display: flex; gap: 10px; margin-bottom: 25px; flex-wrap: wrap; }
        input, select { flex: 1; min-width: 150px; padding: 12px; background: #2a2a2a; border: none; color: white; border-radius: 8px; outline: none; }
        
        .btn-save { padding: 12px 25px; background: var(--primary); border: none; border-radius: 8px; font-weight: bold; cursor: pointer; color: black; transition: 0.3s; }
        .btn-save:hover { filter: brightness(1.2); transform: scale(1.02); }
        
        .radio-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 12px; }
        .radio-item { aspect-ratio: 1/1; border-radius: 15px; display: flex; flex-direction: column; justify-content: center; align-items: center; color: #000; font-weight: bold; font-size: 13px; text-align: center; padding: 10px; cursor: grab; transition: 0.3s; position: relative; border: 2px solid transparent; touch-action: auto !important; }
        .radio-item:hover { transform: translateY(-5px); filter: brightness(1.1); }
        .radio-item:active { cursor: grabbing; }
        .radio-item.active { background: #000 !important; color: var(--primary) !important; border-color: var(--primary); box-shadow: 0 0 15px rgba(29, 185, 84, 0.4); }
        
        .radio-actions { position: absolute; top: 5px; right: 5px; display: flex; gap: 5px; opacity: 0.7; z-index: 10; }
        .radio-actions i { cursor: pointer; padding: 5px; background: rgba(0,0,0,0.1); border-radius: 5px; font-size: 12px; transition: 0.2s; }
        .radio-actions i:hover { opacity: 1; background: rgba(0,0,0,0.2); transform: scale(1.1); }
        .btn-edit-r { color: #000; }
        .btn-del-r { color: #800000; }

        .antena { font-size: 24px; margin-bottom: 8px; display: none; }
        .active .antena { display: block; animation: pulse-antena 1s infinite; }
        @keyframes pulse-antena { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.3; transform: scale(1.1); } }
        
        .pub-container { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        @media (max-width: 600px) { .pub-container { grid-template-columns: 1fr; } }

        .pub-preview { width: 100%; max-height: 100px; border-radius: 10px; object-fit: contain; margin-top: 10px; border: 1px dashed #444; display: none; }
        label { font-size: 10px; color: #888; display: block; margin-bottom: 5px; margin-left: 5px; }
        
        .pub-list-item { background: #1a1a1a; margin-bottom: 8px; border-radius: 10px; overflow: hidden; border-left: 4px solid var(--primary); transition: 0.3s; }
        .pub-list-row { display: flex; align-items: center; width: 100%; }
        .pub-list-btn { flex: 1; padding: 12px; background: none; border: none; color: white; text-align: left; font-size: 13px; cursor: pointer; display: flex; align-items: center; gap: 10px; }
        .pub-thumb-mini { width: 40px; height: 25px; object-fit: cover; border-radius: 4px; background: #000; }
        .pub-details-bar { display: none; padding: 10px 15px; font-size: 12px; color: #ccc; border-top: 1px solid #222; background: #141414; }

        .btn-action-pub { background: none; border: none; padding: 15px 10px; cursor: pointer; font-size: 14px; transition: 0.2s; }
        .btn-edit-pub { color: var(--primary); }
        .btn-delete-pub { color: #ff4444; }

        .user-item { background: #1a1a1a; margin-bottom: 8px; border-radius: 10px; overflow: hidden; }
        .user-row { display: flex; align-items: center; width: 100%; }
        .user-name-btn { flex: 1; padding: 15px; background: none; border: none; color: white; text-align: left; font-weight: bold; font-size: 14px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
        .status-on { color: #00ff00; font-weight: 900; font-size: 11px; }
        .status-off { color: #d1a3ff; font-weight: 900; font-size: 11px; }
        .user-details-bar { display: none; padding: 0 15px 15px 15px; font-size: 13px; color: #ccc; border-top: 1px solid #222; }

        .player-footer { margin-top: 20px; background: #111; padding: 25px; border-radius: 20px; border: 1px solid #222; text-align: center; }
        .controls-row { display: flex; align-items: center; justify-content: center; gap: 35px; }
        .btn-nav { background: none; border: none; color: #b3b3b3; font-size: 28px; cursor: pointer; transition: 0.3s; }
        .btn-nav:hover { color: white; transform: scale(1.3); }
        
        .play-outer { position: relative; width: 85px; height: 85px; display: flex; align-items: center; justify-content: center; }
        .ring-animation { position: absolute; width: 100%; height: 100%; border: 2px solid rgba(29, 185, 84, 0.1); border-top: 2px solid var(--primary); border-radius: 50%; animation: spin-slow 5s linear infinite; }
        @keyframes spin-slow { 100% { transform: rotate(360deg); } }
        
        .btn-spotify-play { width: 65px; height: 65px; background: white; border: none; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px; color: black; cursor: pointer; z-index: 5; transition: 0.2s; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-left">
            <h2><i class="fab fa-spotify"></i> LUIGY ADM</h2>
            <button class="btn-header" onclick="location.reload()"><i class="fas fa-sync-alt"></i> REINICIAR</button>
            <button class="btn-header btn-sair" onclick="logout()"><i class="fas fa-sign-out-alt"></i> SAIR</button>
        </div>
        <div class="header-center">
            <button class="btn-msg-notif" onclick="toggleMensagens()">
                <i class="fas fa-envelope"></i> MENSAGENS <span id="count-msg">0</span>
            </button>
        </div>
        <div id="hora">00:00:00</div>
    </div>

    <div id="container-mensagens-adm">
        <div class="card">
            <div style="display:flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                <h3>MENSAGENS DOS OUVINTES</h3>
                <button onclick="window.print()" class="btn-header" style="font-size: 11px;"><i class="fas fa-file-pdf"></i> PDF</button>
            </div>
            <div id="msg-list-adm" class="msg-grid-adm"></div>
        </div>
    </div>

    <div class="main-grid">
        <div class="col-left">
            <div class="card">
                <h3>GERENCIAR EMISSORA</h3>
                <div class="input-group">
                    <input type="hidden" id="r-key">
                    <input type="text" id="r-name" placeholder="Nome da Rádio">
                    <input type="text" id="r-url" placeholder="Link .mp3">
                    <button class="btn-save" id="btn-radio-action" onclick="addRadio()">SALVAR</button>
                </div>
                <h3>GRADE DE RÁDIOS (SEGURE PARA ARRASTAR NO CELULAR)</h3>
                <div id="radio-list" class="radio-grid"></div>
                
                <div class="player-footer">
                    <div id="now-title" style="font-size:11px; color:#888; margin-bottom:15px;">SELECIONE UMA RÁDIO</div>
                    <div class="controls-row">
                        <button class="btn-nav" onclick="prevRadio()"><i class="fas fa-step-backward"></i></button>
                        <div class="play-outer">
                            <div class="ring-animation" id="ring"></div>
                            <button class="btn-spotify-play" onclick="togglePlay()"><i class="fas fa-play" id="play-icon"></i></button>
                        </div>
                        <button class="btn-nav" onclick="nextRadio()"><i class="fas fa-step-forward"></i></button>
                    </div>
                </div>
            </div>

            <div class="card">
                <h3>GERENCIAR PUBLICIDADE</h3>
                <div class="pub-container">
                    <input type="hidden" id="pub-key">
                    <div>
                        <label>IMAGEM</label>
                        <input type="file" id="pub-file" accept="image/*" onchange="previewPub(this)">
                        <img id="pub-view" class="pub-preview">
                    </div>
                    <div>
                        <label>INÍCIO</label>
                        <input type="datetime-local" id="pub-ini">
                        <label>TÉRMINO</label>
                        <input type="datetime-local" id="pub-fim">
                        <label>ALVO</label>
                        <select id="pub-target" onchange="document.getElementById('pub-manual').style.display = (this.value=='MANUAL'?'block':'none')">
                            <option value="TODOS">TODOS OS OUVINTES</option>
                            <option value="MANUAL">SELECIONAR MANUAL</option>
                        </select>
                        <input type="text" id="pub-manual" placeholder="NOME DO OUVINTE" style="display:none; margin-top:5px;">
                    </div>
                </div>
                <button class="btn-save" id="btn-pub-save" style="width:100%; margin-top:15px; height:45px;" onclick="savePub()">LANÇAR CAMPANHA</button>
                <div id="pub-list-admin" style="margin-top:20px;"></div>
            </div>
        </div>

        <div class="col-right">
            <div class="card">
                <h3><i class="fas fa-users"></i> MONITOR DE OUVINTES</h3>
                <div id="user-list"></div>
            </div>
        </div>
    </div>

    <audio id="audio-player"></audio>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBGGdz8gJSrXWqq3hSQIoe3pop5MGYt20Q",
            authDomain: "meu-painel-f2efe.firebaseapp.com",
            databaseURL: "https://meu-painel-f2efe-default-rtdb.firebaseio.com/",
            projectId: "meu-painel-f2efe"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const player = document.getElementById('audio-player');
        
        let radioData = [];
        let activeIndex = -1;
        let usersDataCache = {};
        const emojisReply = ["👍", "❤️", "😂", "👏", "🔥", "🚀", "🎵", "📻", "🙌", "✅"];

        setInterval(() => {
            document.getElementById('hora').innerText = new Date().toLocaleTimeString('pt-BR');
            updateUserTimers();
        }, 1000);

        function logout() { if(confirm("Sair?")) { localStorage.removeItem('usuarioNome'); window.location.href = 'index.html'; } }
        function toggleMensagens() { document.getElementById('container-mensagens-adm').classList.toggle('aberto'); }

        // --- MENSAGENS ---
        db.ref('mensagens_ouvintes').on('value', snap => {
            const list = document.getElementById('msg-list-adm');
            const count = document.getElementById('count-msg');
            list.innerHTML = ""; let i = 0;
            snap.forEach(c => {
                const m = c.val(), id = c.key; i++;
                const card = document.createElement('div');
                card.className = "msg-card-individual";
                card.innerHTML = `
                    <h4><span>${m.usuario}</span> <small>${new Date(m.data).toLocaleTimeString()}</small></h4>
                    <p>${m.mensagem}</p>
                    <div class="reply-box">
                        <input type="text" id="input-reply-${id}" placeholder="Resposta...">
                        <button class="btn-send-reply" onclick="responderTexto('${id}')"><i class="fas fa-paper-plane"></i></button>
                    </div>
                    <div class="msg-emoji-reply">${emojisReply.map(e => `<button class="btn-emoji-small" onclick="responderEmoji('${id}', '${e}')">${e}</button>`).join('')}</div>
                    <div class="actions-msg"><button class="btn-del-msg" onclick="if(confirm('Excluir?')) db.ref('mensagens_ouvintes/${id}').remove()"><i class="fas fa-trash"></i></button></div>
                `;
                list.prepend(card);
            });
            count.innerText = i;
        });

        function responderEmoji(id, emoji) { db.ref('respostas_adm').push({ mensagemId: id, resposta: emoji, data: Date.now() }); }
        function responderTexto(id) {
            const c = document.getElementById('input-reply-' + id);
            if(c.value) { db.ref('respostas_adm').push({ mensagemId: id, resposta: c.value, data: Date.now() }); c.value = ""; }
        }

        // --- RÁDIOS ---
        db.ref('radios').on('value', snap => {
            radioData = [];
            snap.forEach(c => { radioData.push({ ...c.val(), key: c.key }); });
            radioData.sort((a,b) => (a.posicao || 0) - (b.posicao || 0));
            renderRadios();
        });

        function renderRadios() {
            const list = document.getElementById('radio-list');
            list.innerHTML = "";
            radioData.forEach((r, i) => {
                const div = document.createElement('div');
                div.className = `radio-item ${activeIndex === i ? 'active' : ''}`;
                div.style.background = r.color || '#f0f0f0';
                div.setAttribute('data-id', r.key);
                div.onclick = () => playRadio(i);
                div.innerHTML = `
                    <div class="radio-actions">
                        <i class="fas fa-pencil-alt btn-edit-r" onclick="event.stopPropagation(); prepareEditRadio('${r.key}','${r.name}','${r.url}')"></i>
                        <i class="fas fa-times btn-del-r" onclick="event.stopPropagation(); if(confirm('Excluir?')) db.ref('radios/${r.key}').remove()"></i>
                    </div>
                    <i class="fas fa-tower-broadcast antena"></i>
                    <span>${r.name}</span>
                `;
                list.appendChild(div);
            });
            
            if(!window.sortableIniciado && radioData.length > 0) {
                Sortable.create(list, { 
                    animation: 150,
                    delay: 200,
                    delayOnTouchOnly: true,
                    onEnd: () => {
                        list.querySelectorAll('.radio-item').forEach((it, idx) => {
                            db.ref('radios/' + it.dataset.id).update({ posicao: idx });
                        });
                    }
                });
                window.sortableIniciado = true;
            }
        }

        function addRadio() {
            const n = document.getElementById('r-name').value, u = document.getElementById('r-url').value, k = document.getElementById('r-key').value;
            if(n && u) {
                if(k) { db.ref('radios/'+k).update({name:n, url:u}); } 
                else {
                    const cores = ['#ffccd5', '#d8e2dc', '#ece4db', '#ffead0', '#e2ece9', '#f0efeb'];
                    const corAleatoria = cores[Math.floor(Math.random() * cores.length)];
                    db.ref('radios').push({ name: n, url: u, color: corAleatoria, posicao: radioData.length });
                }
                document.getElementById('r-name').value = ""; document.getElementById('r-url').value = ""; document.getElementById('r-key').value = "";
                document.getElementById('btn-radio-action').innerText = "SALVAR";
            }
        }

        function prepareEditRadio(k, n, u) {
            document.getElementById('r-key').value = k;
            document.getElementById('r-name').value = n;
            document.getElementById('r-url').value = u;
            document.getElementById('btn-radio-action').innerText = "ATUALIZAR";
        }

        function playRadio(idx) {
            activeIndex = idx; const r = radioData[idx];
            player.src = r.url; player.play();
            document.getElementById('now-title').innerText = "OUVINDO: " + r.name;
            document.getElementById('play-icon').className = "fas fa-stop";
            renderRadios();
        }

        function togglePlay() {
            if(!player.src) return;
            if(player.paused) { player.play(); document.getElementById('play-icon').className = "fas fa-stop"; }
            else { player.pause(); document.getElementById('play-icon').className = "fas fa-play"; }
        }

        function nextRadio() { if(radioData.length) playRadio((activeIndex + 1) % radioData.length); }
        function prevRadio() { if(radioData.length) playRadio((activeIndex - 1 + radioData.length) % radioData.length); }

        // --- PUBLICIDADE ---
        let imgBase64 = "";
        function previewPub(input) {
            const reader = new FileReader();
            reader.onload = (e) => { 
                imgBase64 = e.target.result; 
                document.getElementById('pub-view').src = imgBase64; 
                document.getElementById('pub-view').style.display = "block"; 
            };
            if(input.files[0]) reader.readAsDataURL(input.files[0]);
        }

        function savePub() {
            const ini = document.getElementById('pub-ini').value, fim = document.getElementById('pub-fim').value;
            const target = document.getElementById('pub-target').value, manual = document.getElementById('pub-manual').value.toUpperCase(), k = document.getElementById('pub-key').value;
            if(!imgBase64 || !ini || !fim) return alert("Preencha todos os campos da publicidade!");
            const d = { imagem: imgBase64, inicio: new Date(ini).getTime(), fim: new Date(fim).getTime(), destino: target, ouvinteAlvo: target === 'MANUAL' ? manual : 'TODOS' };
            if(k) {
                db.ref('publicidade/'+k).update(d).then(() => {
                    document.getElementById('pub-key').value = "";
                    document.getElementById('btn-pub-save').innerText = "LANÇAR CAMPANHA";
                    alert("Campanha Atualizada!");
                });
            } else {
                db.ref('publicidade').push(d);
                alert("Campanha Lançada com Sucesso!");
            }
            limparFormPub();
        }

        function prepareEditPub(k, img, ini, fim, target, manual) {
            document.getElementById('pub-key').value = k;
            imgBase64 = img;
            document.getElementById('pub-view').src = img;
            document.getElementById('pub-view').style.display = "block";
            const dIni = new Date(ini);
            dIni.setMinutes(dIni.getMinutes() - dIni.getTimezoneOffset());
            document.getElementById('pub-ini').value = dIni.toISOString().slice(0, 16);
            const dFim = new Date(fim);
            dFim.setMinutes(dFim.getMinutes() - dFim.getTimezoneOffset());
            document.getElementById('pub-fim').value = dFim.toISOString().slice(0, 16);
            document.getElementById('pub-target').value = target;
            document.getElementById('pub-manual').value = manual === 'TODOS' ? '' : manual;
            document.getElementById('pub-manual').style.display = (target === 'MANUAL' ? 'block' : 'none');
            document.getElementById('btn-pub-save').innerText = "ATUALIZAR CAMPANHA";
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function limparFormPub() {
            document.getElementById('pub-ini').value = "";
            document.getElementById('pub-fim').value = "";
            document.getElementById('pub-file').value = "";
            document.getElementById('pub-view').style.display = "none";
            document.getElementById('pub-manual').value = "";
            imgBase64 = "";
        }

        db.ref('publicidade').on('value', snap => {
            const list = document.getElementById('pub-list-admin');
            list.innerHTML = "";
            snap.forEach(c => {
                const p = c.val(), id = c.key;
                const div = document.createElement('div');
                div.className = "pub-list-item";
                div.innerHTML = `
                    <div class="pub-list-row">
                        <button class="pub-list-btn" onclick="this.parentElement.nextElementSibling.style.display=(this.parentElement.nextElementSibling.style.display=='block'?'none':'block')">
                            <img src="${p.imagem}" class="pub-thumb-mini">
                            <span>ALVO: ${p.ouvinteAlvo}</span>
                        </button>
                        <button class="btn-action-pub btn-edit-pub" onclick="prepareEditPub('${id}', '${p.imagem}', ${p.inicio}, ${p.fim}, '${p.destino}', '${p.ouvinteAlvo}')"><i class="fas fa-pencil-alt"></i></button>
                        <button class="btn-action-pub btn-delete-pub" onclick="if(confirm('Remover esta campanha?')) db.ref('publicidade/${id}').remove()"><i class="fas fa-trash"></i></button>
                    </div>
                    <div class="pub-details-bar">
                        <p>Início: ${new Date(p.inicio).toLocaleString()}</p>
                        <p>Fim: ${new Date(p.fim).toLocaleString()}</p>
                    </div>
                `;
                list.appendChild(div);
            });
        });

        // --- MONITOR DE OUVINTES (LOGICA PARA STATUS E TEMPO REAL) ---
        db.ref('contas').on('value', snap => {
            const container = document.getElementById('user-list');
            container.innerHTML = ""; 
            
            snap.forEach(c => {
                const u = c.val(), id = c.key;
                if(u.perfil === "adm" || u.tipo === "admin") return;
                
                // DETECÇÃO DE STATUS REAL: Borda roxa e Texto roxo se não estiver online
                const statusReal = (u.status === 'online') ? 'online' : 'offline';
                const isOnline = (statusReal === 'online');
                const safeId = id.replace(/[^a-zA-Z0-9]/g, '_');
                
                // GERENCIAMENTO DE CACHE PARA CRONÔMETRO
                if(!usersDataCache[safeId] || usersDataCache[safeId].radioAtual !== u.radioAtual) {
                    usersDataCache[safeId] = {
                        sessionStart: u.sessionStart || Date.now(),
                        radioTime: Date.now(), // Reseta o tempo localmente no ADM quando a rádio muda
                        radioAtual: u.radioAtual || 'Nenhuma',
                        isOnline: isOnline
                    };
                } else {
                    usersDataCache[safeId].isOnline = isOnline;
                }

                const div = document.createElement('div');
                div.className = "user-item";
                // Aplica a borda conforme o status (Verde Online / Roxo Offline)
                div.style.borderLeft = isOnline ? '4px solid #00ff00' : '4px solid #d1a3ff';
                
                div.innerHTML = `
                    <div class="user-row">
                        <button class="user-name-btn" onclick="toggleUserDetails('${safeId}')">
                            <span>${u.nome ? u.nome.toUpperCase() : 'OUVINTE'}</span>
                            <span class="${isOnline ? 'status-on' : 'status-off'}">${statusReal.toUpperCase()}</span>
                        </button>
                    </div>
                    <div class="user-details-bar" id="details-${safeId}">
                        <p>E-mail: <b>${u.email || id.replace(/,/g,'.')}</b></p>
                        <p>Rádio Conectada: <b style="color:var(--primary)">${u.radioAtual || 'Nenhuma'}</b></p>
                        <p>Tempo de Sessão: <b id="timer-sessao-${safeId}">00:00:00</b></p>
                        <p>Tempo nesta Rádio: <b id="timer-radio-${safeId}">00:00:00</b></p>
                        <p>Local: <b>${u.cidade || 'N/A'} - ${u.estado || ''}</b></p>
                    </div>`;
                container.appendChild(div);
            });
        });

        function toggleUserDetails(id) {
            const bar = document.getElementById('details-' + id);
            if(bar) bar.style.display = (bar.style.display === 'block' ? 'none' : 'block');
        }

        function updateUserTimers() {
            const agora = Date.now();
            for (let id in usersDataCache) {
                const data = usersDataCache[id];
                // Só incrementa o cronômetro se o status for estritamente online
                if (data.isOnline) {
                    const elSessao = document.getElementById(`timer-sessao-${id}`);
                    const elRadio = document.getElementById(`timer-radio-${id}`);
                    
                    if (elSessao) elSessao.innerText = formatDuration(agora - data.sessionStart);
                    if (elRadio) elRadio.innerText = formatDuration(agora - data.radioTime);
                }
            }
        }

        function formatDuration(ms) {
            if (ms < 0) ms = 0;
            const totalSegundos = Math.floor(ms / 1000);
            const h = Math.floor(totalSegundos / 3600);
            const m = Math.floor((totalSegundos % 3600) / 60);
            const s = totalSegundos % 60;
            return `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
        }
    </script>
</body>
</html>
