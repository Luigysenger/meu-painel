<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PAINEL ADM SUPREMO - LUIGY</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #1DB954; --bg: #0b0b0b; --card: #181818; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; margin: 0; padding: 20px; user-select: none; }

        /* BARRA DE INFO SUPERIOR */
        .info-header { display: flex; justify-content: space-between; align-items: center; background: var(--card); padding: 15px 25px; border-radius: 15px; margin-bottom: 20px; border: 1px solid #333; }
        .temp-display { color: #fff; font-weight: bold; font-size: 18px; display: flex; align-items: center; gap: 8px; }
        .date-display { text-align: right; font-size: 13px; color: #888; }

        .main-container { display: grid; grid-template-columns: 1.2fr 0.8fr; gap: 20px; max-width: 1300px; margin: 0 auto; }
        .card { background: var(--card); border-radius: 15px; padding: 20px; border: 1px solid #222; }
        h3 { margin-top: 0; color: var(--primary); font-size: 12px; text-transform: uppercase; margin-bottom: 15px; border-bottom: 1px solid #333; padding-bottom: 5px; }

        /* FORMULÁRIO */
        .form-row { display: flex; gap: 10px; margin-bottom: 20px; }
        input { flex: 1; padding: 12px; border-radius: 8px; border: 1px solid #333; background: #222; color: white; }
        .btn-salvar { padding: 12px 25px; background: var(--primary); border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }

        /* GRID DE RÁDIOS (QUADRADOS) */
        .radio-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 15px; min-height: 150px; }
        .radio-square { 
            aspect-ratio: 1/1; border-radius: 12px; position: relative; padding: 10px;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            cursor: grab; transition: all 0.2s; color: #000; text-align: center; font-weight: bold;
        }
        .radio-square:active { cursor: grabbing; }
        .radio-square:hover { filter: brightness(1.1); transform: translateY(-3px); }
        .radio-square.playing { background: #000 !important; color: var(--primary) !important; border: 2px solid var(--primary); box-shadow: 0 0 15px var(--primary); }

        .btn-edit-sq { position: absolute; top: 5px; left: 5px; background: rgba(0,0,0,0.1); border: none; border-radius: 4px; cursor: pointer; padding: 3px 6px; }
        .btn-del-sq { position: absolute; top: 5px; right: 5px; background: rgba(0,0,0,0.1); border: none; border-radius: 4px; cursor: pointer; padding: 3px 6px; color: #800; }

        /* PLAYER DE CONTROLE INFERIOR */
        .player-footer { margin-top: 20px; background: #111; padding: 15px; border-radius: 12px; border: 1px solid var(--primary); }
        .controls { display: flex; justify-content: center; align-items: center; gap: 20px; margin-top: 10px; }
        .btn-ctrl { background: none; border: none; color: white; font-size: 20px; cursor: pointer; transition: 0.2s; }
        .btn-ctrl:hover { color: var(--primary); transform: scale(1.2); }
        .btn-play-main { font-size: 35px; color: var(--primary); }

        .antena-piscando { animation: blink 1s infinite; margin-bottom: 5px; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.2; } }

        /* MONITOR */
        .user-card { background: #222; padding: 10px; border-radius: 8px; margin-bottom: 8px; border-left: 4px solid #444; }
    </style>
</head>
<body>

    <div class="info-header">
        <div class="temp-display">
            <span id="clima-icon"></span>
            <span id="cidade-nome">Carregando local...</span>
            <span id="temp-atual">--°C</span>
        </div>
        <div class="date-display">
            <div id="hora-atual" style="font-size: 18px; color: white; font-weight: bold;">00:00:00</div>
            <div id="data-extenso">...</div>
        </div>
    </div>

    <div class="main-container">
        <div class="side-left">
            <div class="card" style="margin-bottom: 20px;">
                <div class="form-row">
                    <input type="hidden" id="edit-id">
                    <input type="text" id="r-nome" placeholder="Nome da Rádio">
                    <input type="text" id="r-url" placeholder="Link do Streaming">
                    <button class="btn-salvar" id="btn-submit" onclick="saveRadio()">SALVAR</button>
                </div>
            </div>

            <div class="card">
                <h3>📻 GRADE DE EMISSORAS (Arraste para ordenar)</h3>
                <div class="radio-grid" id="radios-list"></div>

                <div class="player-footer">
                    <div style="text-align: center; font-size: 12px; color: #888;">
                        <i class="fas fa-tower-broadcast antena-piscando" id="antena-footer" style="display:none"></i>
                        OUVINDO AGORA: <b id="txt-ouvindo" style="color:var(--primary)">NENHUMA</b>
                    </div>
                    <div class="controls">
                        <button class="btn-ctrl" onclick="prevRadio()"><i class="fas fa-backward-step"></i></button>
                        <button class="btn-ctrl btn-play-main" id="play-pause" onclick="togglePlay()"><i class="fas fa-circle-play"></i></button>
                        <button class="btn-ctrl" onclick="stopRadio()"><i class="fas fa-circle-stop"></i></button>
                        <button class="btn-ctrl" onclick="nextRadio()"><i class="fas fa-forward-step"></i></button>
                    </div>
                    <audio id="main-player"></audio>
                </div>
            </div>
        </div>

        <div class="side-right">
            <div class="card">
                <h3>👥 MONITOR DE OUVINTES</h3>
                <div id="user-monitor"></div>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBGGdz8gJSrXWqq3hSQIoe3pop5MGYt20Q",
            authDomain: "meu-painel-f2efe.firebaseapp.com",
            databaseURL: "https://meu-painel-f2efe-default-rtdb.firebaseio.com/",
            projectId: "meu-painel-f2efe"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let currentRadioIndex = -1;
        let radioListArray = [];
        const player = document.getElementById('main-player');

        // --- RELÓGIO E CLIMA ---
        function updateClock() {
            const agora = new Date();
            document.getElementById('hora-atual').innerText = agora.toLocaleTimeString('pt-BR');
            document.getElementById('data-extenso').innerText = agora.toLocaleDateString('pt-BR', {weekday:'long', day:'numeric', month:'long', year:'numeric'});
        }
        setInterval(updateClock, 1000);

        async function getClima() {
            try {
                const ipRes = await fetch('https://ipapi.co/json/');
                const ipData = await ipRes.json();
                const city = ipData.city;
                document.getElementById('cidade-nome').innerText = city + " | ";
                const weather = await fetch(`https://api.openweathermap.org/data/2.5/weather?q=${city}&units=metric&appid=895284fb2d2c1d877c724822b7485303&lang=pt_br`);
                const wData = await weather.json();
                document.getElementById('temp-atual').innerText = Math.round(wData.main.temp) + "°C";
                document.getElementById('clima-icon').innerHTML = `<img src="https://openweathermap.org/img/wn/${wData.weather[0].icon}.png" width="30">`;
            } catch (e) {}
        }
        getClima();

        // --- DRAG AND DROP (ARRASTAR) ---
        const grid = document.getElementById('radios-list');
        Sortable.create(grid, { animation: 150, ghostClass: 'blue-background-class' });

        // --- FIREBASE RÁDIOS ---
        function saveRadio() {
            const n = document.getElementById('r-nome').value, u = document.getElementById('r-url').value, id = document.getElementById('edit-id').value;
            if(!n || !u) return;
            if(id) db.ref('radios/'+id).update({name:n, url:u});
            else db.ref('radios').push({name:n, url:u, bgColor: '#' + Math.floor(Math.random()*16777215).toString(16)});
            document.getElementById('r-nome').value=""; document.getElementById('r-url').value=""; document.getElementById('edit-id').value="";
        }

        db.ref('radios').on('value', snap => {
            grid.innerHTML = "";
            radioListArray = [];
            snap.forEach(child => {
                const r = child.val();
                r.key = child.key;
                radioListArray.push(r);
                grid.innerHTML += `
                    <div class="radio-square" id="sq-${r.key}" style="background:${r.bgColor || '#999'}" onclick="selectRadio('${radioListArray.length-1}')">
                        <button class="btn-edit-sq" onclick="event.stopPropagation(); editRadio('${r.key}','${r.name}','${r.url}')"><i class="fas fa-pencil"></i></button>
                        <button class="btn-del-sq" onclick="event.stopPropagation(); deleteRadio('${r.key}')"><i class="fas fa-x"></i></button>
                        <i class="fas fa-tower-broadcast antena-piscando" id="ant-${r.key}" style="display:none"></i>
                        <span>${r.name}</span>
                    </div>`;
            });
        });

        // --- CONTROLES DO PLAYER ---
        function selectRadio(index) {
            currentRadioIndex = parseInt(index);
            const radio = radioListArray[currentRadioIndex];
            player.src = radio.url;
            playRadio();
        }

        function playRadio() {
            player.play();
            const radio = radioListArray[currentRadioIndex];
            document.querySelectorAll('.radio-square').forEach(el => el.classList.remove('playing'));
            document.querySelectorAll('.antena-piscando').forEach(el => el.style.display = 'none');
            
            document.getElementById('sq-'+radio.key).classList.add('playing');
            document.getElementById('ant-'+radio.key).style.display = 'block';
            document.getElementById('antena-footer').style.display = 'inline-block';
            document.getElementById('txt-ouvindo').innerText = radio.name;
            document.getElementById('play-pause').innerHTML = '<i class="fas fa-circle-pause"></i>';
        }

        function togglePlay() {
            if(player.paused) player.play(), document.getElementById('play-pause').innerHTML = '<i class="fas fa-circle-pause"></i>';
            else player.pause(), document.getElementById('play-pause').innerHTML = '<i class="fas fa-circle-play"></i>';
        }

        function stopRadio() {
            player.pause(); player.src = "";
            document.getElementById('play-pause').innerHTML = '<i class="fas fa-circle-play"></i>';
            document.getElementById('txt-ouvindo').innerText = "PARADO";
        }

        function nextRadio() {
            currentRadioIndex = (currentRadioIndex + 1) % radioListArray.length;
            selectRadio(currentRadioIndex);
        }

        function prevRadio() {
            currentRadioIndex = (currentRadioIndex - 1 + radioListArray.length) % radioListArray.length;
            selectRadio(currentRadioIndex);
        }

        function deleteRadio(id) { if(confirm("Deletar rádio?")) db.ref('radios/'+id).remove(); }
        function editRadio(id,n,u) { 
            document.getElementById('edit-id').value=id; document.getElementById('r-nome').value=n; 
            document.getElementById('r-url').value=u; document.getElementById('btn-submit').innerText="EDITAR";
        }

        db.ref('usuarios').on('value', snap => {
            const mon = document.getElementById('user-monitor'); mon.innerHTML = "";
            snap.forEach(c => {
                const u = c.val(); const on = (Date.now() - (u.lastSeen || 0) < 30000);
                mon.innerHTML += `<div class="user-card" style="border-left-color:${on?'#1DB954':'red'}">
                    <b>${u.nome}</b> <small style="float:right;color:${on?'#1DB954':'red'}">${on?'ON':'OFF'}</small><br>
                    <small style="color:#666">Ouvindo: ${u.ouvindo || '---'}</small></div>`;
            });
        });
    </script>
</body>
</html>
