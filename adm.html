<div class="card" style="margin-top:20px;">
    <h3>GERENCIAR PUBLICIDADE</h3>
    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
        <div>
            <label style="font-size:10px; color:var(--primary)">IMAGEM DA CAMPANHA</label>
            <input type="file" id="pub-file" accept="image/*" onchange="previewImage(this)">
            <img id="pub-preview" style="width:100%; max-height:100px; object-fit:contain; margin-top:10px; display:none; border:1px solid #333;">
        </div>
        <div>
            <label style="font-size:10px; color:var(--primary)">AGENDAMENTO (INÍCIO E FIM)</label>
            <input type="datetime-local" id="pub-inicio">
            <input type="datetime-local" id="pub-fim">
            
            <label style="font-size:10px; color:var(--primary)">DESTINATÁRIOS</label>
            <select id="pub-destino">
                <option value="TODOS">X - TODOS OS OUVINTES</option>
                <option value="MANUAL">SELECIONAR MANUAL (DIGITE O NOME)</option>
            </select>
            <input type="text" id="pub-ouvinte-especifico" placeholder="Nome do Ouvinte (se manual)" style="display:none">
        </div>
    </div>
    <button class="btn-add" onclick="salvarPublicidade()" style="margin-top:15px">LANÇAR CAMPANHA</button>
</div>

<script>
// Lógica para o campo manual aparecer/sumir
document.getElementById('pub-destino').onchange = function() {
    document.getElementById('pub-ouvinte-especifico').style.display = this.value === 'MANUAL' ? 'block' : 'none';
};

let base64Image = "";
function previewImage(input) {
    const reader = new FileReader();
    reader.onload = function(e) {
        base64Image = e.target.result;
        const img = document.getElementById('pub-preview');
        img.src = base64Image;
        img.style.display = "block";
    };
    reader.readAsDataURL(input.files[0]);
}

function salvarPublicidade() {
    const inicio = document.getElementById('pub-inicio').value;
    const fim = document.getElementById('pub-fim').value;
    const destino = document.getElementById('pub-destino').value;
    const ouvinte = document.getElementById('pub-ouvinte-especifico').value.toUpperCase();

    if(!base64Image || !inicio || !fim) return alert("Preencha imagem e datas!");

    db.ref('publicidade').set({
        imagem: base64Image,
        inicio: new Date(inicio).getTime(),
        fim: new Date(fim).getTime(),
        destino: destino,
        ouvinteAlvo: destino === 'MANUAL' ? ouvinte : 'TODOS'
    }).then(() => alert("Publicidade Ativada!"));
}
</script>
