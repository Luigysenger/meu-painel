<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PAINEL ADM - LUIGY SENGER</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #1DB954; --bg: #0b0b0b; --card: #181818; --text: #ffffff; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; user-select: none; }
        
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; background: var(--card); padding: 20px; border-radius: 15px; border: 1px solid #333; }
        .admin-info { display: flex; align-items: center; gap: 15px; }
        .admin-name { font-size: 20px; font-weight: bold; color: var(--primary); }
        
        .main-grid { display: grid; grid-template-columns: 1fr 350px; gap: 20px; }
        .section-title { font-size: 14px; color: #888; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 15px; display: flex; align-items: center; gap: 10px; }
        
        .card { background: var(--card); padding: 20px; border-radius: 15px; border: 1px solid #333; }
        input { background: #222; border: 1px solid #444; color: white; padding: 12px; border-radius: 8px; width: calc(100% - 26px); margin-bottom: 10px; }
        .btn-save { background: var(--primary); border: none; color: black; padding: 12px; border-radius: 8px; width: 100%; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-save:hover { transform: scale(1.02); opacity: 0.9; }

        .radio-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 15px; margin-top: 20px; }
        .radio-item { aspect-ratio: 1/1; border-radius: 12px; display: flex; flex-direction: column; justify-content: center; align-items: center; cursor: grab; position: relative; font-weight: bold; text-align: center; padding: 10px; color: #000; }
        .btn-del { position: absolute; top: 5px; right: 5px; background: rgba(255,255,255,0.4); border: none; border-radius: 50%; width: 22px; height: 22px; cursor: pointer; font-weight: bold; }

        .monitor-list { display: flex; flex-direction: column; gap: 10px; }
        .user-status { background: #222; padding: 15px; border-radius: 10px; display: flex; justify-content: space-between; align-items: center; border-left: 4px solid #444; }
        .user-status.active { border-left-color: var(--primary); }
        .status-dot { width: 10px; height: 10px; border-radius: 50%; background: #444; }
        .active .status-dot { background: var(--primary); box-shadow: 0 0 10px var(--primary); }
    </style>
</head>
<body>

    <div class="header">
        <div class="admin-info">
            <i class="fas fa-user-shield" style="font-size: 30px; color: var(--primary);"></i>
            <div>
                <div class="admin-name" id="adm-perfil">CARREGANDO...</div>
                <div id="data-hora" style="font-size: 12px; color: #888;"></div>
            </div>
        </div>
        <button onclick="logout()" style="background:none; border:1px solid #ff4444; color:#ff4444; padding:8px 15px; border-radius:5px; cursor:pointer; font-weight:bold">SAIR</button>
    </div>

    <div class="main-grid">
        <div class="left-col">
            <div class="section-title"><i class="fas fa-plus-circle"></i> Cadastrar Emissora</div>
            <div class="card" style="display: flex; gap: 10px;">
                <input type="text" id="radio-name" placeholder="Nome">
                <input type="text" id="radio-url" placeholder="URL .mp3">
                <input type="color" id="radio-color" value="#1DB954" style="width: 80px; height: 45px; cursor:pointer">
                <button class="btn-save" onclick="addRadio()">SALVAR</button>
            </div>
            <div id="radio-list" class="radio-list"></div>
        </div>

        <div class="right-col">
            <div class="section-title"><i class="fas fa-users"></i> Monitor de Ouvintes</div>
            <div class="card monitor-list" id="user-monitor"></div>
        </div>
    </div>

    <script>
        // CONFIGURAÇÃO FIREBASE
        const firebaseConfig = {
            apiKey: "AIzaSyBGGdz8gJSrXWqq3hSQIoe3pop5MGYt20Q",
            authDomain: "meu-painel-f2efe.firebaseapp.com",
            databaseURL: "https://meu-painel-f2efe-default-rtdb.firebaseio.com/",
            projectId: "meu-painel-f2efe"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // --- SISTEMA DE LOGIN ADM ---
        function loginSistema() {
            const n = localStorage.getItem('adm_n');
            const s = localStorage.getItem('adm_s');
            const c = localStorage.getItem('adm_c');
            const p = localStorage.getItem('adm_p');

            // Se os dados não estiverem no computador, pede agora
            if (n !== "LUIGY" || s !== "SENGER" || c !== "CASCAVEL" || p !== "1045") {
                const inNome = prompt("Seu Nome (Maiúsculo):");
                const inSobrenome = prompt("Seu Sobrenome (Maiúsculo):");
                const inCidade = prompt("Sua Cidade (Maiúsculo):");
                const inSenha = prompt("Sua Senha:");

                if (inNome === "LUIGY" && inSobrenome === "SENGER" && inCidade === "CASCAVEL" && inSenha === "1045") {
                    localStorage.setItem('adm_n', "LUIGY");
                    localStorage.setItem('adm_s', "SENGER");
                    localStorage.setItem('adm_c', "CASCAVEL");
                    localStorage.setItem('adm_p', "1045");
                    window.location.reload();
                } else {
                    alert("DADOS INCORRETOS!");
                    window.location.href = "login.html"; // Mande para sua tela de login real aqui
                }
            } else {
                document.getElementById('adm-perfil').innerText = "ADM: " + n + " " + s + " (" + c + ")";
            }
        }
        loginSistema();

        function logout() {
            localStorage.clear();
            window.location.reload();
        }

        // --- FUNÇÕES DO PAINEL ---
        setInterval(() => {
            const now = new Date();
            document.getElementById('data-hora').innerText = now.toLocaleString('pt-BR');
        }, 1000);

        function addRadio() {
            const name = document.getElementById('radio-name').value;
            const url = document.getElementById('radio-url').value;
            const color = document.getElementById('radio-color').value;
            if (name && url) {
                db.ref('radios').push({ name, url, color });
                document.getElementById('radio-name').value = '';
                document.getElementById('radio-url').value = '';
            }
        }

        db.ref('radios').on('value', snap => {
            const list = document.getElementById('radio-list');
            list.innerHTML = "";
            snap.forEach(child => {
                const r = child.val();
                list.innerHTML += `
                    <div class="radio-item" style="background:${r.color}">
                        <button class="btn-del" onclick="deleteRadio('${child.key}')">×</button>
                        ${r.name}
                    </div>`;
            });
        });

        function deleteRadio(key) { if(confirm('Excluir?')) db.ref('radios/'+key).remove(); }

        db.ref('usuarios').on('value', snap => {
            const monitor = document.getElementById('user-monitor');
            monitor.innerHTML = "";
            snap.forEach(child => {
                const user = child.val();
                const isOnline = (Date.now() - user.lastSeen) < 15000;
                monitor.innerHTML += `
                    <div class="user-status ${isOnline ? 'active' : ''}">
                        <div>
                            <div style="font-weight:bold">${child.key.toUpperCase()}</div>
                            <div style="font-size:11px; color:#888">${user.radioAtual || 'Ouvindo nada'}</div>
                        </div>
                        <div class="status-dot"></div>
                    </div>`;
            });
        });

        Sortable.create(document.getElementById('radio-list'), { animation: 150 });
    </script>
</body>
</html>
