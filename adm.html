<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PAINEL ADM SUPREMO - LUIGY</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #A020F0; --bg: #0b0b0b; --card: #181818; --danger: #ff4444; --success: #1DB954; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; margin: 0; padding: 20px; }

        .header-adm { background: var(--card); padding: 20px; border-radius: 15px; border: 1px solid #333; margin-bottom: 20px; text-align: center; }
        h2 { color: var(--primary); margin: 0; text-transform: uppercase; letter-spacing: 2px; }

        /* MONITOR DE OUVINTES */
        .monitor-section { background: var(--card); padding: 20px; border-radius: 15px; border: 1px solid #333; }
        .monitor-title { display: flex; align-items: center; gap: 10px; margin-bottom: 15px; color: var(--primary); font-weight: bold; }
        
        #user-list { display: flex; flex-direction: column; gap: 10px; }

        .user-item { 
            background: #222; 
            border-radius: 10px; 
            overflow: hidden; 
            transition: 0.3s;
            border-left: 5px solid var(--primary); /* Borda padrão */
        }

        .user-row { display: flex; justify-content: space-between; align-items: center; padding: 12px 15px; }
        
        .user-name-btn { 
            background: none; border: none; color: white; font-weight: bold; 
            cursor: pointer; display: flex; align-items: center; gap: 10px; font-size: 14px;
        }

        .status-on { color: var(--success); font-size: 10px; font-weight: 900; }
        .status-off { color: var(--primary); font-size: 10px; font-weight: 900; }

        .btn-delete-user { background: none; border: none; color: #555; cursor: pointer; transition: 0.3s; }
        .btn-delete-user:hover { color: var(--danger); }

        .user-details-bar { 
            display: none; background: #1a1a1a; padding: 15px; 
            font-size: 13px; border-top: 1px solid #333; line-height: 1.6;
        }

        .user-details-bar b { color: var(--primary); }
    </style>
</head>
<body>

    <div class="header-adm">
        <h2>PAINEL ADM SUPREMO</h2>
        <p style="font-size: 12px; color: #888;">Monitoramento em Tempo Real</p>
    </div>

    <div class="monitor-section">
        <div class="monitor-title"><i class="fas fa-users"></i> MONITOR DE OUVINTES</div>
        <div id="user-list">
            </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBGGdz8gJSrXWqq3hSQIoe3pop5MGYt20Q",
            authDomain: "meu-painel-f2efe.firebaseapp.com",
            databaseURL: "https://meu-painel-f2efe-default-rtdb.firebaseio.com/",
            projectId: "meu-painel-f2efe"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function formatarTempo(valor) {
            const ts = parseInt(valor);
            if (!ts || isNaN(ts) || ts <= 0) return "0 min";
            const agora = Date.now();
            const diff = Math.floor((agora - ts) / 60000);
            return diff < 1 ? "Agora" : diff + " min";
        }

        function toggleUserBar(id) {
            const bar = document.getElementById('bar-' + id);
            bar.style.display = (bar.style.display === 'block') ? 'none' : 'block';
        }

        function deleteUser(id) {
            if(confirm("Deseja remover este ouvinte da lista?")) {
                db.ref('usuarios/' + id).remove();
            }
        }

        // --- MONITORAMENTO EM TEMPO REAL ---
        db.ref('usuarios').on('value', snap => {
            const container = document.getElementById('user-list');
            container.innerHTML = "";
            
            snap.forEach(c => {
                const u = c.val();
                const id = c.key;
                
                // Lógica de Status Online (1 minuto de tolerância)
                const ultimaVez = parseInt(u.lastSeen || 0);
                const isOnline = (Date.now() - ultimaVez < 60000);
                
                // Definição de Cores e Bordas
                const corStatus = isOnline ? '#1DB954' : '#A020F0';
                const textoStatus = isOnline ? 'ON' : 'OFF';
                const classeStatus = isOnline ? 'status-on' : 'status-off';

                container.innerHTML += `
                    <div class="user-item" style="border-left: 5px solid ${corStatus}">
                        <div class="user-row">
                            <button class="user-name-btn" onclick="toggleUserBar('${id}')">
                                <span>${u.nome || id}</span> 
                                <span class="${classeStatus}">${textoStatus}</span>
                            </button>
                            <button class="btn-delete-user" onclick="deleteUser('${id}')">
                                <i class="fas fa-trash-alt"></i>
                            </button>
                        </div>
                        <div class="user-details-bar" id="bar-${id}">
                            📻 Ouvindo agora: <b style="color:#1DB954">${u.radioAtual || "Navegando..."}</b><br>
                            ⏳ Tempo na rádio: <b>${formatarTempo(u.radioStart)}</b><br>
                            🚀 Sessão iniciada: <b>${formatarTempo(u.sessionStart)}</b>
                        </div>
                    </div>`;
            });
        });
    </script>
</body>
</html>
