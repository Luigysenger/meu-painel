<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PAINEL ADM SUPREMO - LUIGY</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #1DB954; --bg: #0b0b0b; --card: #181818; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; margin: 0; padding: 20px; user-select: none; }

        /* HEADER - BARRA SUPERIOR */
        .info-header { display: flex; justify-content: space-between; align-items: center; background: var(--card); padding: 10px 20px; border-radius: 15px; margin-bottom: 20px; border: 1px solid #333; height: 70px; }
        
        /* CLIMA LIMPO (CIDADE + TEMP) */
        .clima-container { display: flex; align-items: center; gap: 10px; }
        .clima-info { display: flex; flex-direction: column; justify-content: center; }
        #cidade-nome { font-size: 11px; color: #888; text-transform: uppercase; font-weight: bold; letter-spacing: 1px; margin-bottom: -2px; }
        #temp-valor { font-size: 26px; color: var(--primary); font-weight: 900; line-height: 1; }

        /* DATA E HORA */
        .date-display { text-align: right; color: var(--primary); }
        #hora-atual { font-size: 28px; font-weight: 900; display: block; line-height: 1; }
        #data-extenso { font-size: 12px; font-weight: 600; opacity: 0.8; }

        .main-container { display: grid; grid-template-columns: 1.2fr 0.8fr; gap: 20px; max-width: 1300px; margin: 0 auto; }
        .card { background: var(--card); border-radius: 15px; padding: 20px; border: 1px solid #222; }
        h3 { margin-top: 0; color: var(--primary); font-size: 11px; text-transform: uppercase; margin-bottom: 15px; border-bottom: 1px solid #333; padding-bottom: 5px; }

        /* RADIOS E MONITOR */
        .radio-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 10px; }
        .radio-square { aspect-ratio: 1/1; border-radius: 10px; padding: 10px; display: flex; flex-direction: column; justify-content: center; align-items: center; cursor: grab; transition: 0.2s; color: #000; text-align: center; font-weight: bold; font-size: 12px; }
        .radio-square.playing { background: #000 !important; color: var(--primary) !important; border: 2px solid var(--primary); }
        .user-card { background: #222; padding: 10px; border-radius: 8px; margin-bottom: 6px; border-left: 4px solid #444; font-size: 13px; }
        .user-card.online { border-left-color: var(--primary); }

        input { padding: 10px; border-radius: 6px; border: 1px solid #333; background: #222; color: white; outline: none; width: 150px; }
        .btn-salvar { padding: 10px 20px; background: var(--primary); border: none; border-radius: 6px; font-weight: bold; cursor: pointer; color: #000; }
        .player-footer { margin-top: 15px; background: #111; padding: 12px; border-radius: 10px; border: 1px solid #333; text-align: center; }
    </style>
</head>
<body>

    <div class="info-header">
        <div class="clima-container">
            <i class="fas fa-location-dot" style="color: var(--primary); font-size: 18px;"></i>
            <div class="clima-info">
                <span id="cidade-nome">CARREGANDO...</span>
                <span id="temp-valor">--°C</span>
            </div>
        </div>

        <div class="date-display">
            <span id="hora-atual">00:00:00</span>
            <span id="data-extenso">...</span>
        </div>
    </div>

    <div class="main-container">
        <div class="side-left">
            <div class="card" style="margin-bottom: 20px;">
                <input type="text" id="r-nome" placeholder="Nome da Rádio">
                <input type="text" id="r-url" placeholder="URL .mp3">
                <button class="btn-salvar" onclick="saveRadio()">SALVAR</button>
            </div>

            <div class="card">
                <h3>📻 EMISSORAS</h3>
                <div class="radio-grid" id="radios-list"></div>
                <div class="player-footer">
                    <div id="txt-ouvindo" style="font-size: 12px; color: #aaa;">PAUSADO</div>
                    <audio id="main-player"></audio>
                </div>
            </div>
        </div>

        <div class="side-right">
            <div class="card">
                <h3>👥 MONITOR DE OUVINTES</h3>
                <div id="user-monitor"></div>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBGGdz8gJSrXWqq3hSQIoe3pop5MGYt20Q",
            authDomain: "meu-painel-f2efe.firebaseapp.com",
            databaseURL: "https://meu-painel-f2efe-default-rtdb.firebaseio.com/",
            projectId: "meu-painel-f2efe"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // --- RELÓGIO ATUALIZADO ---
        setInterval(() => {
            const agora = new Date();
            document.getElementById('hora-atual').textContent = agora.toLocaleTimeString('pt-BR');
            document.getElementById('data-extenso').textContent = agora.toLocaleDateString('pt-BR', {weekday:'long', day:'numeric', month:'long'});
        }, 1000);

        // --- CLIMA MINIMALISTA VIA IP (SEM TEXTOS EXTRAS) ---
        async function getClima() {
            try {
                // Busca cidade e clima em um comando só usando o IP automático
                const res = await fetch(`https://api.weatherapi.com/v1/current.json?key=7662c16260844781a79133649241505&q=auto:ip&lang=pt`);
                const data = await res.json();

                if (data && data.location) {
                    document.getElementById('cidade-nome').textContent = data.location.name.toUpperCase();
                    document.getElementById('temp-valor').textContent = Math.round(data.current.temp_c) + "°";
                }
            } catch (e) {
                document.getElementById('cidade-nome').textContent = "CASCAVEL"; // Fallback baseado no seu log 
                document.getElementById('temp-valor').textContent = "22°";
            }
        }
        getClima();

        // --- LÓGICA DE RÁDIOS E MONITOR (Mantida conforme sua lista) ---
        let radioArray = [];
        const player = document.getElementById('main-player');

        function saveRadio() {
            const n = document.getElementById('r-nome').value, u = document.getElementById('r-url').value;
            if(!n || !u) return;
            const color = `hsl(${Math.floor(Math.random() * 360)}, 60%, 75%)`;
            db.ref('radios').push({ name: n, url: u, color: color });
            document.getElementById('r-nome').value=""; document.getElementById('r-url').value="";
        }

        db.ref('radios').on('value', snap => {
            const list = document.getElementById('radios-list'); list.innerHTML = "";
            snap.forEach(c => {
                const r = c.val();
                list.innerHTML += `<div class="radio-square" style="background:${r.color}">${r.name}</div>`;
            });
        });

        db.ref('usuarios').on('value', snap => {
            const mon = document.getElementById('user-monitor'); mon.innerHTML = "";
            snap.forEach(c => {
                const u = c.val(); const on = (Date.now() - (u.lastSeen || 0) < 30000);
                mon.innerHTML += `<div class="user-card ${on?'online':''}"><b>${u.nome}</b><br><small>${on?'Ativo':'Offline'}</small></div>`;
            });
        });
    </script>
</body>
</html>
