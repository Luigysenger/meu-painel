<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PAINEL ADM SUPREMO - LUIGY</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #1DB954; --bg: #000; --card: #121212; --text-muted: #b3b3b3; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; margin: 0; padding: 20px; user-select: none; }
        .header { display: flex; justify-content: space-between; align-items: center; background: #121212; padding: 20px 30px; border-radius: 15px; border: 1px solid #333; margin-bottom: 25px; }
        .btn-msg-notif { background: #ff4444; color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .main-grid { display: grid; grid-template-columns: 1.2fr 0.8fr; gap: 20px; max-width: 1400px; margin: 0 auto; }
        .card { background: var(--card); border-radius: 20px; padding: 20px; border: 1px solid #282828; margin-bottom: 20px; }
        .radio-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 12px; }
        .radio-item { aspect-ratio: 1/1; border-radius: 15px; display: flex; flex-direction: column; justify-content: center; align-items: center; color: #000; font-weight: bold; cursor: pointer; position: relative; }
        .input-group { display: flex; gap: 10px; margin-bottom: 20px; }
        input, select { flex: 1; padding: 12px; background: #2a2a2a; border: none; color: white; border-radius: 8px; }
        .btn-save { padding: 0 25px; background: var(--primary); border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .pub-preview { width: 100%; max-height: 100px; border-radius: 10px; object-fit: contain; margin-top: 10px; display: none; }
        .player-footer { margin-top: 20px; background: #111; padding: 20px; border-radius: 20px; border: 1px solid #222; text-align: center; }
        #container-mensagens-adm { max-height: 0; overflow: hidden; transition: 0.5s; }
        #container-mensagens-adm.aberto { max-height: 1000px; margin-bottom: 20px; }
        .user-item { background: #1a1a1a; margin-bottom: 8px; border-radius: 10px; padding: 10px; border-left: 5px solid #A020F0; }
    </style>
</head>
<body>

    <div class="header">
        <div class="header-left">
            <h2>PAINEL ADMINISTRATIVO</h2>
            <div id="hora">00:00:00</div>
        </div>
        <div class="header-center">
            <button class="btn-msg-notif" onclick="toggleMensagens()">
                MENSAGENS <span id="count-msg">0</span>
            </button>
        </div>
        <button class="btn-header btn-sair" onclick="logout()">SAIR</button>
    </div>

    <div id="container-mensagens-adm">
        <div class="msg-grid-adm" id="msg-list-adm"></div>
    </div>

    <div class="main-grid">
        <div class="left-col">
            <div class="card">
                <h3>GERENCIAR RÁDIOS</h3>
                <div class="input-group">
                    <input type="hidden" id="r-key">
                    <input type="text" id="r-name" placeholder="Nome da Rádio">
                    <input type="text" id="r-url" placeholder="URL do Stream">
                    <button class="btn-save" id="btn-radio-action" onclick="addRadio()">SALVAR</button>
                </div>
                <div class="radio-grid" id="radio-list"></div>
            </div>

            <div class="card">
                <h3>PUBLICIDADE / AVISOS</h3>
                <div class="pub-container">
                    <div>
                        <input type="file" id="pub-file" accept="image/*" onchange="previewPub(this)">
                        <img id="pub-view" class="pub-preview">
                        <input type="hidden" id="pub-key">
                        <label>INÍCIO</label>
                        <input type="datetime-local" id="pub-ini">
                        <label>FIM</label>
                        <input type="datetime-local" id="pub-fim">
                        <select id="pub-target" onchange="document.getElementById('pub-manual').style.display=(this.value==='MANUAL'?'block':'none')">
                            <option value="TODOS">TODOS OS OUVINTES</option>
                            <option value="MANUAL">OUVINTE ESPECÍFICO</option>
                        </select>
                        <input type="text" id="pub-manual" placeholder="NOME DO OUVINTE" style="display:none; margin-top:10px;">
                        <button class="btn-save" id="btn-pub-save" onclick="savePub()" style="width:100%; margin-top:15px; height:45px;">LANÇAR CAMPANHA</button>
                    </div>
                    <div id="pub-list-admin"></div>
                </div>
            </div>
        </div>

        <div class="right-col">
            <div class="card">
                <h3>OUVINTES ONLINE</h3>
                <div id="user-list"></div>
            </div>
        </div>
    </div>

    <div class="player-footer">
        <h4 id="now-title">PLAYER DE MONITORAMENTO</h4>
        <div class="controls-row">
            <button class="btn-nav" onclick="prevRadio()"><i class="fas fa-step-backward"></i></button>
            <button class="btn-spotify-play" onclick="togglePlay()"><i id="play-icon" class="fas fa-play"></i></button>
            <button class="btn-nav" onclick="nextRadio()"><i class="fas fa-step-forward"></i></button>
        </div>
    </div>

    <audio id="audio-player"></audio>

    <script>
        // SEGURANÇA (BOTÃO DIREITO E F12)
        document.addEventListener('contextmenu', e => e.preventDefault());
        document.addEventListener('keydown', e => {
            if (e.key === "F12" || (e.ctrlKey && e.shiftKey && (e.key === "I" || e.key === "J" || e.key === "C")) || (e.ctrlKey && e.key === "u")) e.preventDefault();
        });

        // CONFIGURAÇÃO FIREBASE
        const firebaseConfig = {
            apiKey: "AIzaSyBGGdz8gJSrXWqq3hSQIoe3pop5MGYt20Q",
            authDomain: "meu-painel-f2efe.firebaseapp.com",
            databaseURL: "https://meu-painel-f2efe-default-rtdb.firebaseio.com/",
            projectId: "meu-painel-f2efe"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const player = document.getElementById('audio-player');

        // LÓGICA DO RELÓGIO E DADOS
        setInterval(() => {
            document.getElementById('hora').innerText = new Date().toLocaleTimeString();
        }, 1000);

        function logout() { if(confirm("Sair?")) window.location.href='index.html'; }
        function toggleMensagens() { document.getElementById('container-mensagens-adm').classList.toggle('aberto'); }

        // SINCRONIZAÇÃO DE RÁDIOS
        db.ref('radios').on('value', snap => {
            const list = document.getElementById('radio-list');
            list.innerHTML = "";
            snap.forEach(c => {
                const r = c.val();
                const div = document.createElement('div');
                div.className = "radio-item";
                div.style.background = r.color || '#1DB954';
                div.innerHTML = `<span>${r.name}</span><i class="fas fa-times" style="position:absolute;top:5px;right:5px;" onclick="db.ref('radios/${c.key}').remove()"></i>`;
                div.onclick = () => { player.src = r.url; player.play(); document.getElementById('now-title').innerText = "OUVINDO: " + r.name; };
                list.appendChild(div);
            });
        });

        function addRadio() {
            const n = document.getElementById('r-name').value, u = document.getElementById('r-url').value;
            if(n && u) db.ref('radios').push({ name: n, url: u, color: '#1DB954' });
        }

        // SINCRONIZAÇÃO DE OUVINTES
        db.ref('usuarios').on('value', snap => {
            const list = document.getElementById('user-list');
            list.innerHTML = "";
            snap.forEach(c => {
                const u = c.val();
                const div = document.createElement('div');
                div.className = "user-item";
                div.innerHTML = `<strong>${u.usuario || 'Anônimo'}</strong><br><small>Ouvindo: ${u.radioAtual || '---'}</small>`;
                list.appendChild(div);
            });
        });

        function togglePlay() {
            if(player.paused) { player.play(); document.getElementById('play-icon').className = "fas fa-stop"; }
            else { player.pause(); document.getElementById('play-icon').className = "fas fa-play"; }
        }
    </script>
</body>
</html>
