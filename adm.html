<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>ADM - ACESSO TOTAL</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #1DB954; --bg: #000; --card: #121212; }
        body { font-family: sans-serif; background: var(--bg); color: white; margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; }
        
        /* TELA DE LOGIN */
        .login-box { background: var(--card); padding: 40px; border-radius: 20px; border: 1px solid #333; width: 320px; text-align: center; box-shadow: 0 0 30px rgba(29, 185, 84, 0.2); }
        input { width: 100%; padding: 15px; margin: 10px 0; background: #1a1a1a; border: 1px solid #333; color: white; border-radius: 10px; box-sizing: border-box; font-size: 16px; }
        .btn-entrar { width: 100%; padding: 15px; background: var(--primary); border: none; border-radius: 10px; font-weight: bold; cursor: pointer; color: black; font-size: 16px; transition: 0.3s; }
        .btn-entrar:hover { background: #1ed760; transform: scale(1.02); }

        /* PAINEL (ESCONDIDO NO INICIO) */
        #painel-adm { display: none; width: 100%; height: 100vh; padding: 20px; box-sizing: border-box; flex-direction: column; }
        .grid { display: grid; grid-template-columns: 1fr 350px; gap: 20px; flex: 1; overflow: hidden; }
        .card { background: var(--card); border-radius: 15px; padding: 20px; border: 1px solid #222; overflow-y: auto; }

        /* PLAYER SPOTIFY STYLE */
        .player-footer { background: #181818; padding: 20px; border-radius: 20px; border: 1px solid #333; text-align: center; margin-top: 20px; }
        .play-outer { position: relative; width: 70px; height: 70px; margin: 0 auto; display: flex; align-items: center; justify-content: center; }
        .play-ring { position: absolute; width: 100%; height: 100%; border: 2px solid rgba(29, 185, 84, 0.1); border-top: 2px solid var(--primary); border-radius: 50%; animation: spin 4s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        .btn-main-play { width: 55px; height: 55px; background: white; border: none; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; color: black; cursor: pointer; z-index: 2; }
    </style>
</head>
<body>

    <div id="box-login" class="login-box">
        <i class="fas fa-user-shield" style="font-size: 40px; color: var(--primary); margin-bottom: 20px;"></i>
        <h2 style="margin:0 0 20px 0">LOGIN ADM</h2>
        <input type="text" id="u" placeholder="USUÁRIO">
        <input type="password" id="s" placeholder="SENHA">
        <button class="btn-entrar" onclick="tentarLogar()">ENTRAR NO PAINEL</button>
    </div>

    <div id="painel-adm">
        <div style="display:flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <h1 style="color:var(--primary); margin:0;">LUIGY ADM</h1>
            <button onclick="sair()" style="background:none; border:1px solid #ff4444; color:#ff4444; padding:8px 15px; border-radius:8px; cursor:pointer">ENCERRAR</button>
        </div>
        
        <div class="grid">
            <div class="card">
                <h3>RADIO MANAGER</h3>
                <div id="lista-radios"></div>
            </div>
            <div class="card">
                <h3>OUVINTES ONLINE</h3>
                <div id="monitor"></div>
            </div>
        </div>

        <div class="player-footer">
            <div class="play-outer">
                <div class="play-ring"></div>
                <button class="btn-main-play"><i class="fas fa-play"></i></button>
            </div>
        </div>
    </div>

    <script>
        // LIMPANDO ERROS DE CACHE AO ABRIR
        if (window.location.hash === "#relog") {
            localStorage.clear();
            window.location.hash = "";
        }

        const firebaseConfig = {
            apiKey: "AIzaSyBGGdz8gJSrXWqq3hSQIoe3pop5MGYt20Q",
            authDomain: "meu-painel-f2efe.firebaseapp.com",
            databaseURL: "https://meu-painel-f2efe-default-rtdb.firebaseio.com/",
            projectId: "meu-painel-f2efe"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function tentarLogar() {
            const user = document.getElementById('u').value.toUpperCase().trim();
            const pass = document.getElementById('s').value.trim();

            if (user === "LUIGY" && pass === "1045") {
                localStorage.setItem('autenticado', 'SIM');
                mostrarPainel();
            } else {
                alert("Dados Incorretos!");
            }
        }

        function mostrarPainel() {
            document.getElementById('box-login').style.display = 'none';
            document.getElementById('painel-adm').style.display = 'flex';
            document.body.style.display = 'block';
            carregarDados();
        }

        function sair() {
            localStorage.clear();
            window.location.hash = "relog";
            location.reload();
        }

        // VERIFICA SE JÁ ESTÁ LOGADO
        if (localStorage.getItem('autenticado') === 'SIM') {
            mostrarPainel();
        }

        function carregarDados() {
            // Monitor de Usuários
            db.ref('usuarios').on('value', snap => {
                const mon = document.getElementById('monitor');
                mon.innerHTML = "";
                snap.forEach(c => {
                    const u = c.val();
                    const status = (Date.now() - (u.lastSeen || 0) < 30000) ? 'online' : 'offline';
                    mon.innerHTML += `<div style="padding:10px; background:#1a1a1a; margin-bottom:5px; border-radius:8px; border-left:4px solid ${status === 'online' ? '#1DB954' : '#444'}">
                        <b>${u.nome}</b> - ${u.radioAtual || 'Nenhuma'}
                    </div>`;
                });
            });
        }
    </script>
</body>
</html>
