<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PAINEL ADM SUPREMO - LUIGY</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #1DB954; --bg: #000; --card: #121212; --text-muted: #b3b3b3; --purple-light: #d1a3ff; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; margin: 0; padding: 20px; user-select: none; }
        .header { display: flex; justify-content: space-between; align-items: center; background: #121212; padding: 20px 30px; border-radius: 15px; border: 1px solid #333; margin-bottom: 25px; }
        .header-left { display: flex; align-items: center; gap: 20px; }
        .header h2 { margin: 0; color: var(--primary); font-size: 22px; }
        .btn-header { background: none; border: 1px solid #333; color: white; padding: 5px 12px; border-radius: 8px; cursor: pointer; font-size: 14px; transition: 0.3s; display: flex; align-items: center; gap: 8px; }
        .btn-header:hover { background: #222; border-color: var(--primary); }
        .btn-sair { color: #ff4444; border-color: #442222; }
        .btn-sair:hover { background: #331111; border-color: #ff4444; }
        #hora { font-size: 26px; font-weight: 900; }
        .main-grid { display: grid; grid-template-columns: 1.2fr 0.8fr; gap: 20px; max-width: 1400px; margin: 0 auto; }
        .card { background: var(--card); border-radius: 20px; padding: 20px; border: 1px solid #282828; margin-bottom: 20px; }
        h3 { color: var(--primary); font-size: 12px; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 15px; }
        .input-group { display: flex; gap: 10px; margin-bottom: 25px; }
        input, select { flex: 1; padding: 12px; background: #2a2a2a; border: none; color: white; border-radius: 8px; outline: none; }
        .btn-save { padding: 0 25px; background: var(--primary); border: none; border-radius: 8px; font-weight: bold; cursor: pointer; color: black; transition: 0.3s; }
        .btn-save:hover { filter: brightness(1.2); }
        
        .radio-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 12px; }
        .radio-item { aspect-ratio: 1/1; border-radius: 15px; display: flex; flex-direction: column; justify-content: center; align-items: center; color: #000; font-weight: bold; font-size: 13px; text-align: center; padding: 10px; cursor: grab; transition: 0.3s; position: relative; border: 2px solid transparent; }
        .radio-item.active { background: #000 !important; color: var(--primary) !important; border-color: var(--primary); box-shadow: 0 0 15px rgba(29, 185, 84, 0.4); }
        
        .radio-actions { position: absolute; top: 5px; right: 5px; display: flex; gap: 5px; opacity: 0.7; }
        .radio-actions i { cursor: pointer; padding: 5px; background: rgba(0,0,0,0.2); border-radius: 5px; font-size: 12px; transition: 0.2s; }
        .radio-actions i:hover { opacity: 1; background: rgba(0,0,0,0.5); transform: scale(1.1); }
        .btn-edit-r { color: #000; }
        .btn-del-r { color: #800000; }

        .antena { font-size: 24px; margin-bottom: 8px; display: none; }
        .active .antena { display: block; animation: pulse-antena 1s infinite; }
        @keyframes pulse-antena { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.3; transform: scale(1.1); } }
        
        .pub-container { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .pub-preview { width: 100%; max-height: 100px; border-radius: 10px; object-fit: contain; margin-top: 10px; border: 1px dashed #444; display: none; }
        label { font-size: 10px; color: #888; display: block; margin-bottom: 5px; margin-left: 5px; }
        .pub-list-item { background: #1a1a1a; margin-bottom: 8px; border-radius: 10px; overflow: hidden; border-left: 4px solid var(--primary); }
        .pub-list-row { display: flex; align-items: center; width: 100%; }
        .pub-list-btn { flex: 1; padding: 12px; background: none; border: none; color: white; text-align: left; font-size: 13px; cursor: pointer; display: flex; align-items: center; gap: 10px; }
        .pub-thumb-mini { width: 40px; height: 25px; object-fit: cover; border-radius: 4px; background: #000; }
        .pub-details-bar { display: none; padding: 10px 15px; font-size: 12px; color: #ccc; border-top: 1px solid #222; background: #151515; }
        .pub-details-bar b { color: var(--primary); }
        .user-item { background: #1a1a1a; margin-bottom: 8px; border-radius: 10px; overflow: hidden; }
        .user-row { display: flex; align-items: center; width: 100%; }
        .user-name-btn { flex: 1; padding: 15px; background: none; border: none; color: white; text-align: left; font-weight: bold; font-size: 14px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
        .btn-delete-user { background: none; border: none; color: #ff4444; padding: 15px; cursor: pointer; font-size: 16px; transition: 0.2s; }
        .btn-edit-pub { color: #1DB954; padding: 15px; cursor: pointer; font-size: 16px; background: none; border: none; transition: 0.2s; }
        .btn-edit-pub:hover { transform: scale(1.2); }
        .status-on { color: #00ff00; font-weight: 900; font-size: 11px; }
        .status-off { color: #d1a3ff; font-weight: 900; font-size: 11px; }
        .user-details-bar { display: none; padding: 0 15px 15px 15px; font-size: 13px; color: #ccc; border-top: 1px solid #222; }
        .user-details-bar b { color: var(--primary); }
        .player-footer { margin-top: 20px; background: #111; padding: 25px; border-radius: 20px; border: 1px solid #222; text-align: center; }
        .controls-row { display: flex; align-items: center; justify-content: center; gap: 35px; }
        .btn-nav { background: none; border: none; color: #b3b3b3; font-size: 24px; cursor: pointer; transition: 0.2s; }
        .btn-nav:hover { color: white; transform: scale(1.2); }
        .play-outer { position: relative; width: 80px; height: 80px; display: flex; align-items: center; justify-content: center; }
        .ring-animation { position: absolute; width: 100%; height: 100%; border: 2px solid rgba(29, 185, 84, 0.1); border-top: 2px solid var(--primary); border-radius: 50%; animation: spin-slow 5s linear infinite; }
        @keyframes spin-slow { 100% { transform: rotate(360deg); } }
        .btn-spotify-play { width: 60px; height: 60px; background: white; border: none; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 22px; color: black; cursor: pointer; z-index: 5; transition: 0.2s; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        .btn-spotify-play:hover { transform: scale(1.1); background: var(--primary); }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-left">
            <h2><i class="fab fa-spotify"></i> LUIGY ADM</h2>
            <button class="btn-header" onclick="location.reload()"><i class="fas fa-sync-alt"></i> REINICIAR</button>
            <button class="btn-header btn-sair" onclick="logout()"><i class="fas fa-sign-out-alt"></i> SAIR</button>
        </div>
        <div id="hora">00:00:00</div>
    </div>
    <div class="main-grid">
        <div class="col-left">
            <div class="card">
                <h3>GERENCIAR EMISSORA</h3>
                <div class="input-group">
                    <input type="hidden" id="r-key">
                    <input type="text" id="r-name" placeholder="Nome da Rádio">
                    <input type="text" id="r-url" placeholder="Link .mp3">
                    <button class="btn-save" id="btn-radio-action" onclick="addRadio()">SALVAR</button>
                </div>
                <h3>GRADE DE RÁDIOS (ARRASTE PARA REORDENAR)</h3>
                <div id="radio-list" class="radio-grid"></div>
                <div class="player-footer">
                    <div id="now-title" style="font-size:11px; color:#888; margin-bottom:15px; letter-spacing: 1px;">SELECIONE UMA RÁDIO</div>
                    <div class="controls-row">
                        <button class="btn-nav" onclick="prevRadio()"><i class="fas fa-step-backward"></i></button>
                        <div class="play-outer">
                            <div class="ring-animation" id="ring"></div>
                            <button class="btn-spotify-play" onclick="togglePlay()"><i class="fas fa-play" id="play-icon" style="margin-left: 3px;"></i></button>
                        </div>
                        <button class="btn-nav" onclick="nextRadio()"><i class="fas fa-step-forward"></i></button>
                    </div>
                </div>
            </div>
            <div class="card">
                <h3>GERENCIAR PUBLICIDADE</h3>
                <div class="pub-container">
                    <input type="hidden" id="pub-key">
                    <div>
                        <label>UPLOAD DA IMAGEM</label>
                        <input type="file" id="pub-file" accept="image/*" onchange="previewPub(this)">
                        <img id="pub-view" class="pub-preview">
                    </div>
                    <div>
                        <label>INÍCIO (DATA/HORA)</label>
                        <input type="datetime-local" id="pub-ini">
                        <label>TÉRMINO (DATA/HORA)</label>
                        <input type="datetime-local" id="pub-fim">
                        <label>DESTINATÁRIOS</label>
                        <select id="pub-target" onchange="document.getElementById('pub-manual').style.display = (this.value=='MANUAL'?'block':'none')">
                            <option value="TODOS">X - TODOS OS OUVINTES</option>
                            <option value="MANUAL">SELECIONAR MANUAL</option>
                        </select>
                        <input type="text" id="pub-manual" placeholder="NOME DO OUVINTE" style="display:none; margin-top:5px;">
                    </div>
                </div>
                <button class="btn-save" id="btn-pub-save" style="width:100%; margin-top:15px; height:45px;" onclick="savePub()">LANÇAR CAMPANHA</button>
                <h3 style="margin-top:25px;"><i class="fas fa-ad"></i> Campanhas Ativas</h3>
                <div id="pub-list-admin"></div>
            </div>
        </div>
        <div class="col-right">
            <div class="card">
                <h3><i class="fas fa-users"></i> MONITOR DE OUVINTES</h3>
                <div id="user-list"></div>
            </div>
        </div>
    </div>
    <audio id="audio-player"></audio>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBGGdz8gJSrXWqq3hSQIoe3pop5MGYt20Q",
            authDomain: "meu-painel-f2efe.firebaseapp.com",
            databaseURL: "https://meu-painel-f2efe-default-rtdb.firebaseio.com/",
            projectId: "meu-painel-f2efe"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const player = document.getElementById('audio-player');
        let radioData = [];
        let activeIndex = -1;

        setInterval(() => { document.getElementById('hora').innerText = new Date().toLocaleTimeString('pt-BR'); }, 1000);
        function logout() { if(confirm("Deseja sair?")) { localStorage.removeItem('usuarioNome'); window.location.href = 'index.html'; } }
        
        db.ref('radios').on('value', snap => {
            radioData = [];
            snap.forEach(c => { radioData.push({ ...c.val(), key: c.key }); });
            radioData.sort((a, b) => (a.posicao || 0) - (b.posicao || 0));
            renderRadios();
        });

        function renderRadios() {
            const list = document.getElementById('radio-list');
            list.innerHTML = "";
            radioData.forEach((r, i) => {
                list.innerHTML += `
                    <div class="radio-item ${activeIndex === i ? 'active' : ''}" style="background:${r.color || '#1DB954'}" data-id="${r.key}" onclick="playRadio(${i})">
                        <div class="radio-actions" onclick="event.stopPropagation()">
                            <i class="fas fa-pencil-alt btn-edit-r" onclick="prepareEditRadio('${r.key}', '${r.name}', '${r.url}')"></i>
                            <i class="fas fa-times btn-del-r" onclick="deleteRadio('${r.key}')"></i>
                        </div>
                        <i class="fas fa-tower-broadcast antena"></i>
                        <span>${r.name}</span>
                    </div>`;
            });
        }

        Sortable.create(document.getElementById('radio-list'), {
            animation: 150,
            onEnd: function() {
                const items = document.getElementById('radio-list').querySelectorAll('.radio-item');
                items.forEach((item, index) => { db.ref('radios/' + item.getAttribute('data-id')).update({ posicao: index }); });
            }
        });

        function addRadio() {
            const n = document.getElementById('r-name').value, u = document.getElementById('r-url').value, key = document.getElementById('r-key').value;
            if(n && u) {
                if(key) {
                    db.ref('radios/' + key).update({ name: n, url: u });
                    document.getElementById('r-key').value = "";
                    document.getElementById('btn-radio-action').innerText = "SALVAR";
                } else {
                    const col = `hsl(${Math.floor(Math.random() * 360)}, 70%, 75%)`;
                    db.ref('radios').push({ name: n, url: u, color: col, posicao: radioData.length });
                }
                document.getElementById('r-name').value = ""; document.getElementById('r-url').value = "";
            }
        }

        function prepareEditRadio(key, name, url) {
            document.getElementById('r-key').value = key;
            document.getElementById('r-name').value = name;
            document.getElementById('r-url').value = url;
            document.getElementById('btn-radio-action').innerText = "ATUALIZAR";
            window.scrollTo(0,0);
        }

        function deleteRadio(key) {
            if(confirm("Tem certeza que deseja excluir esta rádio?")) {
                db.ref('radios/' + key).remove();
            }
        }

        function playRadio(index) {
            activeIndex = index;
            const r = radioData[index];
            player.src = r.url; player.play();
            document.getElementById('now-title').innerText = "OUVINDO: " + r.name;
            document.getElementById('play-icon').className = "fas fa-stop";
            renderRadios();
        }
        function togglePlay() {
            if(!player.src) return;
            if(player.paused) { player.play(); document.getElementById('play-icon').className = "fas fa-stop"; }
            else { player.pause(); document.getElementById('play-icon').className = "fas fa-play"; }
        }
        function nextRadio() { playRadio((activeIndex + 1) % radioData.length); }
        function prevRadio() { playRadio((activeIndex - 1 + radioData.length) % radioData.length); }
        
        let imgBase64 = "";
        function previewPub(input) {
            const reader = new FileReader();
            reader.onload = (e) => { 
                imgBase64 = e.target.result; 
                document.getElementById('pub-view').src = imgBase64; 
                document.getElementById('pub-view').style.display = "block"; 
            };
            if(input.files[0]) reader.readAsDataURL(input.files[0]);
        }

        function savePub() {
            const ini = document.getElementById('pub-ini').value, fim = document.getElementById('pub-fim').value;
            const target = document.getElementById('pub-target').value;
            const manual = document.getElementById('pub-manual').value.toUpperCase();
            const key = document.getElementById('pub-key').value;

            if(!imgBase64 || !ini || !fim) return alert("Preencha todos os campos e selecione uma imagem!");

            const dados = {
                imagem: imgBase64, 
                inicio: new Date(ini).getTime(), 
                fim: new Date(fim).getTime(),
                destino: target, 
                ouvinteAlvo: target === 'MANUAL' ? manual : 'TODOS'
            };

            if(key) {
                db.ref('publicidade/' + key).update(dados).then(() => {
                    alert("Campanha Atualizada!");
                    resetPubForm();
                });
            } else {
                db.ref('publicidade').push(dados).then(() => { 
                    alert("Campanha lançada!"); 
                    resetPubForm();
                });
            }
        }

        function resetPubForm() {
            imgBase64 = ""; 
            document.getElementById('pub-key').value = "";
            document.getElementById('pub-view').style.display = "none"; 
            document.getElementById('pub-file').value = ""; 
            document.getElementById('pub-ini').value = "";
            document.getElementById('pub-fim').value = "";
            document.getElementById('pub-manual').value = "";
            document.getElementById('btn-pub-save').innerText = "LANÇAR CAMPANHA";
        }

        function prepareEditPub(key, p) {
            document.getElementById('pub-key').value = key;
            imgBase64 = p.imagem;
            document.getElementById('pub-view').src = p.imagem;
            document.getElementById('pub-view').style.display = "block";
            
            // Converter timestamp para o formato do input datetime-local
            const formatTime = (ts) => {
                const d = new Date(ts);
                return d.toISOString().slice(0, 16);
            };

            document.getElementById('pub-ini').value = formatTime(p.inicio);
            document.getElementById('pub-fim').value = formatTime(p.fim);
            document.getElementById('pub-target').value = p.destino;
            
            if(p.destino === 'MANUAL') {
                document.getElementById('pub-manual').style.display = 'block';
                document.getElementById('pub-manual').value = p.ouvinteAlvo;
            } else {
                document.getElementById('pub-manual').style.display = 'none';
            }

            document.getElementById('btn-pub-save').innerText = "ATUALIZAR CAMPANHA";
            window.scrollTo(0, 500); // Rola para a seção de publicidade
        }

        db.ref('publicidade').on('value', snap => {
            const container = document.getElementById('pub-list-admin');
            container.innerHTML = "";
            snap.forEach(c => {
                const p = c.val(), id = c.key;
                const vencida = Date.now() > p.fim;
                container.innerHTML += `
                    <div class="pub-list-item" style="border-left-color: ${vencida ? '#ff4444' : '#1DB954'}">
                        <div class="pub-list-row">
                            <button class="pub-list-btn" onclick="togglePubDetails('${id}')">
                                <img src="${p.imagem}" class="pub-thumb-mini">
                                <span>Destino: <b>${p.ouvinteAlvo}</b> ${vencida ? '<small style="color:#ff4444">(VENCIDA)</small>' : ''}</span>
                            </button>
                            <button class="btn-edit-pub" onclick="prepareEditPub('${id}', ${JSON.stringify(p).replace(/"/g, '&quot;')})"><i class="fas fa-pencil-alt"></i></button>
                            <button class="btn-delete-user" onclick="if(confirm('Excluir esta campanha?')) db.ref('publicidade/${id}').remove()"><i class="fas fa-trash-alt"></i></button>
                        </div>
                        <div class="pub-details-bar" id="det-pub-${id}">
                            Início: <b>${new Date(p.inicio).toLocaleString()}</b><br>
                            Término: <b>${new Date(p.fim).toLocaleString()}</b>
                        </div>
                    </div>`;
            });
        });

        function togglePubDetails(id) {
            const el = document.getElementById('det-pub-' + id);
            const isVisible = el.style.display === 'block';
            document.querySelectorAll('.pub-details-bar').forEach(d => d.style.display = 'none');
            if (!isVisible) el.style.display = 'block';
        }

        db.ref('usuarios').on('value', snap => {
            const container = document.getElementById('user-list');
            container.innerHTML = "";
            snap.forEach(c => {
                const u = c.val(), id = c.key;
                const isOnline = (Date.now() - parseInt(u.lastSeen || 0) < 60000);
                container.innerHTML += `
                    <div class="user-item" style="border-left: 4px solid ${isOnline?'#00ff00':'#d1a3ff'}">
                        <div class="user-row">
                            <button class="user-name-btn" onclick="toggleUserDetails('${id}')">
                                <span>${u.nome || 'Ouvinte'}</span> ${isOnline?'<span class="status-on">ON</span>':'<span class="status-off">OFF</span>'}
                            </button>
                            <button class="btn-delete-user" onclick="if(confirm('Remover?')) db.ref('usuarios/${id}').remove()"><i class="fas fa-trash-alt"></i></button>
                        </div>
                        <div class="user-details-bar" id="detalhes-${id}">
                            Ouvindo: <b>${u.radioAtual || "---"}</b><br>
                            Sessão: <b>${Math.floor((Date.now()-(u.sessionStart||Date.now()))/60000)} min</b>
                        </div>
                    </div>`;
            });
        });

        function toggleUserDetails(id) {
            const el = document.getElementById('detalhes-' + id);
            const isVisible = el.style.display === 'block';
            document.querySelectorAll('.user-details-bar').forEach(bar => bar.style.display = 'none');
            if (!isVisible) el.style.display = 'block';
        }
    </script>
</body>
</html>
