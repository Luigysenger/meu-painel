<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PAINEL ADM SUPREMO - LUIGY</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #1DB954; --bg: #0b0b0b; --card: #181818; --danger: #e91e63; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; margin: 0; padding: 20px; user-select: none; }

        /* HEADER */
        .info-header { display: flex; justify-content: space-between; align-items: center; background: var(--card); padding: 10px 25px; border-radius: 15px; margin-bottom: 20px; border: 1px solid #333; height: 85px; }
        .clima-container { display: flex; align-items: center; gap: 12px; }
        .clima-info { display: flex; flex-direction: column; }
        #cidade-nome { font-size: 11px; color: #888; text-transform: uppercase; font-weight: bold; letter-spacing: 1px; }
        #temp-valor { font-size: 32px; color: var(--primary); font-weight: 900; line-height: 1; }
        #clima-icon-wrapper img { width: 45px; height: 45px; filter: drop-shadow(0 0 5px var(--primary)); }
        .date-display { text-align: right; color: var(--primary); }
        #hora-atual { font-size: 30px; font-weight: 900; display: block; line-height: 1; }
        #data-extenso { font-size: 13px; font-weight: 600; opacity: 0.8; text-transform: capitalize; }

        .main-container { display: grid; grid-template-columns: 1.2fr 0.8fr; gap: 20px; max-width: 1300px; margin: 0 auto; }
        .card { background: var(--card); border-radius: 15px; padding: 20px; border: 1px solid #222; }
        h3 { margin-top: 0; color: var(--primary); font-size: 11px; text-transform: uppercase; margin-bottom: 15px; border-bottom: 1px solid #333; padding-bottom: 5px; }

        /* INPUTS E BOTÕES */
        .input-bar { display: flex; align-items: center; flex-wrap: wrap; gap: 8px; margin-bottom: 20px; }
        input { padding: 10px; border-radius: 6px; border: 1px solid #333; background: #222; color: white; outline: none; }
        .btn-salvar { padding: 10px 20px; background: var(--primary); border: none; border-radius: 6px; font-weight: bold; cursor: pointer; color: #000; }
        .btn-logout { padding: 10px 15px; background: var(--danger); border: none; border-radius: 6px; font-weight: bold; cursor: pointer; color: white; }
        .btn-refresh { padding: 10px 12px; background: #333; border: none; border-radius: 6px; cursor: pointer; color: white; }

        /* RADIOS */
        .radio-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 12px; }
        .radio-square { aspect-ratio: 1/1; border-radius: 12px; padding: 10px; display: flex; flex-direction: column; justify-content: center; align-items: center; cursor: pointer; transition: 0.2s; color: #000; text-align: center; font-weight: bold; font-size: 13px; position: relative; }
        .radio-square.playing { background: #000 !important; color: var(--primary) !important; border: 2px solid var(--primary); box-shadow: 0 0 15px var(--primary); }

        /* PLAYER FOOTER MODERNO */
        .player-footer { margin-top: 20px; background: #111; padding: 20px; border-radius: 15px; border: 1px solid #333; text-align: center; }
        .player-controls { display: flex; align-items: center; justify-content: center; gap: 20px; }
        
        /* BOTÕES DE CONTROLE ESTILO MINIMALISTA */
        .btn-ctrl { background: none; border: none; color: #b3b3b3; font-size: 22px; cursor: pointer; transition: 0.3s; padding: 10px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
        .btn-ctrl:hover { color: white; transform: scale(1.05); }

        /* BOTÃO CENTRAL PLAY/STOP COM ANEL */
        .btn-play-stop { font-size: 30px; color: white; position: relative; width: 60px; height: 60px; border: 2px solid transparent; transition: 0.3s; }
        .btn-play-stop:hover { color: var(--primary); transform: scale(1.1); }
        
        /* ANEL VERDE FININHO GIRANDO */
        .btn-play-stop.playing::before { content: ''; position: absolute; top: -5px; left: -5px; right: -5px; bottom: -5px; border: 2px solid var(--primary); border-radius: 50%; border-top-color: transparent; animation: spin 1s linear infinite; }

        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* MONITOR DE OUVINTES */
        .user-card { background: #222; padding: 12px; border-radius: 10px; margin-bottom: 5px; border-left: 4px solid #444; cursor: pointer; transition: 0.3s; display: flex; justify-content: space-between; align-items: center; }
        .user-card:hover { background: #2a2a2a; }
        .user-card.online { border-left-color: var(--primary); }
        .status-badge { font-size: 10px; font-weight: 900; padding: 2px 8px; border-radius: 20px; text-transform: uppercase; }
        .status-on { background: rgba(29, 185, 84, 0.2); color: var(--primary); border: 1px solid var(--primary); }
        .status-off { background: #333; color: #888; border: 1px solid #444; }

        /* GAVETA DE DETALHES */
        .user-details { background: #111; margin-top: -5px; margin-bottom: 10px; border-radius: 0 0 10px 10px; padding: 12px; border: 1px solid #333; border-top: none; font-size: 12px; display: none; animation: slideDown 0.3s ease-out; }
        .user-details b { color: var(--primary); }
        @keyframes slideDown { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="info-header">
        <div class="clima-container">
            <div id="clima-icon-wrapper"><i class="fas fa-sun" style="color:var(--primary); font-size:30px"></i></div>
            <div class="clima-info">
                <span id="cidade-nome">BUSCANDO...</span>
                <span id="temp-valor">--°</span>
            </div>
        </div>
        <div class="date-display">
            <span id="hora-atual">00:00:00</span>
            <span id="data-extenso">...</span>
        </div>
    </div>

    <div class="main-container">
        <div class="side-left">
            <div class="card input-bar">
                <input type="text" id="r-nome" placeholder="Nome da Rádio">
                <input type="text" id="r-url" placeholder="URL .mp3">
                <button class="btn-salvar" onclick="saveRadio()">SALVAR</button>
                <button class="btn-logout" onclick="window.location.href='index.html'">SAIR</button>
                <button class="btn-refresh" onclick="location.reload()"><i class="fas fa-sync-alt"></i></button>
            </div>

            <div class="card">
                <h3>📻 EMISSORAS</h3>
                <div class="radio-grid" id="radios-list"></div>
                <div class="player-footer">
                    <div id="txt-ouvindo" style="font-size: 13px; color: #aaa; margin-bottom: 15px">PAUSADO</div>
                    <div class="player-controls">
                        <button class="btn-ctrl" onclick="prevRadio()" title="Anterior"><i class="fas fa-step-backward"></i></button>
                        <button class="btn-ctrl btn-play-stop" id="btn-main-play" onclick="togglePlayStop()" title="Play/Stop"><i class="fas fa-play" id="play-stop-icon"></i></button>
                        <button class="btn-ctrl" onclick="nextRadio()" title="Próxima"><i class="fas fa-step-forward"></i></button>
                    </div>
                    <audio id="main-player"></audio>
                </div>
            </div>
        </div>

        <div class="side-right">
            <div class="card">
                <h3>👥 MONITOR DE OUVINTES</h3>
                <div id="user-monitor"></div>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBGGdz8gJSrXWqq3hSQIoe3pop5MGYt20Q",
            authDomain: "meu-painel-f2efe.firebaseapp.com",
            databaseURL: "https://meu-painel-f2efe-default-rtdb.firebaseio.com/",
            projectId: "meu-painel-f2efe"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // RELÓGIO
        setInterval(() => {
            const agora = new Date();
            document.getElementById('hora-atual').textContent = agora.toLocaleTimeString('pt-BR');
            document.getElementById('data-extenso').textContent = agora.toLocaleDateString('pt-BR', {weekday:'long', day:'numeric', month:'long'});
        }, 1000);

        // CLIMA
        async function getClima() {
            try {
                const res = await fetch(`https://api.weatherapi.com/v1/current.json?key=7662c16260844781a79133649241505&q=Cascavel&lang=pt`);
                const data = await res.json();
                if (data && data.current) {
                    document.getElementById('cidade-nome').textContent = data.location.name.toUpperCase();
                    document.getElementById('temp-valor').textContent = Math.round(data.current.temp_c) + "°";
                    document.getElementById('clima-icon-wrapper').innerHTML = `<img src="https:${data.current.condition.icon}" width="45">`;
                }
            } catch (e) {
                document.getElementById('cidade-nome').textContent = "CASCAVEL";
                document.getElementById('temp-valor').textContent = "22°";
            }
        }
        getClima();

        // RÁDIOS
        let radioArray = [];
        let currentIndex = -1;
        const player = document.getElementById('main-player');
        const btnPlayStop = document.getElementById('btn-main-play');
        const iconPlayStop = document.getElementById('play-stop-icon');

        function saveRadio() {
            const n = document.getElementById('r-nome').value, u = document.getElementById('r-url').value;
            if(!n || !u) return;
            const color = `hsl(${Math.floor(Math.random() * 360)}, 70%, 80%)`;
            db.ref('radios').push({ name: n, url: u, color: color });
            document.getElementById('r-nome').value=""; document.getElementById('r-url').value="";
        }

        db.ref('radios').on('value', snap => {
            const list = document.getElementById('radios-list'); list.innerHTML = ""; radioArray = [];
            snap.forEach(c => {
                const r = c.val(); r.key = c.key; radioArray.push(r);
                list.innerHTML += `<div class="radio-square" id="sq-${r.key}" style="background:${r.color}" onclick="playRadio(${radioArray.length-1})">
                    <span>${r.name}</span>
                </div>`;
            });
        });

        // LÓGICA DE PLAY/STOP E ANEL VERDE
        function updatePlayerUI(isPlaying) {
            if (isPlaying) {
                iconPlayStop.className = 'fas fa-stop';
                btnPlayStop.classList.add('playing'); // Ativa o anel verde girando
            } else {
                iconPlayStop.className = 'fas fa-play';
                btnPlayStop.classList.remove('playing'); // Desativa o anel
            }
        }

        function playRadio(index) {
            currentIndex = index; const r = radioArray[index]; player.src = r.url; player.play();
            document.querySelectorAll('.radio-square').forEach(el => el.classList.remove('playing'));
            document.getElementById('sq-'+r.key).classList.add('playing');
            document.getElementById('txt-ouvindo').innerHTML = `OUVINDO: <b style="color:var(--primary)">${r.name}</b>`;
            updatePlayerUI(true);
        }

        function togglePlayStop() {
            if(!player.src) return;
            if(player.paused) { player.play(); updatePlayerUI(true); }
            else { player.pause(); updatePlayerUI(false); }
        }

        player.onplay = () => updatePlayerUI(true);
        player.onpause = () => updatePlayerUI(false);

        function nextRadio() { if(radioArray.length) playRadio((currentIndex + 1) % radioArray.length); }
        function prevRadio() { if(radioArray.length) playRadio((currentIndex - 1 + radioArray.length) % radioArray.length); }

        // MONITOR DE OUVINTES (COM GAVETA DE DETALHES)
        function toggleUser(id) {
            const el = document.getElementById('det-'+id);
            el.style.display = (el.style.display === 'block') ? 'none' : 'block';
        }

        db.ref('usuarios').on('value', snap => {
            const mon = document.getElementById('user-monitor'); mon.innerHTML = "";
            snap.forEach(c => {
                const u = c.val(); 
                const on = (Date.now() - (u.lastSeen || 0) < 30000);
                const tempoTotal = Math.floor((Date.now() - (u.loginTime || Date.now())) / 60000);
                const tempoRadio = Math.floor((Date.now() - (u.radioStartTime || Date.now())) / 60000);

                mon.innerHTML += `
                    <div class="user-card ${on?'online':''}" onclick="toggleUser('${c.key}')">
                        <b>${u.nome}</b>
                        <span class="status-badge ${on?'status-on':'status-off'}">${on?'on':'off'}</span>
                    </div>
                    <div class="user-details" id="det-${c.key}">
                        <p>🕒 Sessão Total: <b>${tempoTotal} min</b></p>
                        <p>📻 Ouvindo: <b>${u.radioAtual || 'Nenhuma'}</b></p>
                        <p>🎵 Tempo na Rádio: <b>${tempoRadio} min</b></p>
                    </div>`;
            });
        });

        Sortable.create(document.getElementById('radios-list'), { animation: 150 });
    </script>
</body>
</html>
