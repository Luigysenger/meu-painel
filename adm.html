<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PAINEL ADM - CONTROLE TOTAL</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #1DB954; --bg: #0b0b0b; --card: #181818; --input: #2a2a2a; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg); color: white; margin: 0; padding: 20px; }
        
        /* BARRA DE INFO (Clima, Hora, Data) */
        .info-bar { display: flex; justify-content: space-between; align-items: center; background: var(--card); padding: 15px 25px; border-radius: 12px; margin-bottom: 20px; border: 1px solid #222; font-size: 14px; color: #aaa; }
        .info-group { display: flex; align-items: center; gap: 15px; }
        .temp-val { color: var(--primary); font-weight: bold; }

        .top-bar { display: flex; justify-content: space-between; align-items: center; max-width: 1200px; margin: 0 auto 20px auto; }
        .top-bar h1 { color: var(--primary); margin: 0; font-size: 22px; }
        .btn-sair { background: #333; border: none; color: #fff; padding: 8px 15px; border-radius: 8px; cursor: pointer; }

        .main-container { display: grid; grid-template-columns: 1.2fr 0.8fr; gap: 20px; max-width: 1200px; margin: 0 auto; }
        .card { background: var(--card); border-radius: 16px; padding: 20px; border: 1px solid #222; margin-bottom: 20px; }
        .card h3 { margin: 0 0 15px 0; color: var(--primary); font-size: 13px; text-transform: uppercase; letter-spacing: 1px; }

        input { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #333; background: var(--input); color: white; box-sizing: border-box; margin-bottom: 10px; }
        .btn-salvar { width: 100%; padding: 15px; background: var(--primary); border: none; border-radius: 8px; font-weight: bold; cursor: pointer; text-transform: uppercase; }

        /* GRADE DE RÁDIOS COM LÁPIS E X */
        .radio-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 10px; }
        .radio-box { background: #222; padding: 15px; border-radius: 10px; display: flex; justify-content: space-between; align-items: center; position: relative; border: 1px solid #333; }
        .radio-info { display: flex; flex-direction: column; }
        .radio-name { font-weight: bold; font-size: 14px; margin-bottom: 5px; }
        .actions { display: flex; gap: 8px; }
        .btn-action { border: none; padding: 6px 10px; border-radius: 6px; cursor: pointer; font-size: 12px; }
        .btn-edit { background: rgba(255, 255, 255, 0.1); color: #fff; }
        .btn-del { background: rgba(255, 68, 68, 0.1); color: #ff4444; }

        /* MONITOR */
        .user-card { background: #222; padding: 15px; border-radius: 10px; border-left: 4px solid #444; margin-bottom: 10px; }
        .online { border-left-color: var(--primary) !important; }
        
        @media (max-width: 900px) { .main-container { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <div class="info-bar">
        <div class="info-group">
            <span id="data-extenso">Carregando data...</span>
            <span id="hora-atual" style="color: white; font-weight: bold;">00:00:00</span>
        </div>
        <div class="info-group">
            <span id="clima-icon"></span>
            <span id="cidade-nome">Localizando...</span>
            <span id="temp-atual" class="temp-val">--°C</span>
        </div>
    </div>

    <div class="top-bar">
        <h1>🛡️ PAINEL ADMINISTRATIVO</h1>
        <button class="btn-sair" onclick="location.href='index.html'">SAIR</button>
    </div>

    <div class="main-container">
        <div class="side-left">
            <div class="card">
                <h3 id="form-title">➕ CADASTRAR RÁDIO</h3>
                <input type="hidden" id="edit-id">
                <input type="text" id="r-nome" placeholder="Nome da Rádio">
                <input type="text" id="r-url" placeholder="URL do Streaming">
                <button class="btn-salvar" id="btn-submit" onclick="saveRadio()">SALVAR RÁDIO</button>
                <button id="btn-cancel" style="display:none; background:none; color:red; border:none; margin-top:10px; cursor:pointer;" onclick="cancelEdit()">Cancelar Edição</button>
            </div>

            <div class="card">
                <h3>📻 EMISSORAS</h3>
                <div class="radio-grid" id="radios-list"></div>
            </div>
        </div>

        <div class="side-right">
            <div class="card">
                <h3>👥 OUVINTES ONLINE</h3>
                <div id="user-monitor"></div>
            </div>
        </div>
    </div>

    <script>
        // CONFIG FIREBASE
        const firebaseConfig = {
            apiKey: "AIzaSyBGGdz8gJSrXWqq3hSQIoe3pop5MGYt20Q",
            authDomain: "meu-painel-f2efe.firebaseapp.com",
            databaseURL: "https://meu-painel-f2efe-default-rtdb.firebaseio.com/",
            projectId: "meu-painel-f2efe"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // --- FUNÇÕES DE TEMPO E CLIMA ---
        function updateTime() {
            const agora = new Date();
            const opcoes = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            document.getElementById('data-extenso').innerText = agora.toLocaleDateString('pt-BR', opcoes);
            document.getElementById('hora-atual').innerText = agora.toLocaleTimeString('pt-BR');
        }
        setInterval(updateTime, 1000);

        async function getClima() {
            try {
                // Pega cidade pelo IP
                const ipRes = await fetch('https://ipapi.co/json/');
                const ipData = await ipRes.json();
                const cidade = ipData.city;
                document.getElementById('cidade-nome').innerText = cidade;

                // OpenWeather (Chave pública para teste)
                const weatherRes = await fetch(`https://api.openweathermap.org/data/2.5/weather?q=${cidade}&units=metric&appid=895284fb2d2c1d877c724822b7485303&lang=pt_br`);
                const wData = await weatherRes.json();
                
                document.getElementById('temp-atual').innerText = Math.round(wData.main.temp) + "°C";
                const iconCode = wData.weather[0].icon;
                document.getElementById('clima-icon').innerHTML = `<img src="https://openweathermap.org/img/wn/${iconCode}.png" width="30">`;
            } catch (e) { console.log("Erro clima"); }
        }
        getClima();

        // --- GERENCIAMENTO DE RÁDIOS ---
        function saveRadio() {
            const n = document.getElementById('r-nome').value;
            const u = document.getElementById('r-url').value;
            const id = document.getElementById('edit-id').value;

            if(!n || !u) return alert("Preencha tudo!");

            if(id) {
                // MODO EDIÇÃO
                db.ref('radios/' + id).update({ name: n, url: u });
                cancelEdit();
            } else {
                // MODO NOVO
                db.ref('radios').push({ name: n, url: u });
            }
            
            document.getElementById('r-nome').value = "";
            document.getElementById('r-url').value = "";
        }

        function editRadio(id, nome, url) {
            document.getElementById('edit-id').value = id;
            document.getElementById('r-nome').value = nome;
            document.getElementById('r-url').value = url;
            document.getElementById('form-title').innerText = "📝 EDITANDO RÁDIO";
            document.getElementById('btn-submit').innerText = "ATUALIZAR DADOS";
            document.getElementById('btn-cancel').style.display = "block";
        }

        function cancelEdit() {
            document.getElementById('edit-id').value = "";
            document.getElementById('r-nome').value = "";
            document.getElementById('r-url').value = "";
            document.getElementById('form-title').innerText = "➕ CADASTRAR RÁDIO";
            document.getElementById('btn-submit').innerText = "SALVAR RÁDIO";
            document.getElementById('btn-cancel').style.display = "none";
        }

        function deleteRadio(id) {
            if(confirm("TEM CERTEZA QUE DESEJA DELETAR ESTA RÁDIO?")) {
                db.ref('radios/' + id).remove();
            }
        }

        // --- LEITURA DO BANCO ---
        db.ref('radios').on('value', snap => {
            const list = document.getElementById('radios-list'); list.innerHTML = "";
            snap.forEach(child => {
                const r = child.val();
                list.innerHTML += `
                    <div class="radio-box">
                        <span class="radio-name">${r.name}</span>
                        <div class="actions">
                            <button class="btn-action btn-edit" onclick="editRadio('${child.key}', '${r.name}', '${r.url}')"><i class="fas fa-pencil"></i></button>
                            <button class="btn-action btn-del" onclick="deleteRadio('${child.key}')"><i class="fas fa-trash"></i></button>
                        </div>
                    </div>`;
            });
        });

        db.ref('usuarios').on('value', snap => {
            const monitor = document.getElementById('user-monitor'); monitor.innerHTML = "";
            snap.forEach(child => {
                const u = child.val();
                const isOnline = (Date.now() - (u.lastSeen || 0) < 30000);
                monitor.innerHTML += `
                    <div class="user-card ${isOnline ? 'online' : ''}">
                        <div style="display:flex; justify-content:space-between">
                            <b>${u.nome}</b>
                            <small style="color:${isOnline?'#1DB954':'red'}">${isOnline?'ONLINE':'OFFLINE'}</small>
                        </div>
                        <div style="font-size:12px; color:#888; margin-top:5px">📻 ${u.ouvindo || 'Nada'}</div>
                    </div>`;
            });
        });
    </script>
</body>
</html>
