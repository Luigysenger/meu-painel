<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PAINEL DE CONTROLE - ADM</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0f0f0f; color: #e0e0e0; margin: 0; padding: 20px; }
        .header { text-align: center; margin-bottom: 30px; border-bottom: 2px solid #1DB954; padding-bottom: 10px; }
        .container { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 20px; max-width: 1200px; margin: 0 auto; }
        .card { background: #1a1a1a; border-radius: 12px; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); border: 1px solid #333; }
        h2 { color: #1DB954; font-size: 18px; margin-top: 0; text-transform: uppercase; display: flex; align-items: center; gap: 10px; }
        input { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 6px; border: 1px solid #333; background: #000; color: #fff; box-sizing: border-box; }
        .btn-save { width: 100%; padding: 12px; background: #1DB954; color: #000; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-save:hover { background: #179443; }
        .btn-logout { background: transparent; border: 1px solid #555; color: #aaa; padding: 5px 15px; border-radius: 20px; cursor: pointer; }
        
        .list-item { background: #252525; padding: 10px; margin-top: 8px; border-radius: 6px; display: flex; justify-content: space-between; align-items: center; font-size: 14px; }
        .btn-del { background: #cc3333; color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; }
        
        .user-row { background: #222; padding: 12px; margin-bottom: 10px; border-radius: 8px; border-left: 4px solid #444; }
        .status-badge { font-size: 10px; padding: 2px 8px; border-radius: 10px; float: right; }
        .online { background: rgba(29, 185, 84, 0.2); color: #1DB954; }
        .offline { background: rgba(255, 68, 68, 0.2); color: #ff4444; }
        
        .scroll-area { max-height: 400px; overflow-y: auto; padding-right: 5px; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
    </style>
</head>
<body>

    <div class="header">
        <h1>🛡️ SISTEMA ADMINISTRATIVO</h1>
        <button class="btn-logout" onclick="location.href='index.html'">SAIR DO SISTEMA</button>
    </div>

    <div class="container">
        <div class="card">
            <h2>📻 GERENCIAR RÁDIOS</h2>
            <input type="text" id="r-nome" placeholder="Nome da Emissora">
            <input type="text" id="r-url" placeholder="Link do Streaming (.mp3 / .aac)">
            <button class="btn-save" onclick="saveRadio()">ADICIONAR NA LISTA</button>
            
            <div class="scroll-area" id="radios-list" style="margin-top: 15px;"></div>
        </div>

        <div class="card">
            <h2>👥 OUVINTES CONECTADOS</h2>
            <div class="scroll-area" id="user-monitor">Carregando monitor...</div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBGGdz8gJSrXWqq3hSQIoe3pop5MGYt20Q",
            authDomain: "meu-painel-f2efe.firebaseapp.com",
            databaseURL: "https://meu-painel-f2efe-default-rtdb.firebaseio.com/",
            projectId: "meu-painel-f2efe"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function saveRadio() {
            const n = document.getElementById('r-nome').value;
            const u = document.getElementById('r-url').value;
            if(!n || !u) return alert("Preencha tudo!");
            db.ref('radios').push({ name: n, url: u, color: '#1DB954' });
            document.getElementById('r-nome').value = ""; document.getElementById('r-url').value = "";
        }

        db.ref('radios').on('value', snap => {
            const list = document.getElementById('radios-list'); list.innerHTML = "";
            snap.forEach(child => {
                const r = child.val();
                list.innerHTML += `<div class="list-item"><span>${r.name}</span><button class="btn-del" onclick="db.ref('radios/${child.key}').remove()">Excluir</button></div>`;
            });
        });

        db.ref('usuarios').on('value', snap => {
            const monitor = document.getElementById('user-monitor'); monitor.innerHTML = "";
            snap.forEach(child => {
                const u = child.val();
                const isOnline = (Date.now() - (u.lastSeen || 0) < 30000);
                const statusClass = isOnline ? 'online' : 'offline';
                monitor.innerHTML += `
                    <div class="user-row" style="border-left-color: ${isOnline ? '#1DB954' : '#ff4444'}">
                        <span class="status-badge ${statusClass}">${isOnline ? '● ONLINE' : '● OFFLINE'}</span>
                        <div style="font-weight: bold; margin-bottom: 5px;">${u.nome}</div>
                        <div style="font-size: 12px; color: #888;">Escutando: <span style="color:#bbb">${u.ouvindo || '---'}</span></div>
                    </div>`;
            });
        });
    </script>
</body>
</html>
