<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>PAINEL ADM - LIBERADO</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; padding: 30px; text-align: center; }
        .caixa { background: #181818; border: 2px solid #A020F0; padding: 25px; border-radius: 15px; max-width: 500px; margin: auto; }
        input { width: 90%; padding: 12px; margin: 10px 0; background: #222; border: 1px solid #444; color: white; border-radius: 8px; }
        button { width: 95%; padding: 15px; background: #A020F0; border: none; color: white; font-weight: bold; border-radius: 8px; cursor: pointer; margin-top: 10px; }
        .radio-item { background: #222; padding: 15px; margin: 10px 0; display: flex; justify-content: space-between; border-radius: 8px; border-left: 5px solid #A020F0; text-align: left; }
        .btn-excluir { background: #ff4444; color: white; border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

    <script>
        // ISSO AQUI MATA O ERRO DE "DADOS INCORRETOS" NA HORA:
        localStorage.clear();
        sessionStorage.clear();
    </script>

    <div class="caixa">
        <h2 style="color:#A020F0">LUIGY - PAINEL ADM</h2>
        <p style="font-size: 12px; color: #888;">Acesso direto liberado (Regravado em ADM.HTM)</p>
        
        <div id="form-cadastro">
            <input type="text" id="n_radio" placeholder="Nome da Rádio">
            <input type="text" id="u_radio" placeholder="URL do Streaming (.mp3)">
            <button onclick="enviar()">ADICIONAR RÁDIO AGORA</button>
        </div>

        <div style="margin-top: 30px;">
            <h3 style="text-align: left; border-bottom: 1px solid #333; padding-bottom: 5px;">RÁDIOS CADASTRADAS:</h3>
            <div id="lista_radios">Carregando rádios...</div>
        </div>
    </div>

    <script>
        // Sua configuração do Firebase
        const config = {
            apiKey: "AIzaSyBGGdz8gJSrXWqq3hSQIoe3pop5MGYt20Q",
            authDomain: "meu-painel-f2efe.firebaseapp.com",
            databaseURL: "https://meu-painel-f2efe-default-rtdb.firebaseio.com/",
            projectId: "meu-painel-f2efe"
        };

        // Inicia o Firebase
        if (!firebase.apps.length) {
            firebase.initializeApp(config);
        }
        const database = firebase.database();

        // Carregar as rádios na tela
        database.ref('radios').on('value', (snap) => {
            const lista = document.getElementById('lista_radios');
            lista.innerHTML = "";
            snap.forEach((child) => {
                const r = child.val();
                lista.innerHTML += `
                    <div class="radio-item">
                        <span><b>${r.name}</b></span>
                        <button class="btn-excluir" onclick="remover('${child.key}')">EXCLUIR</button>
                    </div>`;
            });
        });

        // Função de Salvar
        function enviar() {
            const nome = document.getElementById('n_radio').value;
            const url = document.getElementById('u_radio').value;
            if (nome && url) {
                database.ref('radios').push({
                    name: nome,
                    url: url,
                    color: '#A020F0'
                }).then(() => {
                    document.getElementById('n_radio').value = "";
                    document.getElementById('u_radio').value = "";
                });
            } else {
                alert("Preencha o nome e a URL!");
            }
        }

        // Função de Remover
        function remover(id) {
            if (confirm("Deseja apagar esta rádio?")) {
                database.ref('radios/' + id).remove();
            }
        }
    </script>
</body>
</html>
