<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PAINEL ADM - SISTEMA PRO</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #1DB954; --bg: #0b0b0b; --card: #181818; --input: #2a2a2a; }
        
        body { font-family: 'Inter', sans-serif; background-color: var(--bg); color: white; margin: 0; padding: 30px; }
        
        .top-bar { display: flex; justify-content: space-between; align-items: center; max-width: 1200px; margin: 0 auto 30px auto; border-bottom: 1px solid #333; padding-bottom: 20px; }
        .top-bar h1 { color: var(--primary); margin: 0; font-size: 24px; font-weight: 700; letter-spacing: -1px; }
        .btn-sair { background: #333; border: none; color: #fff; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: 600; transition: 0.3s; }
        .btn-sair:hover { background: #444; }

        .main-container { display: grid; grid-template-columns: 1.2fr 0.8fr; gap: 25px; max-width: 1200px; margin: 0 auto; }

        .card { background: var(--card); border-radius: 16px; padding: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); border: 1px solid #222; }
        .card h3 { margin: 0 0 20px 0; color: var(--primary); font-size: 14px; text-transform: uppercase; letter-spacing: 1.5px; display: flex; align-items: center; gap: 8px; }

        /* FORMULÁRIO DE CADASTRO */
        .form-group { display: flex; flex-direction: column; gap: 12px; }
        input { width: 100%; padding: 14px; border-radius: 10px; border: 1px solid #333; background: var(--input); color: white; box-sizing: border-box; font-size: 15px; transition: 0.3s; }
        input:focus { border-color: var(--primary); outline: none; background: #333; }
        .btn-salvar { width: 100%; padding: 16px; background: var(--primary); color: black; border: none; border-radius: 10px; font-weight: 700; cursor: pointer; font-size: 14px; text-transform: uppercase; margin-top: 5px; }
        .btn-salvar:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(29, 185, 84, 0.3); }

        /* GRADE DE RÁDIOS (VISUAL DE ONTEM) */
        .radio-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 12px; margin-top: 20px; }
        .radio-box { background: #222; padding: 15px; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #333; transition: 0.3s; }
        .radio-box:hover { border-color: var(--primary); }
        .radio-name { font-weight: 600; font-size: 14px; color: #eee; }
        .btn-del { background: rgba(255, 68, 68, 0.1); color: #ff4444; border: 1px solid #ff4444; padding: 6px 10px; border-radius: 6px; cursor: pointer; font-size: 12px; font-weight: bold; }
        .btn-del:hover { background: #ff4444; color: white; }

        /* MONITOR DE USUÁRIOS */
        .monitor-list { display: flex; flex-direction: column; gap: 12px; }
        .user-card { background: #222; padding: 18px; border-radius: 12px; border-left: 4px solid #444; position: relative; }
        .user-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .user-name { font-weight: 700; font-size: 16px; }
        .status-tag { font-size: 10px; font-weight: 800; padding: 4px 8px; border-radius: 6px; text-transform: uppercase; }
        .status-online { background: rgba(29, 185, 84, 0.1); color: var(--primary); }
        .status-offline { background: rgba(255, 68, 68, 0.1); color: #ff4444; }
        .user-listening { font-size: 13px; color: #999; display: flex; align-items: center; gap: 6px; }
        
        .scroll { max-height: 500px; overflow-y: auto; padding-right: 10px; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }

        @media (max-width: 900px) {
            .main-container { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <div class="top-bar">
        <h1>🛡️ PAINEL ADMINISTRATIVO</h1>
        <button class="btn-sair" onclick="location.href='index.html'">SAIR</button>
    </div>

    <div class="main-container">
        <div class="side-left">
            <div class="card" style="margin-bottom: 25px;">
                <h3>➕ CADASTRAR NOVA EMISSORA</h3>
                <div class="form-group">
                    <input type="text" id="r-nome" placeholder="Nome da Rádio">
                    <input type="text" id="r-url" placeholder="URL do Streaming">
                    <button class="btn-salvar" onclick="saveRadio()">SALVAR RÁDIO</button>
                </div>
            </div>

            <div class="card">
                <h3>📻 RÁDIOS ATIVAS NO SISTEMA</h3>
                <div class="radio-grid" id="radios-list"></div>
            </div>
        </div>

        <div class="side-right">
            <div class="card">
                <h3>👥 MONITOR DE ACESSOS (AO VIVO)</h3>
                <div class="monitor-list scroll" id="user-monitor">
                    </div>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBGGdz8gJSrXWqq3hSQIoe3pop5MGYt20Q",
            authDomain: "meu-painel-f2efe.firebaseapp.com",
            databaseURL: "https://meu-painel-f2efe-default-rtdb.firebaseio.com/",
            projectId: "meu-painel-f2efe"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function saveRadio() {
            const n = document.getElementById('r-nome').value;
            const u = document.getElementById('r-url').value;
            if(!n || !u) return alert("Por favor, preencha o nome e o link!");
            db.ref('radios').push({ name: n, url: u, color: '#1DB954' });
            document.getElementById('r-nome').value = ""; document.getElementById('r-url').value = "";
        }

        db.ref('radios').on('value', snap => {
            const list = document.getElementById('radios-list'); list.innerHTML = "";
            snap.forEach(child => {
                const r = child.val();
                list.innerHTML += `
                    <div class="radio-box">
                        <span class="radio-name">${r.name}</span>
                        <button class="btn-del" onclick="db.ref('radios/${child.key}').remove()">X</button>
                    </div>`;
            });
        });

        db.ref('usuarios').on('value', snap => {
            const monitor = document.getElementById('user-monitor'); monitor.innerHTML = "";
            snap.forEach(child => {
                const u = child.val();
                const isOnline = (Date.now() - (u.lastSeen || 0) < 30000);
                const color = isOnline ? "#1DB954" : "#ff4444";
                const statusClass = isOnline ? 'status-online' : 'status-offline';
                
                monitor.innerHTML += `
                    <div class="user-card" style="border-left-color: ${color}">
                        <div class="user-top">
                            <span class="user-name">${u.nome}</span>
                            <span class="status-tag ${statusClass}">${isOnline ? 'Online' : 'Offline'}</span>
                        </div>
                        <div class="user-listening">
                            <span>📡</span> <b>${u.ouvindo || 'Nenhuma rádio'}</b>
                        </div>
                    </div>`;
            });
        });
    </script>
</body>
</html>
