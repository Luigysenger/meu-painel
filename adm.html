<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PAINEL ADM SUPREMO - LUIGY</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #1DB954; --bg: #0b0b0b; --card: #181818; --text: #ffffff; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; user-select: none; }
        
        /* O estilo permanece o mesmo que você já possui */
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; background: var(--card); padding: 20px; border-radius: 15px; border: 1px solid #333; }
        .admin-info { display: flex; align-items: center; gap: 15px; }
        .admin-name { font-size: 20px; font-weight: bold; color: var(--primary); }
        
        .main-grid { display: grid; grid-template-columns: 1fr 350px; gap: 20px; }
        .section-title { font-size: 14px; color: #888; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 15px; display: flex; align-items: center; gap: 10px; }
        
        .card { background: var(--card); padding: 20px; border-radius: 15px; border: 1px solid #333; }
        input { background: #222; border: 1px solid #444; color: white; padding: 12px; border-radius: 8px; width: calc(100% - 26px); margin-bottom: 10px; }
        .btn-save { background: var(--primary); border: none; color: black; padding: 12px; border-radius: 8px; width: 100%; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-save:hover { transform: scale(1.02); opacity: 0.9; }

        .radio-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 15px; margin-top: 20px; }
        .radio-item { aspect-ratio: 1/1; border-radius: 12px; display: flex; flex-direction: column; justify-content: center; align-items: center; cursor: grab; position: relative; font-weight: bold; text-align: center; padding: 10px; color: #000; }
        .btn-del { position: absolute; top: 5px; right: 5px; background: rgba(255,255,255,0.3); border: none; border-radius: 50%; width: 25px; height: 25px; cursor: pointer; }

        .monitor-list { display: flex; flex-direction: column; gap: 10px; }
        .user-status { background: #222; padding: 15px; border-radius: 10px; display: flex; justify-content: space-between; align-items: center; border-left: 4px solid #444; }
        .user-status.active { border-left-color: var(--primary); }
        .status-dot { width: 10px; height: 10px; border-radius: 50%; background: #444; }
        .active .status-dot { background: var(--primary); box-shadow: 0 0 10px var(--primary); }
    </style>
</head>
<body>

    <div class="header">
        <div class="admin-info">
            <i class="fas fa-user-shield" style="font-size: 30px; color: var(--primary);"></i>
            <div>
                <div class="admin-name">PAINEL ADM SUPREMO - LUIGY</div>
                <div id="data-hora" style="font-size: 12px; color: #888;"></div>
            </div>
        </div>
        <button onclick="logout()" style="background:none; border:1px solid #444; color:#888; padding:8px 15px; border-radius:5px; cursor:pointer">SAIR</button>
    </div>

    <div class="main-grid">
        <div class="left-col">
            <div class="section-title"><i class="fas fa-plus-circle"></i> Cadastrar Nova Emissora</div>
            <div class="card" style="display: flex; gap: 10px;">
                <input type="text" id="radio-name" placeholder="Nome da Rádio">
                <input type="text" id="radio-url" placeholder="URL do Stream (.mp3)">
                <input type="color" id="radio-color" value="#1DB954" style="width: 80px; height: 45px; padding: 2px;">
                <button class="btn-save" onclick="addRadio()">SALVAR</button>
            </div>

            <div class="section-title" style="margin-top: 30px;"><i class="fas fa-broadcast-tower"></i> Emissoras Ativas (Arraste para ordenar)</div>
            <div id="radio-list" class="radio-list"></div>
        </div>

        <div class="right-col">
            <div class="section-title"><i class="fas fa-users"></i> Monitor de Ouvintes</div>
            <div class="card monitor-list" id="user-monitor">
                </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBGGdz8gJSrXWqq3hSQIoe3pop5MGYt20Q",
            authDomain: "meu-painel-f2efe.firebaseapp.com",
            databaseURL: "https://meu-painel-f2efe-default-rtdb.firebaseio.com/",
            projectId: "meu-painel-f2efe"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // --- VERIFICAÇÃO DE LOGIN ADM (AJUSTADO PARA SEUS NOVOS DADOS) ---
        function checkAuth() {
            const nome = localStorage.getItem('adm_nome');
            const sobrenome = localStorage.getItem('adm_sobrenome');
            const cidade = localStorage.getItem('adm_cidade');
            const senha = localStorage.getItem('adm_senha');

            // Verifica se os dados batem com o seu novo formato
            if (nome !== "LUIGY" || sobrenome !== "SENGER" || cidade !== "CASCAVEL" || senha !== "1045") {
                // Se não estiver logado, ele pode pedir os dados (ou você pode setar manualmente para teste)
                const inputNome = prompt("Nome:");
                const inputSobrenome = prompt("Sobrenome:");
                const inputCidade = prompt("Cidade:");
                const inputSenha = prompt("Senha:");

                if (inputNome === "LUIGY" && inputSobrenome === "SENGER" && inputCidade === "CASCAVEL" && inputSenha === "1045") {
                    localStorage.setItem('adm_nome', "LUIGY");
                    localStorage.setItem('adm_sobrenome', "SENGER");
                    localStorage.setItem('adm_cidade', "CASCAVEL");
                    localStorage.setItem('adm_senha', "1045");
                } else {
                    alert("Acesso Negado!");
                    window.location.href = "login.html"; // Redireciona para sua tela de login
                }
            }
        }
        checkAuth();

        function logout() {
            localStorage.clear();
            window.location.reload();
        }

        // --- RESTANTE DO CÓDIGO MANTIDO INTACTO ---
        
        // Atualiza Relógio
        setInterval(() => {
            const now = new Date();
            document.getElementById('data-hora').innerText = now.toLocaleString('pt-BR', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric', hour: '2-digit', minute: '2-digit', second: '2-digit' });
        }, 1000);

        // Lógica de Rádios (Firebase)
        function addRadio() {
            const name = document.getElementById('radio-name').value;
            const url = document.getElementById('radio-url').value;
            const color = document.getElementById('radio-color').value;
            if (name && url) {
                db.ref('radios').push({ name, url, color });
                document.getElementById('radio-name').value = '';
                document.getElementById('radio-url').value = '';
            }
        }

        db.ref('radios').on('value', snap => {
            const list = document.getElementById('radio-list');
            list.innerHTML = "";
            snap.forEach(child => {
                const r = child.val();
                list.innerHTML += `
                    <div class="radio-item" style="background:${r.color}" data-id="${child.key}">
                        <button class="btn-del" onclick="deleteRadio('${child.key}')">×</button>
                        <i class="fas fa-radio" style="font-size:24px; margin-bottom:10px"></i>
                        ${r.name}
                    </div>`;
            });
        });

        function deleteRadio(key) { if(confirm('Excluir rádio?')) db.ref('radios/'+key).remove(); }

        // Monitor de Usuários
        db.ref('usuarios').on('value', snap => {
            const monitor = document.getElementById('user-monitor');
            monitor.innerHTML = "";
            snap.forEach(child => {
                const user = child.val();
                const isOnline = (Date.now() - user.lastSeen) < 10000;
                monitor.innerHTML += `
                    <div class="user-status ${isOnline ? 'active' : ''}">
                        <div>
                            <div style="font-weight:bold">${child.key}</div>
                            <div style="font-size:11px; color:#888">${user.radioAtual || 'Nenhuma rádio'}</div>
                        </div>
                        <div style="display:flex; align-items:center; gap:10px">
                            <span style="font-size:11px">${isOnline ? 'ONLINE' : 'OFFLINE'}</span>
                            <div class="status-dot"></div>
                        </div>
                    </div>`;
            });
        });

        // Ordenação
        Sortable.create(document.getElementById('radio-list'), {
            animation: 150,
            onEnd: function() { /* Lógica de salvar ordem se necessário */ }
        });

    </script>
</body>
</html>
