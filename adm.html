<script>
        // CONFIG FIREBASE
        const firebaseConfig = {
            apiKey: "AIzaSyBGGdz8gJSrXWqq3hSQIoe3pop5MGYt20Q",
            authDomain: "meu-painel-f2efe.firebaseapp.com",
            databaseURL: "https://meu-painel-f2efe-default-rtdb.firebaseio.com/",
            projectId: "meu-painel-f2efe"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // --- LÓGICA DE LOGIN CORRIGIDA ---
        function validarAcesso() {
            // Pega os valores, remove espaços e coloca em MAIÚSCULO para não ter erro
            const u = document.getElementById('user-adm').value.trim().toUpperCase();
            const p = document.getElementById('pass-adm').value.trim();

            if (u === "LUIGY" && p === "1045") {
                localStorage.setItem('adm_logado', 'true');
                mostrarPainel();
            } else {
                alert("DADOS INCORRETOS!\nUsuário: LUIGY\nSenha: 1045");
            }
        }

        // Detectar Tecla ENTER nos campos
        document.getElementById('pass-adm').addEventListener('keypress', (e) => { 
            if(e.key === 'Enter') { e.preventDefault(); validarAcesso(); } 
        });
        document.getElementById('user-adm').addEventListener('keypress', (e) => { 
            if(e.key === 'Enter') { e.preventDefault(); validarAcesso(); } 
        });

        function mostrarPainel() {
            document.getElementById('tela-login').style.display = 'none';
            document.getElementById('painel-conteudo').style.display = 'block';
            carregarDadosIniciais(); // Inicia as funções do painel
        }

        function sair() {
            localStorage.clear(); // Limpa tudo para garantir
            window.location.reload();
        }

        // Verifica se já está logado ao abrir
        if (localStorage.getItem('adm_logado') === 'true') {
            mostrarPainel();
        }

        // --- FUNÇÕES DO PAINEL (MANTIDAS) ---
        function carregarDadosIniciais() {
            setInterval(() => {
                const now = new Date();
                document.getElementById('data-hora').innerText = now.toLocaleString('pt-BR');
            }, 1000);

            db.ref('radios').on('value', snap => {
                const list = document.getElementById('radio-list');
                list.innerHTML = "";
                snap.forEach(child => {
                    const r = child.val();
                    list.innerHTML += `
                        <div class="radio-item" style="background:${r.color}">
                            <button class="btn-del" onclick="deleteRadio('${child.key}')">×</button>
                            ${r.name}
                        </div>`;
                });
            });

            db.ref('usuarios').on('value', snap => {
                const monitor = document.getElementById('user-monitor');
                monitor.innerHTML = "";
                snap.forEach(child => {
                    const user = child.val();
                    const isOnline = (Date.now() - user.lastSeen) < 15000;
                    monitor.innerHTML += `
                        <div class="user-status ${isOnline ? 'active' : ''}">
                            <div>
                                <div style="font-weight:bold">${child.key.toUpperCase()}</div>
                                <div style="font-size:11px; color:#888">${user.radioAtual || 'Offline'}</div>
                            </div>
                            <div class="status-dot"></div>
                        </div>`;
                });
            });

            Sortable.create(document.getElementById('radio-list'), { animation: 150 });
        }

        function addRadio() {
            const name = document.getElementById('radio-name').value;
            const url = document.getElementById('radio-url').value;
            const color = document.getElementById('radio-color').value;
            if (name && url) {
                db.ref('radios').push({ name, url, color });
                document.getElementById('radio-name').value = '';
                document.getElementById('radio-url').value = '';
            }
        }

        function deleteRadio(key) { if(confirm('Excluir?')) db.ref('radios/'+key).remove(); }
    </script>
