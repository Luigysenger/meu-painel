<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PAINEL ADM SUPREMO - LUIGY</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #1DB954; --bg: #0b0b0b; --card: #181818; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; margin: 0; padding: 20px; user-select: none; }

        /* BARRA DE INFO SUPERIOR */
        .info-header { display: flex; justify-content: space-between; align-items: center; background: var(--card); padding: 15px 25px; border-radius: 15px; margin-bottom: 20px; border: 1px solid #333; }
        
        /* CLIMA EM DESTAQUE */
        .temp-display { display: flex; align-items: center; gap: 15px; }
        .temp-display img { width: 50px; height: 50px; filter: drop-shadow(0 0 5px var(--primary)); }
        .temp-info { display: flex; flex-direction: column; }
        #cidade-info { font-size: 14px; color: white; text-transform: uppercase; font-weight: bold; }
        #temp-atual { font-size: 24px; color: var(--primary); font-weight: 800; }

        /* DATA E HORA EM VERDE */
        .date-display { text-align: right; color: var(--primary); }
        #hora-atual { font-size: 26px; font-weight: 900; display: block; line-height: 1; }
        #data-extenso { font-size: 14px; text-transform: capitalize; font-weight: 600; }

        .main-container { display: grid; grid-template-columns: 1.2fr 0.8fr; gap: 20px; max-width: 1300px; margin: 0 auto; }
        .card { background: var(--card); border-radius: 15px; padding: 20px; border: 1px solid #222; }
        h3 { margin-top: 0; color: var(--primary); font-size: 12px; text-transform: uppercase; margin-bottom: 15px; border-bottom: 1px solid #333; padding-bottom: 5px; }

        /* GRID DE RÁDIOS */
        .radio-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 15px; }
        .radio-square { 
            aspect-ratio: 1/1; border-radius: 12px; position: relative; padding: 10px;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            cursor: grab; transition: all 0.2s; color: #000; text-align: center; font-weight: bold; font-size: 14px;
        }
        .radio-square.playing { background: #000 !important; color: var(--primary) !important; border: 2px solid var(--primary); box-shadow: 0 0 20px var(--primary); }

        /* MONITOR OUVINTES */
        .user-card { background: #222; padding: 12px; border-radius: 10px; margin-bottom: 10px; cursor: pointer; border-left: 5px solid #444; }
        .user-card.online { border-left-color: var(--primary); }
        .user-details { background: #111; margin-top: 10px; padding: 10px; border-radius: 8px; font-size: 12px; display: none; color: #ccc; border: 1px dashed #444; }
        .user-details b { color: var(--primary); }

        /* FOOTER PLAYER */
        .player-footer { margin-top: 20px; background: #111; padding: 15px; border-radius: 12px; border: 1px solid var(--primary); text-align: center; }
        .btn-ctrl { background: none; border: none; color: white; font-size: 22px; cursor: pointer; margin: 0 15px; transition: 0.2s; }
        .btn-ctrl:hover { color: var(--primary); transform: scale(1.1); }
        .antena-piscando { animation: blink 1s infinite; color: var(--primary); }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.2; } }
    </style>
</head>
<body>

    <div class="info-header">
        <div class="temp-display">
            <div id="clima-icon"></div>
            <div class="temp-info">
                <span id="cidade-info">LOCALIZANDO...</span>
                <span id="temp-atual">--°C</span>
            </div>
        </div>
        <div class="date-display">
            <span id="hora-atual">00:00:00</span>
            <span id="data-extenso">...</span>
        </div>
    </div>

    <div class="main-container">
        <div class="side-left">
            <div class="card" style="margin-bottom: 20px;">
                <div style="display:flex; gap:10px;">
                    <input type="text" id="r-nome" placeholder="Nome da Rádio" style="flex:1; padding:12px; border-radius:8px; background:#222; border:1px solid #333; color:white;">
                    <input type="text" id="r-url" placeholder="URL .mp3" style="flex:1; padding:12px; border-radius:8px; background:#222; border:1px solid #333; color:white;">
                    <button onclick="saveRadio()" style="padding:12px 25px; background:var(--primary); border:none; border-radius:8px; font-weight:bold; cursor:pointer;">SALVAR</button>
                </div>
            </div>

            <div class="card">
                <h3>📻 GRADE DE EMISSORAS</h3>
                <div class="radio-grid" id="radios-list"></div>

                <div class="player-footer">
                    <div id="txt-ouvindo" style="font-size: 14px;">OUVINDO AGORA: <b style="color:var(--primary)">NENHUMA</b></div>
                    <div style="margin-top:10px">
                        <button class="btn-ctrl" onclick="prevRadio()"><i class="fas fa-backward-step"></i></button>
                        <button class="btn-ctrl" onclick="togglePlay()" style="font-size:35px"><i class="fas fa-circle-play" id="play-icon"></i></button>
                        <button class="btn-ctrl" onclick="nextRadio()"><i class="fas fa-forward-step"></i></button>
                    </div>
                    <audio id="main-player"></audio>
                </div>
            </div>
        </div>

        <div class="side-right">
            <div class="card">
                <h3>👥 MONITOR DE OUVINTES</h3>
                <div id="user-monitor"></div>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBGGdz8gJSrXWqq3hSQIoe3pop5MGYt20Q",
            authDomain: "meu-painel-f2efe.firebaseapp.com",
            databaseURL: "https://meu-painel-f2efe-default-rtdb.firebaseio.com/",
            projectId: "meu-painel-f2efe"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // --- RELÓGIO ATUALIZADO ---
        setInterval(() => {
            const agora = new Date();
            document.getElementById('hora-atual').innerText = agora.toLocaleTimeString('pt-BR');
            document.getElementById('data-extenso').innerText = agora.toLocaleDateString('pt-BR', {weekday:'long', day:'numeric', month:'long', year:'numeric'});
        }, 1000);

        // --- CLIMA (VERSÃO DEFINITIVA) ---
        async function getClima() {
            try {
                // Passo 1: Localização por IP (Mais rápido e menos invasivo)
                const loc = await fetch('https://ipapi.co/json/').then(r => r.json());
                const city = loc.city || "São Paulo";
                
                // Passo 2: OpenWeather com chave reserva
                const res = await fetch(`https://api.openweathermap.org/data/2.5/weather?q=${city}&units=metric&appid=895284fb2d2c1d877c724822b7485303&lang=pt_br`);
                const data = await res.json();

                if(data.main) {
                    document.getElementById('cidade-info').innerText = city.toUpperCase();
                    document.getElementById('temp-atual').innerText = Math.round(data.main.temp) + "°C";
                    const icon = data.weather[0].icon;
                    document.getElementById('clima-icon').innerHTML = `<img src="https://openweathermap.org/img/wn/${icon}@2x.png">`;
                }
            } catch (e) {
                document.getElementById('cidade-info').innerText = "CLIMA OFFLINE";
            }
        }
        getClima();

        // --- CORES CLARAS ALEATÓRIAS ---
        function getLightColor() {
            return `hsl(${Math.floor(Math.random() * 360)}, 70%, 80%)`;
        }

        let radioArray = [];
        let currentIndex = -1;
        const player = document.getElementById('main-player');

        function saveRadio() {
            const n = document.getElementById('r-nome').value, u = document.getElementById('r-url').value;
            if(!n || !u) return;
            db.ref('radios').push({name:n, url:u, color: getLightColor()});
            document.getElementById('r-nome').value=""; document.getElementById('r-url').value="";
        }

        db.ref('radios').on('value', snap => {
            const list = document.getElementById('radios-list'); list.innerHTML = ""; radioArray = [];
            snap.forEach(c => {
                const r = c.val(); r.key = c.key; radioArray.push(r);
                list.innerHTML += `
                    <div class="radio-square" id="sq-${r.key}" style="background:${r.color || '#fff'}" onclick="playRadio(${radioArray.length-1})">
                        <i class="fas fa-tower-broadcast antena-piscando" id="ant-${r.key}" style="display:none"></i>
                        <span>${r.name}</span>
                    </div>`;
            });
        });

        function playRadio(index) {
            currentIndex = index; const r = radioArray[index];
            player.src = r.url; player.play();
            document.querySelectorAll('.radio-square').forEach(el => el.classList.remove('playing'));
            document.querySelectorAll('.antena-piscando').forEach(el => el.style.display = 'none');
            document.getElementById('sq-'+r.key).classList.add('playing');
            document.getElementById('ant-'+r.key).style.display = 'block';
            document.getElementById('txt-ouvindo').innerHTML = `OUVINDO AGORA: <b style="color:var(--primary)">${r.name}</b>`;
            document.getElementById('play-icon').className = 'fas fa-circle-pause';
        }

        function togglePlay() {
            if(player.paused) { player.play(); document.getElementById('play-icon').className = 'fas fa-circle-pause'; }
            else { player.pause(); document.getElementById('play-icon').className = 'fas fa-circle-play'; }
        }

        function nextRadio() { if(radioArray.length) playRadio((currentIndex + 1) % radioArray.length); }
        function prevRadio() { if(radioArray.length) playRadio((currentIndex - 1 + radioArray.length) % radioArray.length); }

        // --- MONITOR OUVINTES ---
        db.ref('usuarios').on('value', snap => {
            const mon = document.getElementById('user-monitor'); mon.innerHTML = "";
            snap.forEach(c => {
                const u = c.val();
                const on = (Date.now() - (u.lastSeen || 0) < 30000);
                mon.innerHTML += `
                    <div class="user-card ${on?'online':''}" onclick="const d=this.querySelector('.user-details'); d.style.display=d.style.display==='block'?'none':'block'">
                        <div style="display:flex; justify-content:space-between">
                            <b>${u.nome}</b>
                            <span style="font-size:10px; color:${on?'var(--primary)':'#ff4444'}">${on?'ONLINE':'OFFLINE'}</span>
                        </div>
                        <div class="user-details">
                            📻 Ouvindo: <b>${u.ouvindo || 'Nada'}</b><br>
                            ⏱️ Status: <b>${on ? 'Ativo agora' : 'Desconectado'}</b>
                        </div>
                    </div>`;
            });
        });

        Sortable.create(document.getElementById('radios-list'), { animation: 150 });
    </script>
</body>
</html>
