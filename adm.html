<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>PAINEL ADM - FORÇADO</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
    <style>
        body { background: #0b0b0b; color: white; font-family: sans-serif; padding: 20px; }
        .card { background: #181818; padding: 20px; border-radius: 10px; border: 1px solid #333; margin-bottom: 20px; }
        input { background: #222; border: 1px solid #444; color: white; padding: 10px; border-radius: 5px; margin-right: 10px; }
        button { background: #1DB954; border: none; padding: 10px 20px; border-radius: 5px; font-weight: bold; cursor: pointer; }
        .radio-item { background: #1DB954; color: black; padding: 15px; margin: 10px 0; border-radius: 8px; display: flex; justify-content: space-between; font-weight: bold; }
        .btn-del { background: red; color: white; border: none; padding: 5px 10px; border-radius: 3px; cursor: pointer; }
        .user-line { border-bottom: 1px solid #333; padding: 10px 0; display: flex; justify-content: space-between; }
        .status-online { color: #1DB954; font-weight: bold; }
    </style>
</head>
<body>

    <h2>LUIGY, O PAINEL ESTÁ LIBERADO:</h2>

    <div class="card">
        <h3>CADASTRAR RÁDIO</h3>
        <input type="text" id="n" placeholder="Nome">
        <input type="text" id="u" placeholder="Link .mp3">
        <button onclick="add()">SALVAR RÁDIO</button>
    </div>

    <div style="display: grid; grid-template-columns: 1fr 300px; gap: 20px;">
        <div>
            <h3>SUAS RÁDIOS (Arraste para ordenar)</h3>
            <div id="lista"></div>
        </div>
        <div class="card">
            <h3>QUEM ESTÁ OUVINDO</h3>
            <div id="ouvintes"></div>
        </div>
    </div>

    <script>
        // Limpeza forçada de qualquer erro anterior
        localStorage.clear();

        const config = {
            apiKey: "AIzaSyBGGdz8gJSrXWqq3hSQIoe3pop5MGYt20Q",
            authDomain: "meu-painel-f2efe.firebaseapp.com",
            databaseURL: "https://meu-painel-f2efe-default-rtdb.firebaseio.com/",
            projectId: "meu-painel-f2efe"
        };
        firebase.initializeApp(config);
        const db = firebase.database();

        // Carregar Rádios
        db.ref('radios').on('value', s => {
            const div = document.getElementById('lista');
            div.innerHTML = "";
            s.forEach(c => {
                const r = c.val();
                div.innerHTML += `
                    <div class="radio-item">
                        <span>${r.name}</span>
                        <button class="btn-del" onclick="del('${c.key}')">EXCLUIR</button>
                    </div>`;
            });
        });

        // Carregar Ouvintes
        db.ref('usuarios').on('value', s => {
            const div = document.getElementById('ouvintes');
            div.innerHTML = "";
            s.forEach(c => {
                const u = c.val();
                const on = (Date.now() - u.lastSeen) < 15000;
                div.innerHTML += `
                    <div class="user-line">
                        <span>${c.key.toUpperCase()}</span>
                        <span class="${on ? 'status-online' : ''}">${on ? 'ONLINE' : 'OFF'}</span>
                    </div>`;
            });
        });

        function add() {
            const name = document.getElementById('n').value;
            const url = document.getElementById('u').value;
            if(name && url) {
                db.ref('radios').push({ name, url, color: '#1DB954' });
                document.getElementById('n').value = '';
                document.getElementById('u').value = '';
            }
        }

        function del(k) { if(confirm('Apagar?')) db.ref('radios/'+k).remove(); }

        Sortable.create(document.getElementById('lista'), { animation: 150 });
    </script>
</body>
</html>
