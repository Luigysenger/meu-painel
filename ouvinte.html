<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISTEMA OUVINDO RÁDIO PRO</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <style>
        :root { --primary: #1DB954; --dark: #121212; --panel: #1e1e1e; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--dark); color: white; margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; overflow: hidden; }
        
        #main-panel { display: flex; flex-direction: column; align-items: center; width: 100%; }
        .radio-container { position: relative; width: 850px; height: 620px; background: #333; border: 10px solid #444; border-radius: 20px; box-shadow: 0 0 50px rgba(0,0,0,0.8); }
        .tablet-screen { position: absolute; top: 10%; left: 25%; width: 50%; height: 75%; background: #000; border-radius: 10px; display: flex; flex-direction: column; overflow: hidden; border: 4px solid #111; }
        .tablet-header { background: var(--primary); padding: 8px 15px; font-size: 11px; color: #000; font-weight: bold; display: flex; justify-content: space-between; align-items: center; }
        
        .stations-grid { flex: 1; overflow-y: auto; padding: 15px; background: #0a0a0a; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; align-content: start; }
        .radio-card { padding: 15px 5px; border-radius: 8px; text-align: center; color: #000; font-weight: bold; cursor: pointer; font-size: 12px; position: relative; border: 2px solid transparent; transition: 0.3s; display: flex; justify-content: center; align-items: center; }
        .radio-card.active { background-color: #000 !important; color: var(--primary) !important; border: 2px solid var(--primary) !important; box-shadow: inset 0 0 10px rgba(29, 185, 84, 0.5); }
        .antena-icon { margin-right: 5px; animation: blink 1.5s infinite; }
        
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
        
        .controls { background: #111; padding: 15px; border-top: 1px solid #222; text-align: center; }
        .btn-logout { position: absolute; bottom: -60px; background: none; border: 1px solid #444; color: #888; padding: 8px 20px; border-radius: 20px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="main-panel">
        <div class="radio-container">
            <div class="tablet-screen">
                <div class="tablet-header">
                    <span>RADIO PRO</span>
                    <span id="status-user">ONLINE</span>
                </div>
                
                <div class="stations-grid" id="stations-grid">
                    </div>

                <div class="controls">
                    <div id="current-playing" style="font-size: 11px; color: var(--primary); margin-bottom: 10px; font-weight: bold;">SELECIONE UMA ESTAÇÃO</div>
                    <audio id="player" controls style="width: 100%; height: 30px; filter: invert(1);"></audio>
                </div>
            </div>
            <button class="btn-logout" onclick="logout()">SAIR DO SISTEMA</button>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBGGdz8gJSrXWqq3hSQIoe3pop5MGYt20Q",
            authDomain: "meu-painel-f2efe.firebaseapp.com",
            databaseURL: "https://meu-painel-f2efe-default-rtdb.firebaseio.com/",
            projectId: "meu-painel-f2efe"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const userId = localStorage.getItem('userId');
        const userNome = localStorage.getItem('userNome');

        if (!userId) { location.href = 'index.html'; }

        // Atualizar presença
        function updatePresence(radioName = 'Nenhuma rádio') {
            db.ref('usuarios/' + userId).update({
                nome: userNome,
                lastSeen: Date.now(),
                ouvindo: radioName
            });
        }
        setInterval(() => updatePresence(window.currentRadioName), 10000);

        // Carregar Rádios
        db.ref('radios').on('value', snap => {
            const grid = document.getElementById('stations-grid');
            grid.innerHTML = "";
            snap.forEach(child => {
                const r = child.val();
                const card = document.createElement('div');
                card.className = 'radio-card';
                card.style.backgroundColor = r.color || '#1DB954';
                card.innerHTML = `<span>${r.name}</span>`;
                card.onclick = () => playRadio(r.url, r.name, card);
                grid.appendChild(card);
            });
        });

        function playRadio(url, name, element) {
            const player = document.getElementById('player');
            const info = document.getElementById('current-playing');
            
            document.querySelectorAll('.radio-card').forEach(c => c.classList.remove('active'));
            element.classList.add('active');
            
            player.src = url;
            player.play();
            info.innerHTML = "📡 OUVINDO AGORA: " + name;
            window.currentRadioName = name;
            updatePresence(name);
        }

        function logout() {
            localStorage.clear();
            location.href = 'index.html';
        }
    </script>
</body>
</html>
