<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OUVINTE - LUIGY PUBLICIDADE</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #A020F0; --bg: #000; --card: #121212; --text: #fff; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; overflow-x: hidden; }

        /* HEADER */
        .header { display: flex; justify-content: space-between; align-items: center; background: var(--card); padding: 15px 25px; border-radius: 15px; border: 1px solid #333; margin-bottom: 20px; }
        .header-left { display: flex; align-items: center; gap: 15px; min-width: 200px; }
        .header-right { display: flex; align-items: center; gap: 20px; min-width: 200px; justify-content: flex-end; }
        
        #nome-exibicao { color: var(--primary); margin: 0; font-size: 18px; text-transform: uppercase; }
        .btn-header { background: none; border: 1px solid #444; color: #fff; padding: 8px 15px; border-radius: 8px; cursor: pointer; transition: 0.3s; font-size: 12px; }
        .btn-sair:hover { background: #ff4444; border-color: #ff4444; }

        /* CONTAINER DE PUBLICIDADE CENTRALIZADO */
        #container-pub { flex: 1; display: flex; justify-content: center; align-items: center; padding: 0 20px; }
        #img-publicidade { max-height: 55px; border-radius: 8px; display: none; object-fit: contain; box-shadow: 0 0 10px rgba(160, 32, 240, 0.2); }

        .weather-box { text-align: right; line-height: 1.2; }
        .city-name { display: block; font-size: 10px; color: var(--primary); font-weight: bold; }
        #hora { font-size: 20px; font-weight: bold; color: #fff; min-width: 80px; text-align: right; }

        /* GRADE DE RÁDIOS */
        .radio-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 15px; margin-top: 20px; }
        .radio-card { aspect-ratio: 1/1; border-radius: 20px; display: flex; flex-direction: column; justify-content: center; align-items: center; cursor: pointer; transition: 0.4s; position: relative; overflow: hidden; border: 2px solid transparent; }
        .radio-card:hover { transform: translateY(-5px); filter: brightness(1.2); }
        .radio-card.active { border-color: #fff; box-shadow: 0 0 20px rgba(255,255,255,0.2); transform: scale(1.05); }
        .radio-name { color: #000; font-weight: 900; font-size: 14px; text-align: center; padding: 10px; text-transform: uppercase; }

        /* PLAYER FIXO RODAPÉ */
        .player-bar { position: fixed; bottom: 0; left: 0; right: 0; background: #000; border-top: 1px solid #222; padding: 15px 30px; display: flex; align-items: center; justify-content: space-between; z-index: 100; }
        .now-playing { display: flex; align-items: center; gap: 15px; width: 30%; }
        .now-info h4 { margin: 0; font-size: 14px; color: #fff; }
        .now-info p { margin: 0; font-size: 11px; color: #888; }
        
        .player-controls { display: flex; flex-direction: column; align-items: center; width: 40%; gap: 8px; }
        .ctrl-btns { display: flex; align-items: center; gap: 25px; }
        .btn-ctrl { background: none; border: none; color: #b3b3b3; cursor: pointer; font-size: 18px; transition: 0.2s; }
        .btn-ctrl:hover { color: #fff; transform: scale(1.1); }
        .btn-play { width: 45px; height: 45px; background: #fff; border-radius: 50%; color: #000; display: flex; align-items: center; justify-content: center; font-size: 20px; }
    </style>
</head>
<body>

    <div class="header">
        <div class="header-left">
            <h2 id="nome-exibicao">OUVINTE</h2>
            <button class="btn-header btn-sair" onclick="logout()"><i class="fas fa-sign-out-alt"></i> SAIR</button>
        </div>

        <div id="container-pub">
            <img id="img-publicidade" src="" alt="Publicidade">
        </div>

        <div class="header-right">
            <div class="weather-box" id="weather">
                <span class="city-name" id="city">LOCALIZANDO...</span>
                <i class="fas fa-cloud-sun" style="color: var(--primary)"></i> 
                <span id="temp">--°C</span>
            </div>
            <div id="hora">00:00:00</div>
        </div>
    </div>

    <div id="radio-grid" class="radio-grid"></div>

    <div class="player-bar">
        <div class="now-playing">
            <div style="width: 45px; height: 45px; background: var(--card); border-radius: 8px; display: flex; align-items: center; justify-content: center;">
                <i class="fas fa-music" style="color: var(--primary)"></i>
            </div>
            <div class="now-info">
                <h4 id="play-name">Nenhuma rádio</h4>
                <p>Ao vivo</p>
            </div>
        </div>

        <div class="player-controls">
            <div class="ctrl-btns">
                <button class="btn-ctrl" onclick="changeRadio(-1)"><i class="fas fa-step-backward"></i></button>
                <button class="btn-ctrl btn-play" onclick="togglePlay()"><i class="fas fa-play" id="main-play-icon"></i></button>
                <button class="btn-ctrl" onclick="changeRadio(1)"><i class="fas fa-step-forward"></i></button>
            </div>
        </div>
        <div style="width: 30%"></div>
    </div>

    <audio id="audio-player"></audio>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBGGdz8gJSrXWqq3hSQIoe3pop5MGYt20Q",
            authDomain: "meu-painel-f2efe.firebaseapp.com",
            databaseURL: "https://meu-painel-f2efe-default-rtdb.firebaseio.com/",
            projectId: "meu-painel-f2efe"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const nomeUsuario = localStorage.getItem('usuarioNome') || "Ouvinte";
        const sessionStart = Date.now();
        let radioList = [];
        let currentIdx = -1;
        const player = document.getElementById('audio-player');

        document.getElementById('nome-exibicao').innerText = nomeUsuario;

        // --- MONITOR DE STATUS (ONLINE/RADIO) ---
        function updateStatus(radioName = "Navegando...") {
            db.ref('usuarios/' + nomeUsuario).update({
                nome: nomeUsuario,
                lastSeen: Date.now(),
                radioAtual: radioName,
                sessionStart: sessionStart,
                radioStart: (radioName !== "Navegando...") ? Date.now() : 0
            });
        }
        setInterval(updateStatus, 30000); // Atualiza a cada 30s para o ADM ver

        // --- CLIMA E HORA ---
        setInterval(() => { document.getElementById('hora').innerText = new Date().toLocaleTimeString('pt-BR'); }, 1000);
        
        fetch('https://wttr.in/Cascavel?format=j1').then(r => r.json()).then(data => {
            const temp = data.current_condition[0].temp_C;
            document.getElementById('temp').innerText = temp + "°C";
            document.getElementById('city').innerText = "CASCAVEL, PR";
        });

        // --- CARREGAR RÁDIOS ---
        db.ref('radios').on('value', snap => {
            const grid = document.getElementById('radio-grid');
            grid.innerHTML = "";
            radioList = [];
            snap.forEach(c => { radioList.push({...c.val(), key: c.key}); });
            radioList.sort((a,b) => (a.posicao || 0) - (b.posicao || 0));

            radioList.forEach((r, i) => {
                const card = document.createElement('div');
                card.className = `radio-card ${currentIdx === i ? 'active' : ''}`;
                card.style.backgroundColor = r.color || '#A020F0';
                card.onclick = () => playRadio(i);
                card.innerHTML = `<div class="radio-name">${r.name}</div>`;
                grid.appendChild(card);
            });
        });

        function playRadio(index) {
            currentIdx = index;
            const radio = radioList[index];
            player.src = radio.url;
            player.play();
            document.getElementById('play-name').innerText = radio.name;
            document.getElementById('main-play-icon').className = "fas fa-stop";
            updateStatus(radio.name);
            
            document.querySelectorAll('.radio-card').forEach((c, i) => {
                c.classList.toggle('active', i === index);
            });
        }

        function togglePlay() {
            if(!player.src) return;
            const icon = document.getElementById('main-play-icon');
            if(player.paused) { player.play(); icon.className = "fas fa-stop"; }
            else { player.pause(); icon.className = "fas fa-play"; }
        }

        function changeRadio(dir) {
            let next = currentIdx + dir;
            if(next >= radioList.length) next = 0;
            if(next < 0) next = radioList.length - 1;
            playRadio(next);
        }

        function logout() {
            localStorage.removeItem('usuarioNome');
            window.location.href = 'index.html';
        }

        // --- LÓGICA DE PUBLICIDADE (MONITORAMENTO) ---
        db.ref('publicidade').on('value', snap => {
            const pub = snap.val();
            const imgElement = document.getElementById('img-publicidade');
            
            if (!pub) {
                imgElement.style.display = "none";
                return;
            }

            const agora = Date.now();
            const paraMim = (pub.destino === 'TODOS' || pub.ouvinteAlvo === nomeUsuario.toUpperCase());
            const noPrazo = (agora >= pub.inicio && agora <= pub.fim);

            if (paraMim && noPrazo) {
                imgElement.src = pub.imagem;
                imgElement.style.display = "block";
            } else {
                imgElement.style.display = "none";
            }
        });

        // Verificação de expiração de tempo real (30 em 30 segundos)
        setInterval(() => {
            db.ref('publicidade').once('value', snap => {
                const pub = snap.val();
                if(pub && Date.now() > pub.fim) {
                    document.getElementById('img-publicidade').style.display = "none";
                }
            });
        }, 30000);

        updateStatus();
    </script>
</body>
</html>
