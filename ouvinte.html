<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OUVINTE - MEU PAINEL</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #A020F0; --bg: #0b0b0b; --card: #181818; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; margin: 0; padding: 20px; user-select: none; }

        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; background: var(--card); padding: 15px 25px; border-radius: 15px; border: 1px solid #333; }
        .user-info { display: flex; flex-direction: column; }
        #nome-ouvinte { font-size: 18px; font-weight: bold; color: var(--primary); }
        .date-info { text-align: right; }
        #hora-atual { font-size: 24px; font-weight: 900; color: var(--primary); display: block; line-height: 1; }
        #data-extenso { font-size: 12px; color: #888; text-transform: capitalize; }

        .btn-config { background: #222; border: 1px solid #444; color: white; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; margin-bottom: 20px; width: 100%; transition: 0.3s; }
        .btn-config:hover { border-color: var(--primary); color: var(--primary); }

        .radio-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 15px; margin-bottom: 120px; }
        .radio-square { aspect-ratio: 1/1; border-radius: 15px; padding: 15px; display: flex; flex-direction: column; justify-content: center; align-items: center; cursor: pointer; transition: 0.3s; color: #000; text-align: center; font-weight: bold; font-size: 13px; }
        .radio-square.playing { border: 3px solid var(--primary); box-shadow: 0 0 15px var(--primary); transform: scale(1.05); }

        .player-bar { position: fixed; bottom: 0; left: 0; right: 0; background: #121212; border-top: 1px solid #333; padding: 20px; display: flex; flex-direction: column; align-items: center; z-index: 999; }
        #txt-status { font-size: 12px; color: #888; margin-bottom: 10px; }
        .controls { display: flex; align-items: center; gap: 30px; }
        .btn-ctrl { background: none; border: none; color: #888; font-size: 24px; cursor: pointer; transition: 0.3s; }
        .btn-ctrl:hover { color: white; }
        
        .btn-main { width: 65px; height: 65px; font-size: 28px; color: white; position: relative; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .btn-main.playing::before { 
            content: ''; position: absolute; inset: -5px; 
            border: 2px solid var(--primary); border-radius: 50%; 
            border-top-color: transparent; 
            animation: spin 2.5s linear infinite; 
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 1000; align-items: center; justify-content: center; }
        .modal-content { background: var(--card); width: 90%; max-width: 450px; border-radius: 20px; padding: 25px; border: 1px solid #444; }
        .radio-item { display: flex; justify-content: space-between; align-items: center; padding: 12px; border-bottom: 1px solid #222; }
        .checkbox-custom { width: 20px; height: 20px; accent-color: var(--primary); }
    </style>
</head>
<body>

    <div class="header">
        <div class="user-info">
            <span id="data-extenso">...</span>
            <span id="nome-ouvinte">CARREGANDO...</span>
        </div>
        <div class="date-info">
            <span id="hora-atual">00:00:00</span>
        </div>
    </div>

    <button class="btn-config" onclick="openModal()">
        <i class="fas fa-plus-circle"></i> SELECIONAR MINHAS RÁDIOS
    </button>

    <div class="radio-grid" id="minhas-radios"></div>

    <div class="player-bar">
        <div id="txt-status">AGUARDANDO SELEÇÃO</div>
        <div class="controls">
            <button class="btn-ctrl" onclick="changeRadio(-1)"><i class="fas fa-step-backward"></i></button>
            <div class="btn-main" id="btn-play-pause" onclick="togglePlay()">
                <i class="fas fa-play" id="icon-play"></i>
            </div>
            <button class="btn-ctrl" onclick="changeRadio(1)"><i class="fas fa-step-forward"></i></button>
        </div>
    </div>

    <div class="modal" id="modal-radios">
        <div class="modal-content">
            <h2 style="color:var(--primary); margin-top:0">Escolha suas Rádios</h2>
            <div id="lista-geral-radios" style="max-height: 350px; overflow-y: auto; margin-bottom: 20px;"></div>
            <button class="btn-config" onclick="closeModal()">SALVAR E SAIR</button>
        </div>
    </div>

    <audio id="player"></audio>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBGGdz8gJSrXWqq3hSQIoe3pop5MGYt20Q",
            authDomain: "meu-painel-f2efe.firebaseapp.com",
            databaseURL: "https://meu-painel-f2efe-default-rtdb.firebaseio.com/",
            projectId: "meu-painel-f2efe"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const nomeCadastrado = localStorage.getItem('usuarioNome') || 'OUVINTE';
        document.getElementById('nome-ouvinte').innerText = "OLÁ, " + nomeCadastrado.toUpperCase();

        setInterval(() => {
            const agora = new Date();
            document.getElementById('hora-atual').textContent = agora.toLocaleTimeString('pt-BR');
            document.getElementById('data-extenso').textContent = agora.toLocaleDateString('pt-BR', {weekday:'long', day:'numeric', month:'long'});
        }, 1000);

        let todasRadios = [];
        let minhasSelecoes = []; 
        let r_selecionadas = [];
        let currentIdx = -1;
        const audio = document.getElementById('player');

        // BUSCAR PREFERÊNCIAS DO FIREBASE (ORDEM SALVA)
        db.ref('usuarios/' + nomeCadastrado + '/preferencias').on('value', snap => {
            minhasSelecoes = snap.val() || [];
            renderMinhasRadios();
        });

        db.ref('radios').on('value', snap => {
            todasRadios = [];
            const containerGeral = document.getElementById('lista-geral-radios');
            containerGeral.innerHTML = "";
            snap.forEach(child => {
                const r = child.val(); r.key = child.key;
                todasRadios.push(r);
                const isChecked = minhasSelecoes.includes(r.key) ? 'checked' : '';
                containerGeral.innerHTML += `
                    <div class="radio-item">
                        <span>${r.name}</span>
                        <input type="checkbox" class="checkbox-custom" id="chk-${r.key}" ${isChecked} onchange="toggleSelectRadio('${r.key}')">
                    </div>`;
            });
            renderMinhasRadios();
        });

        function toggleSelectRadio(key) {
            if (minhasSelecoes.includes(key)) {
                minhasSelecoes = minhasSelecoes.filter(k => k !== key);
            } else {
                minhasSelecoes.push(key);
            }
            db.ref('usuarios/' + nomeCadastrado + '/preferencias').set(minhasSelecoes);
        }

        function renderMinhasRadios() {
            const grid = document.getElementById('minhas-radios');
            grid.innerHTML = "";
            
            // Filtra e ordena conforme o array 'minhasSelecoes' vindo do Firebase
            r_selecionadas = [];
            minhasSelecoes.forEach(key => {
                const radio = todasRadios.find(r => r.key === key);
                if(radio) r_selecionadas.push(radio);
            });

            r_selecionadas.forEach((r, index) => {
                grid.innerHTML += `
                    <div class="radio-square" data-id="${r.key}" id="card-${r.key}" style="background:${r.color}" onclick="playByIndex(${index})">
                        ${r.name}
                    </div>`;
            });
        }

        // CONFIGURAR O "ARRASTAR" E SALVAR ORDEM NO FIREBASE
        Sortable.create(document.getElementById('minhas-radios'), {
            animation: 150,
            onEnd: function () {
                let novaOrdem = [];
                document.querySelectorAll('.radio-square').forEach(el => {
                    novaOrdem.push(el.getAttribute('data-id'));
                });
                minhasSelecoes = novaOrdem;
                db.ref('usuarios/' + nomeCadastrado + '/preferencias').set(novaOrdem);
            }
        });

        function playByIndex(index) {
            if (index < 0 || index >= r_selecionadas.length) return;
            currentIdx = index;
            const r = r_selecionadas[index];
            audio.src = r.url;
            audio.play();
            document.getElementById('txt-status').innerHTML = `OUVINDO: <b style="color:var(--primary)">${r.name.toUpperCase()}</b>`;
            document.getElementById('icon-play').className = "fas fa-stop";
            document.getElementById('btn-play-pause').classList.add('playing');
            document.querySelectorAll('.radio-square').forEach(el => el.classList.remove('playing'));
            if(document.getElementById('card-'+r.key)) document.getElementById('card-'+r.key).classList.add('playing');
        }

        function togglePlay() {
            if(!audio.src) return;
            if(audio.paused) {
                audio.play();
                document.getElementById('icon-play').className = "fas fa-stop";
                document.getElementById('btn-play-pause').classList.add('playing');
            } else {
                audio.pause();
                document.getElementById('icon-play').className = "fas fa-play";
                document.getElementById('btn-play-pause').classList.remove('playing');
            }
        }

        function changeRadio(dir) {
            if (r_selecionadas.length === 0) return;
            let next = currentIdx + dir;
            if (next >= r_selecionadas.length) next = 0;
            if (next < 0) next = r_selecionadas.length - 1;
            playByIndex(next);
        }

        function openModal() { document.getElementById('modal-radios').style.display = 'flex'; }
        function closeModal() { document.getElementById('modal-radios').style.display = 'none'; }
    </script>
</body>
</html>
