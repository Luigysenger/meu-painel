<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OUVINTE - LUIGY</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #A020F0; --bg: #000; --card: #121212; --text-muted: #b3b3b3; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; margin: 0; padding: 20px; user-select: none; }
        
        /* HEADER RESPONSIVO */
        .header { display: flex; justify-content: space-between; align-items: center; background: #121212; padding: 20px 30px; border-radius: 15px; border: 1px solid #333; margin-bottom: 25px; gap: 10px; position: relative; z-index: 101; }
        
        .header-left { display: flex; flex-direction: column; align-items: flex-start; gap: 8px; flex-shrink: 0; }
        .header h2 { margin: 0; color: var(--primary); font-size: 22px; text-transform: uppercase; line-height: 1; }
        
        #container-pub { flex: 1; display: flex; justify-content: center; align-items: center; padding: 0 10px; height: 55px; overflow: hidden; }
        #img-publicidade { max-height: 55px; max-width: 100%; border-radius: 8px; display: none; object-fit: contain; transition: opacity 0.5s ease-in-out; }
        
        .header-right { display: flex; align-items: center; gap: 15px; flex-shrink: 0; }
        .time-msg-box { display: flex; flex-direction: column; align-items: flex-end; gap: 8px; border-left: 1px solid #333; padding-left: 20px; }
        
        .date-info { font-size: 11px; color: #888; text-transform: uppercase; font-weight: bold; letter-spacing: 1px; }
        .separator { height: 1px; width: 100%; background: #333; margin: 2px 0; }

        .btn-header { background: none; border: 1px solid #333; color: white; padding: 5px 12px; border-radius: 8px; cursor: pointer; font-size: 12px; transition: 0.3s; display: flex; align-items: center; gap: 8px; text-transform: uppercase; font-weight: bold; }
        .btn-header:hover { background: #222; border-color: var(--primary); }
        .btn-sair { color: #ff4444; border-color: #442222; padding: 4px 10px; }
        .btn-sair:hover { background: #331111; border-color: #ff4444; }
        
        .btn-msg { border-color: var(--primary); color: var(--primary); font-size: 11px; padding: 4px 10px; }
        .btn-msg:hover { background: var(--primary); color: white; }

        #hora { font-size: 24px; font-weight: 900; line-height: 1; color: var(--primary); }

        /* CARD DE MENSAGEM DESLIZANTE */
        #container-mensagem {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.5s ease-in-out, margin-bottom 0.5s ease-in-out;
            margin-bottom: 0;
        }
        #container-mensagem.aberto {
            max-height: 300px;
            margin-bottom: 25px;
        }
        .card-msg {
            background: #181818;
            border: 1px solid var(--primary);
            border-radius: 15px;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .card-msg textarea {
            background: #000;
            border: 1px solid #333;
            border-radius: 8px;
            color: white;
            padding: 10px;
            resize: none;
            font-family: inherit;
            height: 80px;
        }
        .card-msg textarea:focus { border-color: var(--primary); outline: none; }
        
        .msg-footer { display: flex; justify-content: space-between; align-items: center; }
        .emoji-bar { display: flex; gap: 8px; }
        .btn-emoji { 
            background: #222; border: 1px solid #333; border-radius: 5px; 
            cursor: pointer; font-size: 18px; padding: 5px; transition: 0.2s; 
        }
        .btn-emoji:hover { background: #333; transform: scale(1.1); }
        
        .btn-enviar-msg {
            background: var(--primary);
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            transition: 0.3s;
        }
        .btn-enviar-msg:hover { opacity: 0.8; transform: translateY(-2px); }

        /* ESTRUTURA PRINCIPAL */
        .main-container { 
            display: grid; 
            grid-template-columns: 180px 1fr 180px; 
            gap: 20px; 
            max-width: 100%; 
            margin: 0 auto; 
            margin-bottom: 150px; 
            align-items: start;
        }

        .center-content {
            display: grid;
            grid-template-columns: 1.2fr 0.8fr;
            gap: 20px;
            align-items: start;
        }

        .side-pub { min-height: 400px; display: flex; flex-direction: column; gap: 15px; }
        
        @media (max-width: 1200px) {
            .center-content { grid-template-columns: 1fr; }
            .main-container { grid-template-columns: 1fr; }
            .side-pub { display: none; }
        }

        .card { background: var(--card); border-radius: 20px; padding: 20px; border: 1px solid #282828; }
        h3 { color: var(--primary); font-size: 11px; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 20px; text-align: center; }
        
        .radio-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, 110px); 
            gap: 15px; 
            justify-content: center;
        }
        
        .radio-item { 
            width: 110px; 
            height: 110px; 
            border-radius: 15px; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            color: #000; 
            font-weight: bold; 
            font-size: 10px; 
            text-align: center; 
            padding: 10px; 
            cursor: grab; 
            transition: 0.3s; 
            position: relative; 
            border: 2px solid transparent; 
            box-sizing: border-box; 
        }
        
        .radio-item:hover { transform: scale(1.05); filter: brightness(1.1); }
        .radio-item.active { background: #000 !important; color: var(--primary) !important; border-color: var(--primary); box-shadow: 0 0 15px rgba(160, 32, 240, 0.4); }
        
        .antena { font-size: 20px; margin-bottom: 8px; display: none; }
        .active .antena { display: block; animation: pulse-antena 1s infinite; }
        @keyframes pulse-antena { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.3; transform: scale(1.1); } }
        
        .selector-list { display: flex; flex-direction: column; gap: 8px; max-height: 450px; overflow-y: auto; padding-right: 5px; }
        .selector-item { background: #1a1a1a; padding: 12px; border-radius: 10px; display: flex; justify-content: space-between; align-items: center; border-left: 4px solid #333; transition: 0.3s; }
        .selector-item.selected { border-left-color: var(--primary); background: #222; }
        .btn-toggle-radio { background: none; border: none; font-size: 18px; cursor: pointer; transition: 0.2s; }
        .btn-toggle-radio.add { color: #444; }
        .btn-toggle-radio.remove { color: var(--primary); }
        
        .player-footer { position: fixed; bottom: 0; left: 0; right: 0; background: #111; padding: 15px 25px 25px 25px; border-top: 2px solid var(--primary); text-align: center; z-index: 100; }
        
        .msg-barra { 
            background: #ff0000; 
            color: #fff; 
            font-size: 14px; 
            font-weight: 900; 
            padding: 12px; 
            border-radius: 8px; 
            margin-bottom: 15px; 
            border: 2px solid #fff; 
            display: none; 
            width: fit-content; 
            margin-left: auto;
            margin-right: auto;
            cursor: pointer;
            animation: piscar-alerta 0.8s infinite alternate; 
        }
        @keyframes piscar-alerta { 
            0% { opacity: 1; transform: scale(1); background: #ff0000; } 
            100% { opacity: 0.7; transform: scale(1.05); background: var(--primary); } 
        }
        
        .controls-row { display: flex; align-items: center; justify-content: center; gap: 35px; }
        .btn-nav { background: none; border: none; color: #b3b3b3; font-size: 24px; cursor: pointer; transition: 0.2s; }
        .btn-nav:hover { color: var(--primary); transform: scale(1.1); }
        .play-outer { position: relative; width: 80px; height: 80px; display: flex; align-items: center; justify-content: center; }
        .ring-animation { position: absolute; width: 100%; height: 100%; border: 2px solid rgba(160, 32, 240, 0.1); border-top: 2px solid var(--primary); border-radius: 50%; animation: spin-slow 5s linear infinite; }
        @keyframes spin-slow { 100% { transform: rotate(360deg); } }
        .btn-spotify-play { width: 60px; height: 60px; background: white; border: none; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 22px; color: black; cursor: pointer; z-index: 5; transition: 0.2s; }
        .btn-spotify-play:hover { transform: scale(1.05); background: var(--primary); color: white; }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-left">
            <h2 id="nome-exibicao">OUVINTE</h2>
            <button class="btn-header btn-sair" onclick="logout()"><i class="fas fa-sign-out-alt"></i> <span>SAIR</span></button>
        </div>
        
        <div id="container-pub"><img id="img-publicidade" src=""></div>
        
        <div class="header-right">
            <div class="time-msg-box">
                <div id="data-atual" class="date-info">CARREGANDO DATA...</div>
                <div class="separator"></div>
                <div id="hora">00:00:00</div>
                <button class="btn-header btn-msg" onclick="toggleCardMensagem()">
                    <i class="fas fa-comment-dots"></i> ENVIE UMA MENSAGEM PRA NÓS
                </button>
            </div>
        </div>
    </div>

    <div id="container-mensagem">
        <div class="card-msg">
            <textarea id="texto-mensagem" placeholder="Escreva sua mensagem aqui para o Luigy..."></textarea>
            <div class="msg-footer">
                <div class="emoji-bar">
                    <button class="btn-emoji" onclick="addEmoji('❤️')">❤️</button>
                    <button class="btn-emoji" onclick="addEmoji('🚀')">🚀</button>
                    <button class="btn-emoji" onclick="addEmoji('😊')">😊</button>
                    <button class="btn-emoji" onclick="addEmoji('👏')">👏</button>
                    <button class="btn-emoji" onclick="addEmoji('👍')">👍</button>
                    <button class="btn-emoji" onclick="addEmoji('👎')">👎</button>
                </div>
                <button class="btn-enviar-msg" onclick="enviarMensagem()">Enviar Mensagem</button>
            </div>
        </div>
    </div>

    <div class="main-container">
        <div class="side-pub" id="pub-left"></div>

        <div class="center-content">
            <div class="card">
                <h3>MINHA GRADE (ARRASTE PARA ORDENAR)</h3>
                <div id="my-radio-list" class="radio-grid"></div>
            </div>

            <div class="card">
                <h3>SELECIONE AQUI SUA RÁDIO</h3>
                <div id="selector-list" class="selector-list"></div>
            </div>
        </div>

        <div class="side-pub" id="pub-right"></div>
    </div>

    <div class="player-footer">
        <div id="aviso-novidade" class="msg-barra" onclick="fecharAviso()">
            <i class="fas fa-bullhorn" style="margin-right:8px;"></i> EI, TEM RADIO NOVA NA AREA, CONFIRA SUA LISTA E MERGULHE NO SOM
        </div>
        <div id="now-title" style="font-size:11px; color:#888; margin-bottom:15px; letter-spacing: 1px; text-transform: uppercase;">SELECIONE UMA RÁDIO</div>
        <div class="controls-row">
            <button class="btn-nav" onclick="prevRadio()"><i class="fas fa-step-backward"></i></button>
            <div class="play-outer">
                <div class="ring-animation"></div>
                <button class="btn-spotify-play" onclick="togglePlay()"><i class="fas fa-play" id="play-icon" style="margin-left: 3px;"></i></button>
            </div>
            <button class="btn-nav" onclick="nextRadio()"><i class="fas fa-step-forward"></i></button>
        </div>
    </div>

    <audio id="audio-player"></audio>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBGGdz8gJSrXWqq3hSQIoe3pop5MGYt20Q",
            authDomain: "meu-painel-f2efe.firebaseapp.com",
            databaseURL: "https://meu-painel-f2efe-default-rtdb.firebaseio.com/",
            projectId: "meu-painel-f2efe"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const player = document.getElementById('audio-player');
        const nomeUsuario = localStorage.getItem('usuarioNome') || "OUVINTE";
        document.getElementById('nome-exibicao').innerText = nomeUsuario;

        let allRadios = [], mySelectedIds = [], activeIndex = -1;

        // Funções de Mensagem
        function toggleCardMensagem() {
            document.getElementById('container-mensagem').classList.toggle('aberto');
        }

        function addEmoji(emoji) {
            document.getElementById('texto-mensagem').value += emoji;
        }

        function enviarMensagem() {
            const texto = document.getElementById('texto-mensagem').value;
            if(!texto.trim()) return alert("Escreva algo antes de enviar!");

            db.ref('mensagens_ouvintes').push({
                usuario: nomeUsuario,
                mensagem: texto,
                data: Date.now()
            }).then(() => {
                alert("Mensagem enviada com sucesso!");
                document.getElementById('texto-mensagem').value = "";
                toggleCardMensagem();
            });
        }

        // Atualização de Hora e Data
        setInterval(() => { 
            const agora = new Date();
            document.getElementById('hora').innerText = agora.toLocaleTimeString('pt-BR'); 
            
            const opcoesData = { weekday: 'long', day: '2-digit', month: '2-digit', year: 'numeric' };
            document.getElementById('data-atual').innerText = agora.toLocaleDateString('pt-BR', opcoesData);
        }, 1000);

        function fecharAviso() { document.getElementById('aviso-novidade').style.display = 'none'; }

        db.ref('radios').on('value', snap => {
            const countAnterior = parseInt(localStorage.getItem('lastRadioCount')) || 0;
            allRadios = [];
            snap.forEach(c => { allRadios.push({ ...c.val(), key: c.key }); });
            allRadios.sort((a, b) => (a.posicao || 0) - (b.posicao || 0));
            if (allRadios.length > countAnterior && countAnterior !== 0) { document.getElementById('aviso-novidade').style.display = 'block'; }
            localStorage.setItem('lastRadioCount', allRadios.length);
            db.ref('usuarios/' + nomeUsuario + '/grade').once('value', userSnap => {
                const gradeSalva = userSnap.val();
                if (gradeSalva) { mySelectedIds = gradeSalva; } 
                else { mySelectedIds = JSON.parse(localStorage.getItem('myRadios_' + nomeUsuario)) || []; }
                renderAll();
            });
        });

        function renderAll() {
            const myGrid = document.getElementById('my-radio-list'), selector = document.getElementById('selector-list');
            myGrid.innerHTML = ""; selector.innerHTML = "";
            const myRadios = mySelectedIds.map(id => allRadios.find(r => r.key === id)).filter(Boolean);
            myRadios.forEach((r, i) => {
                myGrid.innerHTML += `<div class="radio-item ${activeIndex === i ? 'active' : ''}" style="background: ${r.color || '#d1a3ff'}" data-id="${r.key}" onclick="playRadio(${i})"><i class="fas fa-tower-broadcast antena"></i><span>${r.name}</span></div>`;
            });
            allRadios.forEach(r => {
                const isSelected = mySelectedIds.includes(r.key);
                selector.innerHTML += `<div class="selector-item ${isSelected ? 'selected' : ''}"><span style="font-size:13px; font-weight:bold">${r.name}</span><button class="btn-toggle-radio ${isSelected ? 'remove' : 'add'}" onclick="toggleSelection('${r.key}')"><i class="fas ${isSelected ? 'fa-times-circle' : 'fa-plus-circle'}"></i></button></div>`;
            });
        }

        function salvarGrade() {
            db.ref('usuarios/' + nomeUsuario + '/grade').set(mySelectedIds);
            localStorage.setItem('myRadios_' + nomeUsuario, JSON.stringify(mySelectedIds));
        }

        new Sortable(document.getElementById('my-radio-list'), {
            animation: 150,
            onEnd: function() {
                const newIds = [];
                document.querySelectorAll('#my-radio-list .radio-item').forEach(el => { newIds.push(el.getAttribute('data-id')); });
                mySelectedIds = newIds;
                salvarGrade();
            }
        });

        function toggleSelection(id) {
            const index = mySelectedIds.indexOf(id);
            if (index > -1) mySelectedIds.splice(index, 1); else mySelectedIds.push(id);
            salvarGrade();
            renderAll();
        }

        function playRadio(index) {
            const myRadios = mySelectedIds.map(id => allRadios.find(r => r.key === id)).filter(Boolean);
            if (!myRadios[index]) return;
            activeIndex = index;
            const r = myRadios[index];
            player.src = r.url; player.play();
            document.getElementById('now-title').innerText = "OUVINTE: " + r.name;
            document.getElementById('play-icon').className = "fas fa-stop";
            db.ref('usuarios/' + nomeUsuario).update({ radioAtual: r.name, lastSeen: Date.now(), sessionStart: Date.now() });
            renderAll();
        }

        function togglePlay() {
            if(!player.src) return;
            if(player.paused) { player.play(); document.getElementById('play-icon').className = "fas fa-stop"; }
            else { player.pause(); document.getElementById('play-icon').className = "fas fa-play"; }
        }

        function nextRadio() { if(activeIndex < mySelectedIds.length - 1) playRadio(activeIndex + 1); else playRadio(0); }
        function prevRadio() { if(activeIndex > 0) playRadio(activeIndex - 1); else playRadio(mySelectedIds.length - 1); }

        function logout() { if(confirm("Deseja sair?")) { localStorage.removeItem('usuarioNome'); window.location.href = 'index.html'; } }

        let listaPubs = [], idxPub = 0;
        db.ref('publicidade').on('value', snap => {
            listaPubs = [];
            const agora = Date.now();
            snap.forEach(child => {
                const p = child.val();
                if ((p.destino === 'TODOS' || p.ouvinteAlvo === nomeUsuario.toUpperCase()) && (agora >= p.inicio && agora <= p.fim)) {
                    listaPubs.push(p);
                }
            });
            if (listaPubs.length === 0) { document.getElementById('img-publicidade').style.display = "none"; } 
            else { idxPub = 0; mostrarPub(); }
        });

        function mostrarPub() {
            const img = document.getElementById('img-publicidade');
            if (listaPubs[idxPub]) {
                img.src = listaPubs[idxPub].imagem;
                img.style.display = "block";
                img.style.opacity = 1;
            }
        }

        setInterval(() => {
            if (listaPubs.length > 1) {
                idxPub = (idxPub + 1) % listaPubs.length;
                const img = document.getElementById('img-publicidade');
                img.style.opacity = 0;
                setTimeout(mostrarPub, 500);
            }
        }, 7000);

        setInterval(() => { if(nomeUsuario) db.ref('usuarios/'+nomeUsuario).update({lastSeen: Date.now()}); }, 30000);
    </script>
</body>
</html>
