<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OUVINTE - MEU PAINEL</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #A020F0; --bg: #000; --card: #121212; --text-muted: #b3b3b3; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; margin: 0; padding: 20px; user-select: none; }
        
        .header { display: flex; justify-content: space-between; align-items: center; background: #121212; padding: 15px 25px; border-radius: 15px; border: 1px solid #333; margin-bottom: 25px; }
        .header h2 { margin: 0; color: var(--primary); font-size: 20px; text-transform: uppercase; letter-spacing: 2px; }
        .user-info { font-size: 14px; font-weight: bold; color: var(--text-muted); }

        .container { max-width: 1000px; margin: 0 auto; }
        
        h3 { color: var(--primary); font-size: 12px; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 15px; }

        /* GRADE DE RÁDIOS IGUAL ADM */
        .radio-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 12px; margin-bottom: 100px; }
        
        .radio-item { 
            aspect-ratio: 1/1; border-radius: 15px; display: flex; flex-direction: column; 
            justify-content: center; align-items: center; color: #fff; font-weight: bold; 
            font-size: 13px; text-align: center; padding: 10px; cursor: grab; 
            transition: 0.3s; position: relative; border: 2px solid #222; 
            background: var(--card);
        }
        
        /* Efeito de Hover Roxo */
        .radio-item:hover { border-color: var(--primary); transform: scale(1.02); box-shadow: 0 0 15px rgba(160, 32, 240, 0.3); }

        /* Rádio Ativa (Destaque) */
        .radio-item.active { background: #000 !important; color: var(--primary) !important; border-color: var(--primary); box-shadow: 0 0 20px rgba(160, 32, 240, 0.5); }
        
        /* Antena Piscando */
        .antena { font-size: 24px; margin-bottom: 8px; display: none; }
        .active .antena { display: block; animation: pulse-antena 1s infinite; }
        @keyframes pulse-antena { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.3; transform: scale(1.1); } }

        /* PLAYER RODAPÉ IGUAL ADM */
        .player-footer { 
            position: fixed; bottom: 0; left: 0; right: 0; 
            background: #111; padding: 20px; border-top: 2px solid var(--primary); 
            text-align: center; z-index: 100; 
        }
        .controls-row { display: flex; align-items: center; justify-content: center; gap: 35px; }
        
        .btn-nav { background: none; border: none; color: #b3b3b3; font-size: 24px; cursor: pointer; transition: 0.2s; }
        .btn-nav:hover { color: var(--primary); transform: scale(1.1); }
        
        .play-outer { position: relative; width: 70px; height: 70px; display: flex; align-items: center; justify-content: center; }
        .ring-animation { 
            position: absolute; width: 100%; height: 100%; 
            border: 2px solid rgba(160, 32, 240, 0.1); 
            border-top: 2px solid var(--primary); 
            border-radius: 50%; animation: spin-slow 5s linear infinite; 
        }
        @keyframes spin-slow { 100% { transform: rotate(360deg); } }
        
        .btn-spotify-play { 
            width: 50px; height: 50px; background: white; border: none; 
            border-radius: 50%; display: flex; align-items: center; 
            justify-content: center; font-size: 20px; color: black; 
            cursor: pointer; z-index: 5; transition: 0.2s; 
        }
        .btn-spotify-play:hover { transform: scale(1.05); background: var(--primary); color: white; }
    </style>
</head>
<body>

    <div class="header">
        <h2><i class="fas fa-headphones"></i> MEU PAINEL</h2>
        <div class="user-info" id="user-display">---</div>
    </div>

    <div class="container">
        <h3>ESCOLHA SUA EMISSORA (ARRASTE PARA ORGANIZAR)</h3>
        <div id="radio-list" class="radio-grid"></div>
    </div>

    <div class="player-footer">
        <div id="now-title" style="font-size:11px; color:#888; margin-bottom:12px; letter-spacing: 1px; text-transform: uppercase;">SELECIONE UMA RÁDIO</div>
        <div class="controls-row">
            <button class="btn-nav" onclick="prevRadio()"><i class="fas fa-step-backward"></i></button>
            <div class="play-outer">
                <div class="ring-animation"></div>
                <button class="btn-spotify-play" onclick="togglePlay()"><i class="fas fa-play" id="play-icon" style="margin-left: 3px;"></i></button>
            </div>
            <button class="btn-nav" onclick="nextRadio()"><i class="fas fa-step-forward"></i></button>
        </div>
    </div>

    <audio id="audio-player"></audio>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBGGdz8gJSrXWqq3hSQIoe3pop5MGYt20Q",
            authDomain: "meu-painel-f2efe.firebaseapp.com",
            databaseURL: "https://meu-painel-f2efe-default-rtdb.firebaseio.com/",
            projectId: "meu-painel-f2efe"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const player = document.getElementById('audio-player');
        const nomeUsuario = localStorage.getItem('usuarioNome') || "Ouvinte";
        document.getElementById('user-display').innerText = "OLÁ, " + nomeUsuario;

        let radioData = [];
        let activeIndex = -1;

        // Renderizar Rádios (Padrão ADM)
        function renderRadios() {
            const list = document.getElementById('radio-list');
            list.innerHTML = "";
            radioData.forEach((r, i) => {
                list.innerHTML += `
                    <div class="radio-item ${activeIndex === i ? 'active' : ''}" data-id="${r.key}" onclick="playRadio(${i})">
                        <i class="fas fa-tower-broadcast antena"></i>
                        <span>${r.name}</span>
                    </div>`;
            });
        }

        // Buscar Rádios do Firebase
        db.ref('radios').on('value', snap => {
            radioData = [];
            snap.forEach(c => { radioData.push({ ...c.val(), key: c.key }); });
            radioData.sort((a, b) => (a.posicao || 0) - (b.posicao || 0));
            renderRadios();
        });

        // Arrastar (Sortable)
        Sortable.create(document.getElementById('radio-list'), {
            animation: 150,
            onEnd: function() {
                // Opcional: Salvar posição pessoal ou apenas visual
            }
        });

        // Função Play
        function playRadio(index) {
            if (index < 0 || index >= radioData.length) return;
            activeIndex = index;
            const r = radioData[index];
            player.src = r.url; 
            player.play();
            
            document.getElementById('now-title').innerText = "OUVINDO: " + r.name;
            const icon = document.getElementById('play-icon');
            icon.className = "fas fa-stop"; 
            icon.style.marginLeft = "0px";

            // Atualizar Status no Firebase para o ADM ver
            db.ref('usuarios/' + nomeUsuario).update({
                radioAtual: r.name,
                radioStart: Date.now(),
                lastSeen: Date.now()
            });

            renderRadios();
        }

        function togglePlay() {
            if(!player.src) return;
            const icon = document.getElementById('play-icon');
            if(player.paused) { 
                player.play(); 
                icon.className = "fas fa-stop"; 
                icon.style.marginLeft = "0px"; 
            } else { 
                player.pause(); 
                icon.className = "fas fa-play"; 
                icon.style.marginLeft = "3px"; 
            }
        }

        function nextRadio() { let next = activeIndex + 1; if (next >= radioData.length) next = 0; playRadio(next); }
        function prevRadio() { let prev = activeIndex - 1; if (prev < 0) prev = radioData.length - 1; playRadio(prev); }

        // Manter sinal de vida (Monitor ADM)
        setInterval(() => {
            if(nomeUsuario) {
                db.ref('usuarios/' + nomeUsuario).update({ lastSeen: Date.now() });
            }
        }, 30000);

    </script>
</body>
</html>
