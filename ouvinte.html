<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PAINEL OUVINTE - MEU PAINEL</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #BF40BF; --bg: #0b0b0b; --card: #181818; }
        
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: var(--bg); 
            color: white; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
            margin: 0; 
        }

        .container { 
            background: var(--card); 
            padding: 30px; 
            border-radius: 20px; 
            border: 1px solid #333; 
            width: 90%; 
            max-width: 400px; 
            text-align: center; 
        }

        h2 { 
            color: var(--primary); 
            margin-bottom: 20px; 
            text-transform: uppercase; 
            letter-spacing: 2px; 
        }

        .user-info {
            margin-bottom: 25px;
            font-size: 16px;
            color: #ccc;
        }

        #nome-usuario {
            color: var(--primary);
            font-weight: bold;
        }

        /* --- ESTILO DOS BOTÕES COM EFEITO REATIVADO --- */
        .btn-acao { 
            width: 100%; 
            padding: 14px; 
            border-radius: 10px; 
            border: none; 
            background: var(--primary); 
            color: white; 
            font-weight: bold; 
            cursor: pointer; 
            margin-bottom: 15px; 
            transition: all 0.3s ease; /* Efeito de transição suave */
            text-transform: uppercase;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-size: 14px;
        }

        /* Efeito ao passar o mouse */
        .btn-acao:hover { 
            opacity: 0.9; 
            transform: translateY(-2px); /* Sobe levemente */
            box-shadow: 0 5px 15px rgba(191, 64, 191, 0.3); /* Brilho suave */
        }

        /* Efeito ao clicar */
        .btn-acao:active {
            transform: translateY(0);
            transform: scale(0.98);
        }

        /* Botão de Sair com cor diferente */
        .btn-sair {
            background: #333;
            margin-top: 10px;
        }

        .btn-sair:hover {
            background: #ff4444;
            box-shadow: 0 5px 15px rgba(255, 68, 68, 0.3);
        }
    </style>
</head>
<body>

    <div class="container">
        <h2 id="titulo-painel">Painel Ouvinte</h2>
        
        <div class="user-info">
            Olá, <span id="nome-usuario">Carregando...</span>
        </div>

        <button class="btn-acao" onclick="abrirModalMensagem()">
            <i class="fas fa-comment-dots"></i> Enviar Mensagem
        </button>

        <button class="btn-acao" onclick="abrirModalMusica()">
            <i class="fas fa-music"></i> Pedir Música
        </button>

        <button class="btn-acao btn-sair" onclick="deslogar()">
            <i class="fas fa-sign-out-alt"></i> Sair do Painel
        </button>
    </div>

    <script>
        // Configuração Firebase mantida intacta
        const firebaseConfig = {
            apiKey: "AIzaSyBGGdz8gJSrXWqq3hSQIoe3pop5MGYt20Q",
            authDomain: "meu-painel-f2efe.firebaseapp.com",
            databaseURL: "https://meu-painel-f2efe-default-rtdb.firebaseio.com/",
            projectId: "meu-painel-f2efe"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // Recupera o nome salvo no login para exibição
        const nomeGravado = localStorage.getItem('usuarioNome');
        if (nomeGravado) {
            document.getElementById('nome-usuario').innerText = nomeGravado;
        } else {
            window.location.href = 'index.html';
        }

        // --- FUNCIONALIDADES MANTIDAS INTACTAS ---

        function abrirModalMensagem() {
            // Aqui entra a sua lógica original de abrir o modal ou enviar mensagem
            console.log("Abrindo mensagens...");
            alert("Função Enviar Mensagem acionada!");
        }

        function abrirModalMusica() {
            // Aqui entra a sua lógica original de pedir música
            console.log("Pedindo música...");
            alert("Função Pedir Música acionada!");
        }

        function deslogar() {
            localStorage.clear();
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
