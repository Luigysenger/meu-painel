<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOGIN - LUIGY</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <style>
        :root { --primary: #A020F0; --bg: #000; --card: #121212; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-card { background: var(--card); padding: 40px; border-radius: 20px; border: 1px solid #333; width: 320px; text-align: center; }
        h2 { color: var(--primary); margin-bottom: 30px; text-transform: uppercase; letter-spacing: 2px; }
        input { width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 8px; border: 1px solid #333; background: #1a1a1a; color: white; box-sizing: border-box; outline: none; }
        input:focus { border-color: var(--primary); }
        button { width: 100%; padding: 12px; border-radius: 8px; border: none; background: var(--primary); color: white; font-weight: bold; cursor: pointer; transition: 0.3s; text-transform: uppercase; }
        button:hover { transform: scale(1.02); filter: brightness(1.1); }
        .error-msg { color: #ff4444; font-size: 12px; margin-top: 10px; display: none; }
    </style>
</head>
<body>

    <div class="login-card">
        <h2>Acesso</h2>
        <input type="text" id="login-user" placeholder="USUÁRIO">
        <input type="password" id="login-pass" placeholder="SENHA">
        <button onclick="fazerLogin()" id="btn-entrar">ENTRAR</button>
        <div id="msg-erro" class="error-msg">Usuário ou senha incorretos!</div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBGGdz8gJSrXWqq3hSQIoe3pop5MGYt20Q",
            authDomain: "meu-painel-f2efe.firebaseapp.com",
            databaseURL: "https://meu-painel-f2efe-default-rtdb.firebaseio.com/",
            projectId: "meu-painel-f2efe"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // --- FUNÇÃO DE LOGIN ---
        function fazerLogin() {
            const user = document.getElementById('login-user').value.trim();
            const pass = document.getElementById('login-pass').value.trim();
            const erro = document.getElementById('msg-erro');

            if(!user || !pass) return;

            db.ref('usuarios/' + user).once('value', snap => {
                const dados = snap.val();
                if(dados && dados.senha === pass) {
                    localStorage.setItem('usuarioNome', user);
                    window.location.href = 'ouvinte.html';
                } else {
                    erro.style.display = 'block';
                    setTimeout(() => { erro.style.display = 'none'; }, 3000);
                }
            });
        }

        // --- AJUSTE SOLICITADO: LOGAR AO APERTAR ENTER ---
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                fazerLogin();
            }
        });
    </script>
</body>
</html>
