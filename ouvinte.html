<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OUVINTE - LUIGY</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #A020F0; --bg: #000; --card: #121212; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; margin: 0; padding: 15px; user-select: none; }

        /* CABEÇALHO INTELIGENTE */
        .header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            background: #121212; 
            padding: 15px 25px; 
            border-radius: 15px; 
            border: 1px solid #333; 
            margin-bottom: 20px;
            gap: 15px;
        }

        .header-left, .header-right { flex-shrink: 0; display: flex; align-items: center; gap: 15px; }
        .header h2 { margin: 0; color: var(--primary); font-size: 20px; text-transform: uppercase; }

        /* ÁREA DA PUBLICIDADE QUE SE ADAPTA */
        #container-pub { 
            flex: 1; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 60px; /* Aumentado para ficar imponente no PC */
            overflow: hidden;
        }
        #img-publicidade { 
            max-height: 100%; 
            max-width: 100%; 
            border-radius: 8px; 
            display: none; 
            object-fit: contain; 
            transition: opacity 0.5s; 
        }

        #hora { font-size: 24px; font-weight: 900; color: white; }

        /* --- MÁGICA DO CELULAR (RESPONSIVIDADE) --- */
        @media (max-width: 768px) {
            .header { 
                padding: 10px; 
                flex-direction: row; /* Mantém na mesma linha, mas espreme o que não importa */
                gap: 5px;
            }
            .header h2 { font-size: 14px; } /* Nome menor para sobrar espaço */
            .weather-box, .btn-sair span { display: none; } /* Esconde o texto do botão sair e clima */
            #hora { font-size: 16px; }
            #container-pub { height: 45px; } /* Publicidade um pouco menor para não quebrar o layout */
            
            .main-container { grid-template-columns: 1fr !important; } /* Coloca as listas uma embaixo da outra */
        }

        /* GRID DE CONTEÚDO */
        .main-container { display: grid; grid-template-columns: 1fr 350px; gap: 20px; max-width: 1400px; margin: 0 auto; margin-bottom: 140px; }
        .card { background: var(--card); border-radius: 20px; padding: 20px; border: 1px solid #282828; }
        
        .radio-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 12px; }
        .radio-item { aspect-ratio: 1/1; border-radius: 15px; display: flex; justify-content: center; align-items: center; color: #000; font-weight: bold; font-size: 11px; text-align: center; cursor: pointer; border: 2px solid transparent; }
        .radio-item.active { background: #000 !important; color: var(--primary) !important; border-color: var(--primary); box-shadow: 0 0 15px rgba(160, 32, 240, 0.4); }

        /* PLAYER FIXO EMBAIXO */
        .player-footer { position: fixed; bottom: 0; left: 0; right: 0; background: #111; padding: 20px; border-top: 2px solid var(--primary); text-align: center; z-index: 100; }
        .controls-row { display: flex; align-items: center; justify-content: center; gap: 30px; }
        .btn-spotify-play { width: 60px; height: 60px; background: white; border: none; border-radius: 50%; font-size: 22px; color: black; cursor: pointer; transition: 0.2s; }
        .btn-spotify-play:hover { transform: scale(1.1); background: var(--primary); color: white; }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-left">
            <h2 id="nome-exibicao">OUVINTE</h2>
            <button class="btn-header" onclick="logout()" style="background:none; border:1px solid #444; color:red; border-radius:5px; cursor:pointer;"><i class="fas fa-power-off"></i></button>
        </div>

        <div id="container-pub">
            <img id="img-publicidade" src="">
        </div>

        <div class="header-right">
            <div id="hora">00:00:00</div>
        </div>
    </div>

    <div class="main-container">
        <div class="card">
            <h3 style="color:var(--primary); font-size:12px;">MINHA GRADE</h3>
            <div id="my-radio-list" class="radio-grid"></div>
        </div>
        <div class="card">
            <h3 style="color:var(--primary); font-size:12px;">RADIOS DISPONÍVEIS</h3>
            <div id="selector-list"></div>
        </div>
    </div>

    <div class="player-footer">
        <div id="now-title" style="font-size:11px; color:#888; margin-bottom:10px;">SELECIONE UMA RÁDIO</div>
        <div class="controls-row">
            <button onclick="prevRadio()" style="background:none; border:none; color:white; font-size:20px; cursor:pointer;"><i class="fas fa-step-backward"></i></button>
            <button class="btn-spotify-play" onclick="togglePlay()"><i class="fas fa-play" id="play-icon"></i></button>
            <button onclick="nextRadio()" style="background:none; border:none; color:white; font-size:20px; cursor:pointer;"><i class="fas fa-step-forward"></i></button>
        </div>
    </div>

    <audio id="audio-player"></audio>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBGGdz8gJSrXWqq3hSQIoe3pop5MGYt20Q",
            authDomain: "meu-painel-f2efe.firebaseapp.com",
            databaseURL: "https://meu-painel-f2efe-default-rtdb.firebaseio.com/",
            projectId: "meu-painel-f2efe"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const player = document.getElementById('audio-player');
        const nomeUsuario = localStorage.getItem('usuarioNome') || "OUVINTE";
        document.getElementById('nome-exibicao').innerText = nomeUsuario;

        let allRadios = [], mySelectedIds = JSON.parse(localStorage.getItem('myRadios_' + nomeUsuario)) || [], activeIndex = -1;

        setInterval(() => { document.getElementById('hora').innerText = new Date().toLocaleTimeString('pt-BR'); }, 1000);

        db.ref('radios').on('value', snap => {
            allRadios = [];
            snap.forEach(c => { allRadios.push({ ...c.val(), key: c.key }); });
            renderAll();
        });

        function renderAll() {
            const myGrid = document.getElementById('my-radio-list'), selector = document.getElementById('selector-list');
            myGrid.innerHTML = ""; selector.innerHTML = "";
            const myRadios = mySelectedIds.map(id => allRadios.find(r => r.key === id)).filter(Boolean);
            myRadios.forEach((r, i) => {
                myGrid.innerHTML += `<div class="radio-item ${activeIndex === i ? 'active' : ''}" style="background: ${r.color || '#A020F0'}" onclick="playRadio(${i})"><span>${r.name}</span></div>`;
            });
            allRadios.forEach(r => {
                const isSelected = mySelectedIds.includes(r.key);
                selector.innerHTML += `<div style="display:flex; justify-content:space-between; padding:10px; background:#1a1a1a; margin-bottom:5px; border-radius:10px; font-size:13px;">${r.name} <button onclick="toggleSelection('${r.key}')" style="background:none; border:none; color:var(--primary); cursor:pointer;"><i class="fas ${isSelected?'fa-check-circle':'fa-plus-circle'}"></i></button></div>`;
            });
        }

        function toggleSelection(id) {
            const index = mySelectedIds.indexOf(id);
            if (index > -1) mySelectedIds.splice(index, 1); else mySelectedIds.push(id);
            localStorage.setItem('myRadios_' + nomeUsuario, JSON.stringify(mySelectedIds));
            renderAll();
        }

        function playRadio(index) {
            const myRadios = mySelectedIds.map(id => allRadios.find(r => r.key === id)).filter(Boolean);
            activeIndex = index; player.src = myRadios[index].url; player.play();
            document.getElementById('play-icon').className = "fas fa-stop";
            document.getElementById('now-title').innerText = "OUVINDO: " + myRadios[index].name;
            renderAll();
        }

        function togglePlay() {
            if(!player.src) return;
            if(player.paused) { player.play(); document.getElementById('play-icon').className = "fas fa-stop"; }
            else { player.pause(); document.getElementById('play-icon').className = "fas fa-play"; }
        }

        function nextRadio() { if(activeIndex < mySelectedIds.length - 1) playRadio(activeIndex + 1); else playRadio(0); }
        function prevRadio() { if(activeIndex > 0) playRadio(activeIndex - 1); else playRadio(mySelectedIds.length - 1); }

        // CARROSSEL DE PUB
        let listaPubs = [], idxPub = 0;
        db.ref('publicidade').on('value', snap => {
            listaPubs = [];
            const agora = Date.now();
            snap.forEach(child => {
                const p = child.val();
                if ((p.destino === 'TODOS' || p.ouvinteAlvo === nomeUsuario.toUpperCase()) && (agora >= p.inicio && agora <= p.fim)) {
                    listaPubs.push(p);
                }
            });
            if (listaPubs.length > 0) { mostrarPub(); } else { document.getElementById('img-publicidade').style.display = "none"; }
        });

        function mostrarPub() {
            const img = document.getElementById('img-publicidade');
            img.src = listaPubs[idxPub].imagem;
            img.style.display = "block";
            img.style.opacity = 1;
        }

        setInterval(() => {
            if (listaPubs.length > 1) {
                idxPub = (idxPub + 1) % listaPubs.length;
                document.getElementById('img-publicidade').style.opacity = 0;
                setTimeout(mostrarPub, 500);
            }
        }, 7000);

        function logout() { localStorage.removeItem('usuarioNome'); window.location.href = 'index.html'; }
    </script>
</body>
</html>
